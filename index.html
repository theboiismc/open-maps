<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <title>TheBoiisMC Maps</title>
    <meta name="description" content="Private Navigation & Directions" />
    <meta name="theme-color" content="#030712" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">

    <link href="https://static.theboiismc.com/css/maplibre-gl-4.1.0.css" rel="stylesheet">
    
    <link rel="stylesheet" href="mapstyles7.css">
</head>
<body>
    
    <div id="mobile-search-container">
        <div id="mobile-search-bar" class="floating-search-bar">
            <span class="material-symbols-outlined search-icon">search</span>
            <input type="text" id="mobile-search-input" placeholder="Search here" autocomplete="off" />
            <div id="mobile-profile-btn" class="profile-icon">
                 <span class="material-symbols-outlined">account_circle</span>
            </div>
        </div>
        <div id="mobile-suggestions" class="suggestions-dropdown" hidden></div>
    </div>

    <div id="desktop-header">
        <a href="/" class="brand-logo">
            <div class="brand-icon-box">
                <svg viewBox="0 0 640 512" width="18" height="18" fill="white"><path d="M0 336c0 79.5 64.5 144 144 144H512c70.7 0 128-57.3 128-128c0-61.9-44-113.6-102.4-125.4c4.1-10.7 6.4-22.4 6.4-34.6c0-53-43-96-96-96c-19.7 0-38.1 6-53.3 16.2C363.2 41.9 307.2 0 240 0 151.6 0 80 71.6 80 160c0 36.3 11.9 69.9 32.3 96.6C47.8 266 0 302.3 0 336z"/></svg>
            </div>
            <span class="brand-text">TheBoiis<span class="text-accent">MC</span></span>
        </a>
        <div class="desktop-search-wrapper" id="desktop-search-wrapper">
            </div>
        <div class="header-actions">
            <button id="desktop-settings-btn"><span class="material-symbols-outlined">settings</span></button>
            <button id="desktop-profile-btn"><span class="material-symbols-outlined">account_circle</span></button>
        </div>
    </div>

    <div id="bottom-sheet" class="sheet-hidden">
        
        <div id="sheet-handle-area">
            <div class="sheet-pill"></div>
        </div>

        <div id="sheet-content-viewport">
            
            <div id="view-explore" class="sheet-view">
                <div class="sheet-padding">
                    <h3 class="sheet-title">Explore</h3>
                    <p class="sheet-subtitle">Navigate the world privately.</p>

                    <div class="category-grid">
                        <button class="cat-card" data-query="restaurants">
                            <div class="cat-icon color-orange"><span class="material-symbols-outlined">restaurant</span></div>
                            <span>Food</span>
                        </button>
                        <button class="cat-card" data-query="gas stations">
                            <div class="cat-icon color-blue"><span class="material-symbols-outlined">local_gas_station</span></div>
                            <span>Gas</span>
                        </button>
                        <button class="cat-card" data-query="coffee">
                            <div class="cat-icon color-brown"><span class="material-symbols-outlined">coffee</span></div>
                            <span>Coffee</span>
                        </button>
                        <button class="cat-card" data-query="groceries">
                            <div class="cat-icon color-green"><span class="material-symbols-outlined">shopping_cart</span></div>
                            <span>Groceries</span>
                        </button>
                    </div>

                    <button id="btn-plan-drive" class="action-btn-primary full-width mt-4">
                        <span class="material-symbols-outlined">directions_car</span>
                        Plan a Drive
                    </button>
                </div>
            </div>

            <div id="view-results" class="sheet-view" hidden>
                <div class="sheet-padding">
                    <button class="back-link" id="btn-results-back"><span class="material-symbols-outlined">arrow_back</span> Back</button>
                    <h3 class="sheet-title" id="results-header-text">Results</h3>
                    <div id="results-list" class="results-list"></div>
                </div>
            </div>

            <div id="view-place" class="sheet-view" hidden>
                <div id="place-hero-image" class="place-hero" style="display:none;"></div>
                
                <div class="sheet-padding">
                    <div class="place-header-row">
                        <h3 id="place-name" class="sheet-title truncate">Place Name</h3>
                        <button id="btn-close-place" class="close-icon-btn"><span class="material-symbols-outlined">close</span></button>
                    </div>
                    <p id="place-address" class="sheet-subtitle">Address line here</p>
                    
                    <div class="place-actions-row">
                        <button id="btn-place-directions" class="pill-btn primary">
                            <span class="material-symbols-outlined">directions</span> Directions
                        </button>
                        <button id="btn-place-start" class="pill-btn success">
                            <span class="material-symbols-outlined">navigation</span> Start
                        </button>
                        <button id="btn-place-share" class="pill-btn secondary">
                            <span class="material-symbols-outlined">share</span>
                        </button>
                    </div>

                    <hr class="divider"/>
                    
                    <div class="place-details-grid">
                        <div class="detail-item">
                            <span class="material-symbols-outlined">cloud</span>
                            <span id="place-weather">Loading weather...</span>
                        </div>
                        <div class="detail-item">
                            <span class="material-symbols-outlined">info</span>
                            <span id="place-facts">Loading facts...</span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="view-directions" class="sheet-view" hidden>
                <div class="sheet-padding">
                    <button class="back-link" id="btn-dir-back"><span class="material-symbols-outlined">arrow_back</span> Back</button>
                    
                    <div class="directions-inputs">
                        <div class="input-row">
                            <span class="material-symbols-outlined dot-start">radio_button_unchecked</span>
                            <input id="input-from" type="text" placeholder="My Location" />
                        </div>
                        <div class="connector-line"></div>
                        <div class="input-row">
                            <span class="material-symbols-outlined dot-end">location_on</span>
                            <input id="input-to" type="text" placeholder="Destination" />
                        </div>
                        <button id="btn-swap-dir" class="swap-fab"><span class="material-symbols-outlined">swap_vert</span></button>
                    </div>

                    <div id="route-stats-card" class="route-stats-card" hidden>
                        <div class="stats-left">
                            <h2 class="time-green" id="route-time">-- min</h2>
                            <span class="dist-gray" id="route-dist">-- mi</span>
                        </div>
                        <button id="btn-go-nav" class="action-btn-primary">Start</button>
                    </div>
                </div>
            </div>

            <div id="view-navigation" class="sheet-view" hidden>
                <div class="sheet-padding">
                    <div class="nav-header">
                        <div id="nav-instruction" class="nav-big-text">Head North</div>
                        <div id="nav-sub-instruction" class="nav-small-text">Then turn right</div>
                    </div>
                    <div class="nav-stats-row">
                        <div class="stat-box">
                            <span id="nav-eta" class="big-stat">--:--</span>
                            <span class="label">ETA</span>
                        </div>
                        <div class="stat-box">
                            <span id="nav-time" class="big-stat">--</span>
                            <span class="label">min</span>
                        </div>
                        <div class="stat-box">
                            <span id="nav-dist" class="big-stat">--</span>
                            <span class="label">mi</span>
                        </div>
                        <button id="btn-end-trip" class="btn-danger">Exit</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div id="map"></div>

    <div id="toast-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/oidc-client-ts@2.2.0/dist/browser/oidc-client-ts.min.js"></script>
    <script src="https://static.theboiismc.com/js/maps/maplibre-gl-4.1.0.js"></script>
    <script src="https://static.theboiismc.com/js/maps/turf.js"></script>
    <script src="map5.js" defer></script>

</body>
</html>

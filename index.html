<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

    <title>TheBoiisMC Maps — Private Navigation</title>
    <meta name="description" content="TheBoiisMC Maps. Private navigation without the tracking." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://maps.theboiismc.com/" />

    <link rel="preconnect" href="https://static.theboiismc.com" crossorigin>
    <link rel="preconnect" href="https://tiles.theboiismc.com" crossorigin>

    <meta name="theme-color" content="#030712" />

    <link rel="manifest" href="https://static.theboiismc.com/site.webmanifest">
    <link rel="apple-touch-icon" sizes="180x180" href="https://static.theboiismc.com/icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="https://static.theboiismc.com/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://static.theboiismc.com/icons/favicon-16x16.png">

    <meta property="og:image" content="https://static.theboiismc.com/icons/og-image.png" />
    <meta property="og:url" content="https://maps.theboiismc.com" />

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">

    <link href="libs/css/maplibre-gl-4.1.0.css" rel="stylesheet">
    <link href="https://styles.theboiismc.com/css/styles.css" rel="stylesheet">
    <style>
        /* Header Branding Styles */
        .brand-link {
            display: flex; align-items: center; gap: 0.5rem;
            text-decoration: none; color: var(--text-primary); cursor: pointer;
        }
        .brand-icon-box {
            width: 2rem; height: 2rem; border-radius: 0.5rem;
            background: linear-gradient(to bottom right, #6366F1, #2563eb);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
            transition: all 0.3s ease;
        }
        .brand-link:hover .brand-icon-box {
            box-shadow: 0 6px 15px rgba(99, 102, 241, 0.5); transform: translateY(-1px);
        }
        .brand-text {
            font-size: 1.25rem; font-weight: 700; letter-spacing: -0.025em;
            color: var(--text-primary); line-height: 1; margin-left: 8px;
        }
        .brand-highlight { color: #6366F1; }

        /* Map UI Styles */
        #lane-guidance-container {
            display: flex; gap: 2px; position: absolute; top: 8px; left: 50%;
            transform: translateX(-50%); background: rgba(0,0,0,0.8);
            padding: 6px 10px; border-radius: 20px; z-index: 10;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .lane-icon { font-size: 24px; font-weight: bold; color: #777; }
        .lane-icon.active { color: #3b82f6; } 
        #rerouting-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); 
            backdrop-filter: blur(4px); color: white;
            display: flex; justify-content: center; align-items: center;
            font-size: 1.5rem; font-weight: 600; z-index: 10000;
            opacity: 0; visibility: hidden; transition: opacity 0.3s;
        }
        #rerouting-overlay.visible { opacity: 1; visibility: visible; }
    </style>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "TheBoiisMC Maps",
      "url": "https://maps.theboiismc.com/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://maps.theboiismc.com/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
</head>
<body>
    <div id="top-banner">
        <a href="/" class="brand-link" aria-label="TheBoiisMC Homepage">
            <div class="brand-icon-box">
                <span class="material-symbols-outlined" style="font-size: 20px; color: white;">cloud</span>
            </div>
            <span class="brand-text">TheBoiis<span class="brand-highlight">MC</span></span>
        </a>

        <div id="profile-area">
            <button id="settings-icon-btn" aria-label="Settings"><span class="material-symbols-outlined">tune</span></button>
            <button id="profile-button" aria-label="Profile"><span class="material-symbols-outlined">account_circle</span></button>
            <button id="app-menu-button" aria-label="Apps"><span class="material-symbols-outlined">apps</span></button>
            
            <div id="services-dropdown">
                <a href="https://search.theboiismc.com" class="service-item"><span class="material-symbols-outlined">search</span><span class="service-name">Search</span></a>
                <a href="https://maps.theboiismc.com" class="service-item"><span class="material-symbols-outlined">map</span><span class="service-name">Maps</span></a>
            </div>
        </div>
    </div>
    
    <div id="map"></div>
    <div id="rerouting-overlay">Rerouting...</div>
    <div id="toast-container"></div>
    
    <div id="top-search-wrapper">
        <div id="main-search-container">
            <span id="search-icon-inside" class="material-symbols-outlined">search</span>
            <input type="text" id="main-search" placeholder="Search..." autocomplete="off" />
            <span id="main-directions-icon" class="material-symbols-outlined">directions</span>
        </div>
    </div>
    
    <div id="side-panel">
         <div id="panel-grabber"></div>
         <div class="panel-content"></div>
    </div>

    <div id="settings-modal" class="modal-container">
        <div id="modal-overlay" class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h4>Map Settings</h4>
                <button id="close-settings-btn" class="modal-close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="setting-group"><span class="setting-label">Globe View</span><div class="toggle-switch"><input type="checkbox" id="globe-toggle"><label for="globe-toggle"></label></div></div>
                <hr>
                <div class="setting-group"><span class="setting-label">Units</span><div class="radio-group"><input type="radio" id="units-imperial" name="map-units" value="imperial" checked><label for="units-imperial">Imperial</label><input type="radio" id="units-metric" name="map-units" value="metric"><label for="units-metric">Metric</label></div></div>
                <hr>
                <div class="setting-group"><span class="setting-label">Theme</span><div class="radio-group"><input type="radio" id="theme-auto" name="map-theme" value="auto"><label for="theme-auto">Auto</label><input type="radio" id="theme-light" name="map-theme" value="light"><label for="theme-light">Light</label><input type="radio" id="theme-dark" name="map-theme" value="dark"><label for="theme-dark">Dark</label></div></div>
                <hr>
                <button id="advanced-settings-btn" class="btn-link">Advanced Settings...</button>
            </div>
        </div>
    </div>

    <div id="advanced-settings-modal" class="modal-container">
        <div id="modal-overlay-advanced" class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h4>Advanced Settings</h4>
                <button id="close-advanced-settings-btn" class="modal-close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="setting-group-column">
                    <span class="setting-label">Tile Service Priority</span>
                    <ul id="tile-priority-list" class="sortable-list"></ul>
                </div>
                <hr>
                <div class="setting-group-column">
                    <span class="setting-label">Privacy</span>
                    <div class="setting-group">
                        <span class="setting-label-inner">Clear Recent Searches</span>
                        <div class="toggle-switch"><input type="checkbox" id="privacy-clear-recents-toggle"><label for="privacy-clear-recents-toggle"></label></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="navigation-status">
        <div id="lane-guidance-container"></div>
        <div id="instruction-container">
            <div id="navigation-instruction">Starting...</div>
            <div id="instruction-progress-bar"></div>
        </div>
        <div id="trip-stats-container">
            <div class="stat-item"><span id="stat-speed">--</span><span class="stat-label">mph</span></div>
            <div class="stat-item"><span id="stat-eta">--:--</span><span class="stat-label">ETA</span></div>
        </div>
        <button id="end-navigation-btn">End Trip</button>
    </div>

    <div id="context-menu">
        <div id="context-menu-coords"></div>
        <div class="context-menu-item" id="ctx-directions-from"><span class="material-symbols-outlined">near_me</span><span>Directions from here</span></div>
        <div class="context-menu-item" id="ctx-directions-to"><span class="material-symbols-outlined">place</span><span>Directions to here</span></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/oidc-client-ts@2.2.0/dist/browser/oidc-client-ts.min.js" defer></script>
    <script src="libs/js/maplibre-gl-4.1.0.js"></script>
    <script src="libs/js/turf.js"></script>
    <script src="app.js" defer></script>
    
    <script>
        const yearSpan = document.getElementById('year');
        if(yearSpan) yearSpan.textContent = new Date().getFullYear();
    </script>
</body>
</html>

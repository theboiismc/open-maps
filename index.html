<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheBoiisMC Map</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Map Container -->
    <div id="map" style="height: 100vh;"></div>

    <!-- Side Panel -->
    <div id="side-panel">
        <button id="close-side-panel">Close</button>
        <div id="place-info">
            <h2 id="place-name">Place Name</h2>
            <img id="place-image" src="default.jpg" alt="Place Image" />
            <p id="place-description">Place description will appear here.</p>
            <p id="place-weather">Weather info will be here.</p>
        </div>
    </div>

    <!-- Search Section -->
    <div class="search-section">
        <input type="text" id="search" placeholder="Search for a place..." />
        <div id="suggestions"></div>
    </div>

    <!-- Branding Section -->
    <div id="branding">
        <img src="theboiismc_logo.png" alt="TheBoiisMC Logo" id="logo" />
    </div>

    <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
    <script src="app.js"></script>

</body>
</html>

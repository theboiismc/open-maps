<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    
    <title>TheBoiisMC Maps</title>
    <meta name="description" content="Explore the world with private, modern mapping." />
    <meta name="theme-color" content="#00796b" />
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon512_rounded.png">
    
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' https://unpkg.com https://npmcdn.com https://cdn.jsdelivr.net https://static.cloudflareinsights.com 'unsafe-inline';
        style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com;
        img-src 'self' data: https:;
        font-src 'self' https://fonts.gstatic.com;
        connect-src 'self' https://accounts.theboiismc.com https://api.maptiler.com https://api.open-meteo.com https://en.wikipedia.org https://cloudflareinsights.com;
        worker-src 'self' blob: https://unpkg.com;
    ">
    
    <link href="https://unpkg.com/maplibre-gl@3.4.1/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="loading-screen">
        <div class="loader"></div>
        <div id="loading-text">TheBoiisMC Maps</div>
    </div>

    <div id="top-search-wrapper" class="search-panel">
        <input type="text" id="main-search-input" placeholder="Search for a location or address..." autocomplete="off">
        <div id="search-suggestions" class="search-suggestions"></div>
    </div>
    
    <div id="side-panel" class="side-panel">
        <button id="close-panel-btn" class="close-btn js-panel-btn">
            <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"></path></svg>
        </button>
        <button id="close-info-btn" class="close-btn js-panel-btn">
            <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"></path></svg>
        </button>

        <div class="side-panel-content">
            <div id="panel-search-placeholder"></div>
            
            <div id="info-panel-redesign" class="info-panel-redesign" hidden>
                <div class="info-panel-header">
                    <h2 id="info-name"></h2>
                    <p id="info-address"></p>
                    <div id="info-coords"></div>
                </div>
                <div class="info-panel-body">
                    <div class="weather-section">
                        <h4>Current Weather</h4>
                        <p id="weather-info"></p>
                    </div>
                    <div class="quick-facts-section">
                        <h4>Quick Facts</h4>
                        <p id="quick-facts-content"></p>
                    </div>
                    <div class="info-panel-actions">
                        <button id="get-route-btn" class="panel-btn">Get Directions</button>
                        <button id="start-navigation-btn" class="panel-btn panel-btn-start" hidden>Start Navigation</button>
                    </div>
                    <button id="exit-route-btn" class="panel-btn panel-btn-exit" hidden>Exit Navigation</button>
                </div>
            </div>

            <div id="directions-panel-redesign" class="directions-panel-redesign" hidden>
                <div class="directions-inputs">
                    <div class="input-group">
                        <label for="from-input">From:</label>
                        <input type="text" id="from-input" placeholder="Current location or address..." class="direction-input">
                        <div id="from-suggestions" class="search-suggestions"></div>
                    </div>
                    <div class="input-group">
                        <label for="to-input">To:</label>
                        <input type="text" id="to-input" placeholder="Destination address..." class="direction-input">
                        <div id="to-suggestions" class="search-suggestions"></div>
                    </div>
                    <button id="get-directions-btn" class="panel-btn">Get Directions</button>
                </div>
                <div id="route-panel-container">
                    <div id="route-section" hidden>
                        <h4>Route Summary</h4>
                        <div id="route-summary">
                            <span id="route-summary-time"></span>
                            <span id="route-summary-distance"></span>
                            <button id="start-navigation-btn-2" class="panel-btn panel-btn-start">Start Navigation</button>
                            <button id="share-route-btn" class="panel-btn">Share</button>
                        </div>
                        <div id="route-steps"></div>
                    </div>
                    <div id="route-preview-panel" hidden>
                        <h4 id="route-summary-preview"></h4>
                        <button id="show-full-route" class="panel-btn">Show Full Route Details</button>
                    </div>
                </div>
            </div>

            <div id="route-preview-panel" hidden>
                <h4 id="route-summary-preview"></h4>
                <button id="show-full-route" class="panel-btn">Show Full Route Details</button>
            </div>

            <div id="navigation-section" hidden>
                <div class="navigation-info">
                    <div class="nav-next-step">
                        <span class="nav-distance-text"></span>
                        <p class="nav-instruction-text"></p>
                    </div>
                    <div class="nav-eta">
                        ETA: <span id="eta-time">--:--</span>
                    </div>
                </div>
                <button id="exit-navigation-btn" class="panel-btn panel-btn-exit">Exit Navigation</button>
            </div>
            
            <button id="settings-btn" class="settings-btn js-settings-btn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"></path></svg>
            </button>
        </div>
    </div>
    
    <div id="settings-menu" class="settings-menu">
        <div class="settings-header">
            <h3>Settings</h3>
            <button id="close-settings-btn" class="close-btn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"></path></svg>
            </button>
        </div>
        <div class="settings-content">
            <div class="setting-group">
                <label class="setting-label">Map Style</label>
                <div class="radio-group">
                    <input type="radio" id="style-default" name="map-style" value="default" checked>
                    <label for="style-default">Streets</label>
                    <input type="radio" id="style-satellite" name="map-style" value="satellite">
                    <label for="style-satellite">Satellite</label>
                </div>
            </div>
            <hr>
            <div class="setting-group">
                <label class="setting-label">Live Traffic</label>
                <div class="toggle-switch">
                    <input type="checkbox" id="traffic-toggle" name="map-traffic">
                    <label for="traffic-toggle"></label>
                </div>
            </div>
            <hr>
            <div class="setting-group">
                <label class="setting-label">Units</label>
                <div class="radio-group">
                    <input type="radio" id="units-imperial" name="map-units" value="imperial" checked>
                    <label for="units-imperial">Imperial</label>
                    <input type="radio" id="units-metric" name="map-units" value="metric">
                    <label for="units-metric">Metric</label>
                </div>
            </div>
        </div>
    </div>
    
    <div id="map">
        <div id="map-watermark">TheBoiisMC</div>
    </div>
    <script src="js/auth.js" defer></script>
    <script src="js/map.js" defer></script>
    <script src="js/utils.js" defer ></script>
    <script src="js/map_layers.js" defer ></script>
    <script src="js/ui.js" defer></script>
    <script src="js/search.js" defer></script>
    <script src="js/navigation.js" defer></script>
    <script src="js/init.js" defer ></script>
    <script src="https://unpkg.com/maplibre-gl@3.4.1/dist/maplibre-gl.js"></script>
    <script src="https://npmcdn.com/@turf/turf@6.5.0/turf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/geolib@3.3.4/dist/geolib.min.js"></script>
</body>
</html>

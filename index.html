<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    
    <title>TheBoiisMC Maps</title>
    <meta name="description" content="Explore the world with private, modern mapping." />
    <meta name="theme-color" content="#00796b" />
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon512_rounded.png">
    
    
    <meta property="og:title" content="TheBoiisMC Maps" />
    <meta property="og:description" content="Explore the world with private, modern mapping." />
    <meta property="og:image" content="https://maps.theboiismc.com/icon512_rounded.png" />
    <meta property="og:url" content="https://maps.theboiismc.com" />
    <meta name="twitter:card" content="summary_large_image" />
    
    <script src="https://cdn.jsdelivr.net/npm/oidc-client-ts@2.2.0/dist/browser/oidc-client-ts.min.js" defer></script>
       <script src="https://unpkg.com/maplibre-gl@4.1.0/dist/maplibre-gl.js" defer></script>
    <script src='https://npmcdn.com/@turf/turf/turf.min.js' defer></script> 
    <link href="https://unpkg.com/maplibre-gl@4.1.0/dist/maplibre-gl.css" rel="stylesheet" />

        
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="top-banner">
        <span id="site-title">TheBoiisMC Maps</span>
        <div id="profile-area">
            <button class="js-settings-btn" aria-label="Map Settings">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-settings">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82-.33l-.06-.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V15z"></path>
                </svg>
            </button>
            <button id="profile-button" aria-label="User Profile">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-user">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </button>
            <div id="profile-dropdown">
                <div id="logged-in-view" hidden>
                    <div class="profile-section profile-section-header">
                        <div class="username">TheBoiisMC</div>
                        <div class="email">user@example.com</div>
                    </div>
                    <hr/>
                    <div class="profile-actions">
                        <a id="saved-places-btn">Saved Places</a>
                    </div>
                    <hr/>
                    <div class="profile-actions">
                        <a id="logout-btn">Log Out</a>
                    </div>
                </div>
                <div id="logged-out-view" hidden>
                    <div class="profile-section" style="text-align:center; font-weight: 500; color: #5f6368;">
                        Sign in to save and view places
                    </div>
                    <hr/>
                    <div class="auth-buttons">
                        <a href="#" id="login-btn" class="btn btn-primary">Log In</a>
                        <a href="#" id="signup-btn" class="btn btn-secondary">Sign Up</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="navigation-status">
        <div id="instruction-container">
            <div id="navigation-instruction">Starting navigation...</div>
            <div id="instruction-progress-bar"></div>
        </div>
        <div id="trip-stats-container">
            <div class="stat-item">
                <span id="stat-speed">--</span>
                <span class="stat-label">mph</span>
            </div>
            <div class="stat-item">
                <span id="stat-eta">--:--</span>
                <span class="stat-label">ETA</span>
            </div>
            <div class="stat-item">
                <span id="stat-time-remaining">-- min</span>
                <span class="stat-label">Time</span>
            </div>
        </div>
        <button id="end-navigation-btn">End Trip</button>
    </div>
    
    <div id="top-search-wrapper">
        <div id="main-search-container">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-search" id="search-icon-inside">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <input type="text" id="main-search" placeholder="Search TheBoiisMC Maps" />
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-navigation" id="main-directions-icon">
                <polygon points="3 11 22 2 13 21 11 13 3 11"></polygon>
            </svg>
            <div id="main-suggestions" class="suggestions-dropdown"></div>
        </div>
    </div>
    
    <div id="side-panel">
        <div id="panel-grabber"></div>
        <div id="panel-search-placeholder" hidden></div>
        <div class="panel-content">
            <div id="info-panel-redesign" hidden>
                <div class="header-image-container">
                    <img class="header-image" id="info-image" src="" alt="Image of the location"/>
                    <button id="close-info-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-arrow-left">
                            <line x1="19" y1="12" x2="5" y2="12"></line>
                            <polyline points="12 19 5 12 12 5"></polyline>
                        </svg>
                    </button>
                </div>
                <div class="info-content-padding">
                    <h3 id="info-name"></h3>
                    <div class="address" id="info-address"></div>
                    <div class="weather" id="info-weather"></div>
                    <div class="action-buttons">
                        <div class="btn-wrapper" id="info-directions-btn"><div class="icon-circle"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-navigation"><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></svg></div><div class="btn-label">Directions</div></div>
                        <div class="btn-wrapper" id="info-save-btn"><div class="icon-circle"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-bookmark"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg></div><div class="btn-label">Save</div></div>
                    </div>
                    <div id="quick-facts"><h4>Quick facts</h4><p id="quick-facts-content"></p></div>
                </div>
            </div>
            <div id="directions-panel-redesign" hidden>
                <div class="info-content-padding">
                    <div class="dir-input-group">
                        <div class="dir-input-wrapper"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-circle"><circle cx="12" cy="12" r="10"></circle></svg><input type="text" id="panel-from-input" placeholder="Choose starting point" autocomplete="off"/></div>
                        <div id="panel-from-suggestions" class="suggestions-dropdown"></div>
                        <div class="dir-input-wrapper"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-map-pin"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"></path></svg><input type="text" id="panel-to-input" placeholder="Choose destination" autocomplete="off"/></div>
                        <div id="panel-to-suggestions" class="suggestions-dropdown"></div>
                        <button id="swap-btn"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-refresh-cw"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.55 18.25a8 8 0 1 1 1.45-14.54"></path></svg></button>
                    </div>
                    <div class="dir-quick-select" id="dir-use-my-location"><div class="icon-wrapper"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-crosshair"><circle cx="12" cy="12" r="10"></circle><line x1="22" y1="12" x2="16" y2="12"></line><line x1="8" y1="12" x2="2" y2="12"></line><line x1="12" y1="22" x2="12" y2="16"></line><line x1="12" y1="8" x2="12" y2="2"></line></svg></div>Your location</div>
                    <button id="get-route-btn">Get Route</button><button id="back-to-info-btn">Back</button>
                </div>
            </div>
            <div id="route-preview-panel" hidden>
                <div class="info-content-padding">
                    <div class="route-summary">
                        <h3 id="route-summary-time">--</h3>
                        <div id="route-summary-distance"></div>
                    </div>
                    <div class="action-buttons">
                        <div class="btn-wrapper" id="start-navigation-btn"><div class="icon-circle"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-navigation"><polygon points="3 11 22 2 13 21 11 13 3 11"></polygon></svg></div><div class="btn-label">Start Trip</div></div>
                        <div class="btn-wrapper" id="share-route-btn"><div class="icon-circle"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-share-2"><circle cx="18" cy="18" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="6" r="3"></circle><line x1="18" y1="18" x2="8.59" y2="13.51"></line><line x1="18" y1="6" x2="8.59" y2="10.49"></line></svg></div><div class="btn-label">Share</div></div>
                    </div>
                    <button id="back-to-directions-btn">Back</button>
                </div>
            </div>
            <div id="route-section" hidden>
                <div class="info-content-padding"><h3>Route Steps</h3><button id="exit-route-btn">Back</button><ol id="route-steps"></ol></div>
            </div>
        </div>
    </div>
    
    <button id="mobile-settings-btn" class="js-settings-btn" aria-label="Map Settings">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-layers">
            <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
            <polyline points="2 17 12 22 22 17"></polyline>
            <polyline points="2 12 12 17 22 12"></polyline>
        </svg>
    </button>
    
    <div id="menu-overlay"></div>
    <div id="settings-menu">
        <div class="settings-menu-header">
            <h4>Map Settings</h4>
            <button id="close-settings-btn" aria-label="Close Settings">&times;</button>
        </div>
        <div class="settings-menu-content">
            <div class="setting-group">
                <label class="setting-label">Map Style</label>
                <div class="radio-group">
                    <input type="radio" id="style-default" name="map-style" value="default" checked>
                    <label for="style-default">Default</label>
                    <input type="radio" id="style-satellite" name="map-style" value="satellite">
                    <label for="style-satellite">Satellite</label>
                </div>
            </div>
            <hr>
            <div class="setting-group">
                <label class="setting-label">Live Traffic</label>
                <div class="toggle-switch">
                    <input type="checkbox" id="traffic-toggle" name="map-traffic">
                    <label for="traffic-toggle"></label>
                </div>
            </div>
            <hr>
            <div class="setting-group">
                <label class="setting-label">Units</label>
                <div class="radio-group">
                    <input type="radio" id="units-imperial" name="map-units" value="imperial" checked>
                    <label for="units-imperial">Imperial</label>
                    <input type="radio" id="units-metric" name="map-units" value="metric">
                    <label for="units-metric">Metric</label>
                </div>
            </div>
        </div>
    </div>
    
    <div id="map">
    </div>

    <script src="js/auth.js" defer></script>
    <script src="js/map.js" defer></script>
    <script src="js/utils.js" defer ></script>
    <script src="js/map_layers.js" defer ></script>
    <script src="js/ui.js" defer></script>
    <script src="js/search.js" defer></script>
    <script src="js/navigation.js" defer></script>
</body>
</html>

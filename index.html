<!-- index.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <!-- improved viewport + mobile scaling -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>TheBoiisMC Maps — Private, modern mapping</title>
  <meta name="description" content="TheBoiisMC Maps — private, privacy-first map interface with routing, live traffic, and a modern mobile experience." />
  <meta name="keywords" content="maps, privacy, open map, routing, navigation, TheBoiisMC" />
  <meta name="author" content="TheBoiisMC" />
  <meta name="theme-color" content="#00796b" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon512_rounded.png" />

  <!-- Open Graph / Twitter -->
  <meta property="og:title" content="TheBoiisMC Maps" />
  <meta property="og:description" content="Private, modern mapping with navigation, search and live traffic." />
  <meta property="og:image" content="https://maps.theboiismc.com/icon512_rounded.png" />
  <meta property="og:url" content="https://maps.theboiismc.com" />
  <meta name="twitter:card" content="summary_large_image" />

  <!-- Structured data (basic) -->
  <script type="application/ld+json">
  {
    "@context": "http://schema.org",
    "@type": "WebApplication",
    "name": "TheBoiisMC Maps",
    "url": "https://maps.theboiismc.com",
    "description": "Private, modern mapping with navigation and search.",
    "applicationCategory": "MapsApplication"
  }
  </script>

  <!-- Keep your existing CSP; ensure it's compatible with any added external resources -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://unpkg.com https://npmcdn.com https://cdn.jsdelivr.net https://static.cloudflareinsights.com 'unsafe-inline';
    style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com;
    img-src 'self' data: https:;
    font-src 'self' https://fonts.gstatic.com;
    connect-src 'self' https://accounts.theboiismc.com https://tiles.openfreemap.org https://server.arcgisonline.com https://nominatim.openstreetmap.org https://api.open-meteo.com https://en.wikipedia.org https://router.project-osrm.org https://cloudflareinsights.com https://api.maptiler.com;
    worker-src 'self' blob: https://unpkg.com;
  ">

  <!-- libs -->
  <script src="https://cdn.jsdelivr.net/npm/oidc-client-ts@2.2.0/dist/browser/oidc-client-ts.min.js" defer></script>
  <link href="https://unpkg.com/maplibre-gl@4.1.0/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.1.0/dist/maplibre-gl.js" defer></script>
  <script src="https://npmcdn.com/@turf/turf/turf.min.js" defer></script>

  <!-- Fonts + icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

  <!-- main styles -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- skip link -->
  <a href="#main-search" class="sr-only">Jump to search</a>

  <header id="top-banner" role="banner">
    <div class="left">
      <button id="open-panel-btn" aria-label="Open panel" class="icon-btn" title="Open panel">
        <span class="material-symbols-outlined">menu</span>
      </button>
      <span id="site-title">TheBoiisMC Maps</span>
    </div>
    <div class="right" id="profile-area" aria-haspopup="true">
      <button class="js-settings-btn icon-btn" aria-label="Map Settings" title="Settings">
        <span class="material-symbols-outlined">settings</span>
      </button>
      <button id="profile-button" class="icon-btn" aria-expanded="false" aria-controls="profile-dropdown" aria-label="User Profile">
        <span class="material-symbols-outlined">account_circle</span>
      </button>
      <div id="profile-dropdown" role="menu" aria-hidden="true">
        <div id="logged-in-view" hidden>
          <div class="profile-section profile-section-header" aria-hidden="false">
            <div class="username">TheBoiisMC</div>
            <div class="email">user@example.com</div>
          </div>
          <hr/>
          <div class="profile-actions">
            <button id="saved-places-btn" class="menu-item">Saved Places</button>
          </div>
          <hr/>
          <div class="profile-actions">
            <button id="logout-btn" class="menu-item">Log Out</button>
          </div>
        </div>
        <div id="logged-out-view" hidden>
          <div class="profile-section" style="text-align:center; font-weight: 500; color: #5f6368;">
            Sign in to save and view places
          </div>
          <hr/>
          <div class="auth-buttons">
            <a href="#" id="login-btn" class="btn btn-primary">Log In</a>
            <a href="#" id="signup-btn" class="btn btn-secondary">Sign Up</a>
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- floating search bar (visible on both) -->
  <div id="top-search-wrapper" role="search">
    <div id="main-search-container">
      <label for="main-search" class="sr-only">Search</label>
      <button id="search-icon-inside" class="icon-btn" aria-label="Search">
        <span class="material-symbols-outlined">search</span>
      </button>
      <input type="search" id="main-search" placeholder="Search TheBoiisMC Maps" autocomplete="off" />
      <button id="main-directions-icon" class="icon-btn" aria-label="Directions">
        <span class="material-symbols-outlined">directions</span>
      </button>
      <div id="main-suggestions" class="suggestions-dropdown" role="listbox" aria-label="Search suggestions"></div>
    </div>
  </div>

  <!-- map area -->
  <main id="map" role="application" aria-label="Map view">
    <div id="map-watermark">TheBoiisMC</div>
  </main>

  <!-- bottom sheet / side panel -->
  <aside id="side-panel" role="complementary" aria-hidden="true">
    <!-- panel content remains unchanged -->
    ... [all your sections remain exactly as you had] ...
  </aside>

  <!-- settings menu -->
  <div id="menu-overlay" tabindex="-1"></div>
  <div id="settings-menu" role="dialog" aria-modal="true" aria-hidden="true">
    <!-- settings content unchanged -->
  </div>

  <!-- mobile settings floating button -->
  <button id="mobile-settings-btn" class="icon-btn js-settings-btn" aria-label="Open settings">
    <span class="material-symbols-outlined">layers</span>
  </button>

  <!-- navigation status (bottom floating when active) -->
  <div id="navigation-status" aria-hidden="true">
    <div id="instruction-container" class="navigation-instruction-box">
      <div id="navigation-instruction">Starting navigation...</div>
      <div id="instruction-progress-bar"></div>
    </div>
    <div id="trip-stats-container" class="navigation-stats">
      <div class="stat-item"><span id="stat-speed">--</span><span class="stat-label">mph</span></div>
      <div class="stat-item"><span id="stat-eta">--:--</span><span class="stat-label">ETA</span></div>
      <div class="stat-item"><span id="stat-time-remaining">-- min</span><span class="stat-label">Time</span></div>
    </div>
    <button id="end-navigation-btn" class="nav-control-btn">End Trip</button>
  </div>

  <!-- toast container -->
  <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

  <!-- SR only helper -->
  <style>
    .sr-only { position: absolute !important; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
  </style>

  <!-- load main.js as module -->
  <script type="module" src="main.js"></script>
</body>
</html>

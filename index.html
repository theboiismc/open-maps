<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>TheBoiisMC Maps - Private Navigation & Directions</title>
    <meta name="description" content="Find driving directions, explore places, and get live traffic updates with TheBoiisMC Maps. Your private, modern, and secure mapping solution." />
    
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://maps.theboiismc.com/" />

    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://tiles.theboiismc.com" crossorigin>

    <meta name="theme-color" content="#030712" />
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="/assets/icon512_rounded.png">

    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"></noscript>

    <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet">
    <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js" defer></script>
    <link rel="stylesheet" href="https://static.theboiismc.com/css/map3.css">
</head>
<body>
    <a href="#main-search" class="skip-link">Skip to Search</a>
    <a href="#map" class="skip-link">Skip to Map</a>

    <header id="top-banner" role="banner">
        <a href="/" class="brand-logo-container" aria-label="TheBoiisMC Maps Home">
            <div class="brand-icon-box" aria-hidden="true">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 512" width="20" height="20" fill="white">
                    <path d="M0 336c0 79.5 64.5 144 144 144H512c70.7 0 128-57.3 128-128c0-61.9-44-113.6-102.4-125.4c4.1-10.7 6.4-22.4 6.4-34.6c0-53-43-96-96-96c-19.7 0-38.1 6-53.3 16.2C363.2 41.9 307.2 0 240 0 151.6 0 80 71.6 80 160c0 36.3 11.9 69.9 32.3 96.6C47.8 266 0 302.3 0 336z"/>
                </svg>
            </div>
            <span class="brand-text">TheBoiis<span class="text-brand">MC</span></span>
        </a>

        <nav id="profile-area" aria-label="User Menu">
            <button type="button" id="settings-icon-btn" aria-label="Map Settings" aria-haspopup="dialog">
                <span class="material-symbols-outlined" aria-hidden="true">tune</span>
            </button>
            <button type="button" id="profile-button" aria-label="User Profile" aria-expanded="false" aria-controls="profile-dropdown">
                <span class="material-symbols-outlined" aria-hidden="true">account_circle</span>
            </button>
            <button type="button" id="app-menu-button" aria-label="Open App Menu" aria-expanded="false" aria-controls="services-dropdown">
                <span class="material-symbols-outlined" aria-hidden="true">apps</span>
            </button>

            <div id="services-dropdown" role="menu" hidden>
                <a href="https://search.theboiismc.com" class="service-item" role="menuitem"><span class="material-symbols-outlined">search</span><span class="service-name">Search</span></a>
                </div>

            <div id="profile-dropdown" hidden>
                 </div>
        </nav>
    </header>
    
    <section id="navigation-status" aria-label="Navigation Status" hidden>
        <div id="lane-guidance-container"></div>
        <div id="instruction-container" aria-live="assertive" aria-atomic="true">
            <div id="maneuver-icon-wrapper" aria-hidden="true"><span id="maneuver-icon" class="material-symbols-outlined">straight</span></div>
            <div id="instruction-text-wrapper">
                <div id="instruction-dist">--</div>
                <div id="navigation-instruction">Starting navigation...</div>
            </div>
            <div id="instruction-progress-bar" style="transform: scaleX(0);" role="progressbar" aria-hidden="true"></div>
        </div>
        <div id="trip-stats-container">
            <div class="stat-item"><span id="stat-speed">--</span><span class="stat-label">mph</span></div>
            <div class="stat-item"><span id="stat-miles-remaining">--.-</span><span class="stat-label">mi</span></div>
            <div class="stat-item"><span id="stat-time-remaining">-- min</span><span class="stat-label">Time</span></div>
            <div class="stat-item"><span id="stat-eta">--:--</span><span class="stat-label">ETA</span></div>
        </div>
        <button id="end-navigation-btn" aria-label="End Navigation">End Trip</button>
    </section>
    
    <div id="top-search-wrapper" role="search">
        <div id="main-search-container">
            <span id="search-icon-inside" class="material-symbols-outlined" aria-hidden="true">search</span>
            <input type="text" id="main-search" placeholder="Search TheBoiisMC Maps" autocomplete="off" aria-label="Search Maps" />
            <button type="button" id="main-directions-icon" aria-label="Get Directions" style="background:none;border:none;cursor:pointer;">
                <span class="material-symbols-outlined" aria-hidden="true">directions</span>
            </button>
            
            <div id="main-suggestions" class="suggestions-dropdown" role="listbox">
                <div id="initial-suggestions-view">
                    <div id="recent-searches-container"></div>
                </div>
                <div id="api-suggestions-view" hidden></div>
            </div>
        </div>
    </div>
    
    <aside id="side-panel" aria-label="Map Details Panel">
        <div id="panel-grabber" aria-hidden="true"></div>
        <div id="panel-search-placeholder" hidden></div>
        <div class="panel-content">
            <div id="dynamic-content" aria-live="polite">
                </div>
        </div>
    </aside>
    
    <main id="map" role="application" aria-label="Interactive Map"></main>

    <div id="settings-modal" class="modal-container" role="dialog" aria-modal="true" aria-labelledby="settings-title">
        <div id="modal-overlay" class="modal-overlay" aria-hidden="true"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h4 id="settings-title">Map Settings</h4>
                <button id="close-settings-btn" class="modal-close-btn" aria-label="Close Settings">&times;</button>
            </div>
            <div class="modal-body">
                <button id="advanced-settings-btn" class="btn-link">Advanced Settings...</button>
            </div>
        </div>
    </div>

    <div id="advanced-settings-modal" class="modal-container" role="dialog" aria-modal="true" aria-labelledby="adv-settings-title">
        <div id="modal-overlay-advanced" class="modal-overlay" aria-hidden="true"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h4 id="adv-settings-title">Advanced Settings</h4>
                <button id="close-advanced-settings-btn" class="modal-close-btn" aria-label="Close Advanced Settings">&times;</button>
            </div>
            <div class="modal-body">
                </div>
        </div>
    </div>

    <div id="context-menu" role="menu" aria-label="Map Context Menu">
         <div id="context-menu-coords" aria-hidden="true"></div>
         <button class="context-menu-item" id="ctx-directions-from" role="menuitem"><span class="material-symbols-outlined">near_me</span> Directions from here</button>
         <button class="context-menu-item" id="ctx-directions-to" role="menuitem"><span class="material-symbols-outlined">place</span> Directions to here</button>
         <button class="context-menu-item" id="ctx-whats-here" role="menuitem"><span class="material-symbols-outlined">help_outline</span> What's here?</button>
    </div>
    
    <div id="rerouting-overlay" role="alert" aria-live="assertive">Rerouting...</div>
    <button id="search-this-area-btn" class="search-area-btn" hidden>Search this area</button>
    <div id="toast-container" role="status" aria-live="polite"></div>
    <div id="a11y-live-region" class="sr-only" aria-live="polite" aria-atomic="true"></div>
    
    <template id="tmpl-home">
        <div class="info-content-padding">
            <section class="welcome-header-section">
                <h3>Explore</h3>
                <p>Latest in your area</p>
            </section>
            <div id="home-recents-list" role="list"></div>
            <footer class="legal-footer"><p>Copyright &copy; 2025 TheBoiisMC</p></footer>
        </div>
    </template>
    <template id="tmpl-place-details">
        <div class="panel-hero">
            <div class="hero-image-wrapper">
                <img id="info-image" src="" alt="Location Image" style="opacity:0; transition:opacity 0.5s; width:100%; height:100%; object-fit:cover;"/>
                <div class="hero-gradient"></div>
            </div>
            <button id="details-back-btn" aria-label="Go Back" class="dynamic-back-btn" style="position:absolute; top:15px; left:15px; z-index:10; background:rgba(0,0,0,0.5); color:white; border:none; border-radius:50%; width:40px; height:40px; cursor:pointer;">
                <span class="material-symbols-outlined">arrow_back</span>
            </button>
            <div class="hero-text-content">
                <h3 id="info-name"></h3>
                <div id="info-weather" class="weather-badge" hidden>Loading...</div>
            </div>
        </div>
        <div class="info-content-padding">
            <div class="address-row"><span class="material-symbols-outlined" aria-hidden="true">location_on</span><p id="info-subtitle"></p></div>
            <div class="action-buttons modern-actions">
                <button class="btn-wrapper" id="btn-details-dir" aria-label="Get Directions">
                    <div class="icon-circle primary"><span class="material-symbols-outlined">directions</span></div>
                    <div class="btn-label">Directions</div>
                </button>
                <button class="btn-wrapper" id="btn-details-save" aria-label="Save Place">
                    <div class="icon-circle secondary"><span class="material-symbols-outlined">bookmark_border</span></div>
                    <div class="btn-label">Save</div>
                </button>
            </div>
            <hr class="panel-divider" />
            <div class="panel-card">
                <div class="card-header"><span class="material-symbols-outlined">info</span><h4>About</h4></div>
                <p id="quick-facts-content">Loading info...</p>
                <button id="info-website-btn" style="display:none; margin-top:10px;" class="btn-link">Visit Website</button>
            </div>
        </div>
    </template>
    
    <script src="https://static.theboiismc.com/js/identity/oidc-client-ts@2.2.0.js"></script>
    <script src="https://static.theboiismc.com/js/maps/turf.js" defer></script>
    <script src="https://static.theboiismc.com/js/maps/maps99.js" defer></script>
</body>
</html>

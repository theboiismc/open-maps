<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta property="og:title" content="TheBoiisMC Maps" />
  <meta property="og:description" content="Explore the world with private, modern mapping." />
  <meta property="og:image" content="https://maps.theboiismc.com/53e87aea-e737-4098-a968-363c73a31175.png" />
  <meta property="og:url" content="https://maps.theboiismc.com" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="TheBoiisMC Maps" />
  <meta name="twitter:description" content="Explore the world with private, modern mapping." />
  <meta name="twitter:image" content="https://maps.theboiismc.com/53e87aea-e737-4098-a968-363c73a31175.png" />
  <meta name="theme-color" content="#1a73e8" />
  <title>TheBoiisMC Maps</title>
  <link rel="icon" href="/53e87aea-e737-4098-a968-363c73a31175.png" />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@2.1.8/dist/maplibre-gl.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Main Search Bar Section -->
  <div id="main-search-container">
    <input type="text" id="main-search" placeholder="Search for a place..." />
    <div id="main-suggestions" class="suggestions-dropdown"></div>
  </div>

  <!-- Side Panel -->
  <div id="side-panel" aria-hidden="true">
    <div id="close-side-panel" class="close-btn">X</div>
    <div id="panel-arrow" class="panel-arrow">&#9665;</div>

    <!-- Place Info Section -->
    <div id="place-info-section" hidden>
      <h3 id="place-name">Place Name</h3>
      <p id="place-description">Description or Type</p>
      <p id="place-weather">Weather: TBD</p>
      <div id="place-images"></div>
      <button id="directions-btn">Get Directions</button>
    </div>

    <!-- Directions Section -->
    <div id="directions-section" hidden>
      <form id="directions-form">
        <label for="panel-from-input">From</label>
        <input type="text" id="panel-from-input" autocomplete="off" aria-autocomplete="list" aria-controls="panel-from-suggestions" aria-haspopup="listbox" />
        <div id="panel-from-suggestions" class="suggestions-dropdown"></div>

        <label for="panel-to-input">To</label>
        <input type="text" id="panel-to-input" autocomplete="off" aria-autocomplete="list" aria-controls="panel-to-suggestions" aria-haspopup="listbox" />
        <div id="panel-to-suggestions" class="suggestions-dropdown"></div>

        <button type="button" class="my-loc-btn">Use My Location</button>
        <button type="submit" id="route-btn">Get Route</button>
      </form>
      <button id="back-to-info-btn">Back</button>
    </div>

    <!-- Route Steps Section -->
    <div id="route-section" hidden>
      <h3>Route Steps</h3>
      <ol id="route-steps"></ol>
      <button id="exit-route-btn">Stop Navigation</button>
    </div>
  </div>

  <!-- Map Container -->
  <div id="map"></div>

  <!-- MapLibre GL JS -->
  <script src="https://unpkg.com/maplibre-gl@2.1.8/dist/maplibre-gl.js"></script>
  <!-- Fuse.js for fuzzy search -->
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
  <!-- Your main app logic -->
  <script src="app.js"></script>
</body>
</html>

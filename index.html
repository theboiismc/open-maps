<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="TheBoiisMC Maps - Navigate your world with style." />
    <meta property="og:title" content="TheBoiisMC Maps" />
    <meta property="og:description" content="Navigate your world with TheBoiisMC's sleek, modern maps." />
    <meta property="og:image" content="https://maps.theboiismc.com/preview.png" />
    <meta property="og:url" content="https://maps.theboiismc.com" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="stylesheet" href="styles.css" />
    <title>TheBoiisMC Maps</title>
  </head>
  <body>
    <div id="map"></div>

    <!-- Mobile Panel -->
    <div id="mobile-panel" class="panel mobile draggable hidden">
      <div class="panel-header">
        <div class="drag-handle"></div>
        <button id="close-panel" class="close-btn">×</button>
      </div>
      <div id="mobile-content">
        <section id="info-section" class="panel-section"></section>
        <section id="directions-section" class="panel-section hidden"></section>
        <section id="route-section" class="panel-section hidden"></section>
      </div>
    </div>

    <!-- Desktop Panel -->
    <div id="desktop-panel" class="panel desktop hidden">
      <div id="desktop-content">
        <section id="info-section-desktop" class="panel-section"></section>
        <section id="directions-section-desktop" class="panel-section hidden"></section>
        <section id="route-section-desktop" class="panel-section hidden"></section>
      </div>
    </div>

    <!-- Search UI -->
    <div class="search-container">
      <input type="text" id="search-input" placeholder="Search location..." autocomplete="off" />
      <div id="suggestions" class="suggestions"></div>
    </div>

    <!-- Directions UI -->
    <div class="directions-ui">
      <input type="text" id="start-input" placeholder="Start" />
      <input type="text" id="end-input" placeholder="Destination" />
      <button id="navigate-btn">Navigate</button>
    </div>

    <script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <script src="app.js"></script>
  </body>
</html>

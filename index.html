<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, user-scalable=no"
  />
  <title>Maps - TheBoiisMC</title>
  <link
    href="https://cdn.jsdelivr.net/npm/maplibre-gl@2.4.0/dist/maplibre-gl.css"
    rel="stylesheet"
  />
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f5f5;
    }
    #map {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }
    #side-panel {
      position: fixed;
      top: 0;
      left: 0;
      width: 25vw;
      max-width: 400px;
      height: 100vh;
      background: white;
      box-shadow: 2px 0 6px rgba(0, 0, 0, 0.15);
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      z-index: 1000;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
    }
    #side-panel.open {
      transform: translateX(0);
    }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .panel-header button {
      background: transparent;
      border: none;
      cursor: pointer;
      font-size: 20px;
      color: #333;
      padding: 4px 8px;
      border-radius: 4px;
    }
    .panel-header button:hover,
    .panel-header button:focus {
      background: #ddd;
      outline: none;
    }
    .search-bar {
      position: relative;
      margin-bottom: 10px;
    }
    .search-bar input {
      width: 100%;
      padding: 8px 12px;
      font-size: 16px;
      border: 1.5px solid #ccc;
      border-radius: 6px;
      transition: border-color 0.2s ease;
    }
    .search-bar input:focus {
      border-color: #1a73e8;
      outline: none;
    }
    #suggestions,
    #recent-searches,
    #from-suggestions,
    #to-suggestions {
      position: absolute;
      top: 38px;
      left: 0;
      width: 100%;
      background: white;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.15);
      border-radius: 0 0 6px 6px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 1500;
      display: none;
    }
    .suggestion {
      padding: 8px 12px;
      cursor: pointer;
    }
    .suggestion:hover {
      background: #1a73e8;
      color: white;
    }
    .suggestion.recent {
      font-style: italic;
      color: #666;
    }
    #place-name {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    #place-description {
      font-size: 1rem;
      color: #444;
      margin-bottom: 10px;
    }
    #place-weather {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 10px;
    }
    #place-images {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }
    #place-images img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border-radius: 6px;
      box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
    }
    #directions-btn {
      background: #1a73e8;
      color: white;
      border: none;
      padding: 8px 14px;
      font-size: 1rem;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
      margin-bottom: 10px;
      transition: background 0.3s ease;
    }
    #directions-btn:hover,
    #directions-btn:focus {
      background: #155ab6;
      outline: none;
    }
    #directions-section,
    #route-section {
      display: none;
    }
    #directions-section.active,
    #route-section.active {
      display: block;
    }
    #directions-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 12px;
    }
    #directions-form .search-bar {
      margin-bottom: 0;
    }
    #directions-form input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      font-size: 16px;
      border: 1.5px solid #ccc;
      border-radius: 6px;
    }
    #directions-form input[type="text"]:focus {
      border-color: #1a73e8;
      outline: none;
    }
    #directions-form button {
      padding: 10px;
      font-size: 1rem;
      border-radius: 6px;
      border: none;
      background: #1a73e8;
      color: white;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    #directions-form button:hover,
    #directions-form button:focus {
      background: #155ab6;
      outline: none;
    }
    #back-to-info-btn {
      background: transparent;
      color: #1a73e8;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      margin-bottom: 10px;
      padding: 0;
      text-align: left;
    }
    #back-to-info-btn:hover,
    #back-to-info-btn:focus {
      text-decoration: underline;
      outline: none;
    }
    #route-steps {
      list-style: decimal;
      padding-left: 18px;
      max-height: 200px;
      overflow-y: auto;
      margin: 0;
    }
    #error-message {
      background: #ff4d4d;
      color: white;
      padding: 8px 12px;
      margin-bottom: 10px;
      border-radius: 6px;
      font-weight: 600;
      display: none;
    }
    /* Tooltips styles handled inline in JS */
  </style>
</head>
<body>
  <div id="map"></div>

  <div id="side-panel" aria-hidden="true" role="region" aria-label="Information panel">
    <div class="panel-header">
      <button id="close-side-panel" aria-label="Close side panel">✖</button>
      <button id="panel-arrow" aria-label="Toggle side panel">⬅</button>
      <button id="panel-search-icon" aria-label="Focus search input">🔍</button>
    </div>

    <div id="error-message"></div>

    <div id="search-container" class="search-bar">
      <input
        type="search"
        id="search"
        placeholder="Search places..."
        autocomplete="off"
        aria-autocomplete="list"
        aria-controls="suggestions recent-searches"
        aria-expanded="false"
      />
      <div id="suggestions" role="listbox" tabindex="-1"></div>
      <div id="recent-searches" role="listbox" tabindex="-1"></div>
    </div>

    <!-- Place info -->
    <section id="place-info-section" tabindex="0">
      <h2 id="place-name" tabindex="0"></h2>
      <p id="place-description"></p>
      <p id="place-weather"></p>
      <div id="place-images"></div>
      <button id="directions-btn" aria-label="Get directions to this place">Get Directions</button>
    </section>

    <!-- Directions input -->
    <section id="directions-section" tabindex="0">
      <button id="back-to-info-btn" aria-label="Back to place info">← Back</button>
      <form id="directions-form" autocomplete="off">
        <div class="search-bar">
          <input
            type="text"
            id="from-input"
            placeholder="Start location"
            autocomplete="off"
            aria-autocomplete="list"
            aria-controls="from-suggestions"
            aria-expanded="false"
          />
          <button type="button" id="start-my-location-btn" aria-label="Use your location as start">📍 My Location</button>
          <div id="from-suggestions" role="listbox" tabindex="-1"></div>
        </div>
        <div class="search-bar">
          <input
            type="text"
            id="to-input"
            placeholder="Destination"
            autocomplete="off"
            aria-autocomplete="list"
            aria-controls="to-suggestions"
            aria-expanded="false"
          />
          <button type="button" id="dest-my-location-btn" aria-label="Use your location as destination">📍 My Location</button>
          <div id="to-suggestions" role="listbox" tabindex="-1"></div>
        </div>
        <button type="submit">Get Directions</button>
      </form>
      <div id="directions-result" aria-live="polite" aria-atomic="true"></div>
    </section>

    <!-- Route steps -->
    <section id="route-section" tabindex="0">
      <h3>Route Steps</h3>
      <ul id="route-steps"></ul>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
  <script src="app.js"></script>
</body>
</html>

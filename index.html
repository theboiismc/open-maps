<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    
    <title>TheBoiisMC Maps</title>
    <meta name="description" content="Explore the world with private, modern mapping." />
    <meta name="theme-color" content="#00796b" />
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon512_rounded.png">
    
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' https://unpkg.com https://npmcdn.com https://cdn.jsdelivr.net https://static.cloudflareinsights.com 'unsafe-inline';
        style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com;
        img-src 'self' data: https:;
        font-src 'self' https://fonts.gstatic.com;
        connect-src 'self' https://accounts.theboiismc.com https://nominatim.openstreetmap.org https://api.open-meteo.com https://en.wikipedia.org https://cloudflareinsights.com https://api.maptiler.com https://api.geoapify.com;
        worker-src 'self' blob: https://unpkg.com;
    ">
    
    <link rel="stylesheet" href="css/maplibre-gl.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/all.min.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap">
    <link rel="apple-touch-icon" href="icon512_rounded.png">
</head>
<body>
    <div id="side-panel-redesign" class="panel">
        <div id="panel-controls">
            <button id="close-panel-btn" class="icon-button"><i class="fa-solid fa-arrow-left-long"></i></button>
            <div id="panel-search-placeholder"></div>
        </div>

        <div id="info-panel-redesign">
            <div id="info-header">
                <img id="info-image" alt="Place image">
                <div id="info-details">
                    <h2 id="info-name"></h2>
                    <p id="info-address"></p>
                </div>
            </div>
            <div id="info-panel-content">
                <div class="info-section">
                    <button id="show-route-btn" class="action-button"><i class="fa-solid fa-route"></i> Get Directions</button>
                    <button id="share-route-btn" class="action-button"><i class="fa-solid fa-share-nodes"></i> Share</button>
                </div>
                <div class="info-section">
                    <h3>Weather</h3>
                    <p id="weather-content"></p>
                </div>
                <div class="info-section">
                    <h3>Quick Facts</h3>
                    <p id="quick-facts-content"></p>
                </div>
            </div>
        </div>

        <div id="directions-panel-redesign" hidden>
            <div class="directions-inputs">
                <div class="input-container">
                    <input type="text" id="from-input" class="search-input" placeholder="Current Location">
                    <div id="from-suggestions" class="suggestions-container"></div>
                </div>
                <div class="input-container">
                    <input type="text" id="to-input" class="search-input" placeholder="Destination">
                    <div id="to-suggestions" class="suggestions-container"></div>
                </div>
                <button id="get-route-btn" class="action-button"><i class="fa-solid fa-magnifying-glass-location"></i> Find Route</button>
            </div>
            <div id="route-preview-panel" class="route-preview" hidden>
                <p id="route-preview-summary" class="route-summary"></p>
                <div class="route-details">
                    <span id="route-preview-distance"></span>
                    <span id="route-preview-time"></span>
                </div>
                <div class="route-actions">
                    <button id="start-navigation-btn" class="action-button start-button">Start Navigation</button>
                    <button id="share-route-preview-btn" class="action-button"><i class="fa-solid fa-share-nodes"></i> Share</button>
                </div>
            </div>
            <div id="route-section" class="route-section" hidden>
                <div class="route-details-header">
                    <div class="eta-display">
                        <span id="eta-time">--:--</span>
                        <span id="eta-label">ETA</span>
                    </div>
                    <div class="distance-display">
                        <span id="distance-remaining">--</span>
                        <span id="distance-units">km</span>
                    </div>
                </div>
                <div class="route-instructions-container">
                    <ul id="route-instructions"></ul>
                </div>
                <div class="navigation-controls">
                    <button id="exit-route-btn" class="action-button">Exit Route</button>
                </div>
            </div>
        </div>
        
        <div id="settings-panel-redesign" hidden>
            <h3>Map Settings</h3>
            <hr>
            <div class="setting-group">
                <label class="setting-label">Style</label>
                <div class="radio-group">
                    <input type="radio" id="style-default" name="map-style" value="default" checked>
                    <label for="style-default">Default</label>
                    <input type="radio" id="style-streets" name="map-style" value="streets">
                    <label for="style-streets">Streets</label>
                    <input type="radio" id="style-satellite" name="map-style" value="satellite">
                    <label for="style-satellite">Satellite</label>
                </div>
            </div>
            <hr>
            <div class="setting-group">
                <label class="setting-label">Live Traffic</label>
                <div class="toggle-switch">
                    <input type="checkbox" id="traffic-toggle" name="map-traffic">
                    <label for="traffic-toggle"></label>
                </div>
            </div>
            <hr>
            <div class="setting-group">
                <label class="setting-label">Units</label>
                <div class="radio-group">
                    <input type="radio" id="units-imperial" name="map-units" value="imperial" checked>
                    <label for="units-imperial">Imperial</label>
                    <input type="radio" id="units-metric" name="map-units" value="metric">
                    <label for="units-metric">Metric</label>
                </div>
            </div>
        </div>
    </div>
    
    <div id="map">
        <div id="map-watermark">TheBoiisMC</div>
    </div>
    <script src="js/auth.js" defer></script>
    <script src="js/map.js" defer></script>
    <script src="js/utils.js" defer ></script>
    <script src="js/map_layers.js" defer ></script>
    <script src="js/ui.js" defer></script>
    <script src="js/search.js" defer></script>
    <script src="js/navigation.js" defer></script>
    <script src="js/init.js" defer ></script>
    <div id="search-results-panel" hidden></div>
    <div id="top-search-wrapper" class="search-bar-wrapper">
        <div id="main-search-container" class="search-container">
            <input type="text" id="main-search-input" class="search-input" placeholder="Search for places..." autocomplete="off">
            <div id="main-search-suggestions" class="suggestions-container"></div>
            <button id="open-settings-btn" class="icon-button"><i class="fa-solid fa-gear"></i></button>
            <button id="reset-map-btn" class="icon-button"><i class="fa-solid fa-crosshairs-simple"></i></button>
        </div>
    </div>
    <div id="nav-info-redesign" class="navigation-info-box" hidden>
        <p id="navigation-instruction" class="instruction-text"></p>
        <p id="navigation-subinstruction" class="instruction-text"></p>
        <span id="distance-to-maneuver" class="distance-text"></span>
    </div>
    <div id="spinner" class="spinner" hidden></div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    
    <!-- Title & Description -->
    <title>TheBoiisMC Maps – Self-Hosted, Privacy-First Mapping</title>
    <meta name="description" content="Explore TheBoiisMC Maps: fully self-hosted, privacy-focused maps and routing for modern navigation." />
    <meta name="keywords" content="TheBoiisMC, self-hosted maps, privacy, FOSS maps, mapping, navigation, open source" />
    <link rel="canonical" href="https://maps.theboiismc.com/" />

    <!-- Open Graph -->
    <meta property="og:title" content="TheBoiisMC Maps – Privacy-First Mapping" />
    <meta property="og:description" content="Explore fully self-hosted maps and privacy-focused services at TheBoiisMC." />
    <meta property="og:image" content="https://maps.theboiismc.com/icon512_rounded.png" />
    <meta property="og:url" content="https://maps.theboiismc.com" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "TheBoiisMC Maps",
      "url": "https://maps.theboiismc.com",
      "description": "Self-hosted, privacy-first mapping service.",
      "publisher": {
        "@type": "Organization",
        "name": "TheBoiisMC",
        "url": "https://www.theboiismc.com"
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://search.theboiismc.com/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Theme & Manifest -->
    <meta name="theme-color" content="#00796b">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon512_rounded.png">

    <!-- Styles -->
    <link href="libs/css/maplibre-gl-4.1.0.css" rel="stylesheet">
    <link rel="stylesheet" href="libs/css/styles.css">
   
</head>
<body>
    <!-- Main Menu / Header -->
    <nav id="main-menu">
        <div id="menu-left">
            <a href="https://www.theboiismc.com">TheBoiisMC Home</a>
        </div>
        <div id="menu-right">
            <a href="https://maps.theboiismc.com">Maps</a>
            <a href="https://www.theboiismc.com/privacy">Privacy</a>
            <a href="https://www.theboiismc.com/terms">Terms</a>
        </div>
    </nav>

    <!-- Top Banner / Profile Area -->
    <div id="top-banner">
        <span id="site-title">TheBoiisMC Maps</span>
        <div id="profile-area">
            <button class="js-settings-btn" aria-label="Map Settings">
                <span class="material-symbols-outlined">
                    <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </span>
            </button>
            <button id="profile-button" aria-label="User Profile">
                <span class="material-symbols-outlined">
                    <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M18 20a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2Z"></path>
                        <path d="M12 12a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"></path>
                        <path d="M6 18c0-2 4-3.5 6-3.5s6 1.5 6 3.5"></path>
                    </svg>
                </span>
            </button>
            <div id="profile-dropdown">
                <!-- Logged-in and Logged-out views here (same as original) -->
            </div>
        </div>
    </div>

    <!-- Top Search -->
    <div id="top-search-wrapper">
        <div id="main-search-container">
            <span id="search-icon-inside" class="material-symbols-outlined">
                <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
            </span>
            <input type="text" id="main-search" placeholder="Search TheBoiisMC Maps" autocomplete="off" />
            <span id="main-directions-icon" class="material-symbols-outlined">
                <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22a4 4 0 0 0 4-4h-8a4 4 0 0 0 4 4Z"/>
                    <path d="M12 2a4 4 0 0 0-4 4v1h8V6a4 4 0 0 0-4-4Z"/>
                    <path d="m15 11-3-3-3 3"/>
                    <path d="m9 13 3 3 3-3"/>
                </svg>
            </span>
            <div id="main-suggestions" class="suggestions-dropdown"></div>
        </div>
    </div>

    <!-- Map Container -->
    <div id="map"></div>
    <div id="toast-container"></div>

    <!-- Scripts -->
    <script src="libs/js/oidc-client-ts@2.2.0.js" defer></script>
    <script src="libs/js/maplibre-gl-4.1.0.js" defer></script>
    <script src="libs/js/turf-6.5.0.min.js" defer></script>
    <script src="app.js" defer></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open Map Search</title>
  <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: 'Segoe UI', sans-serif;
      background-color: #f4f4f4;
    }
    #map {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 100%;
    }
    .search-bar {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 600px;
      z-index: 1001;
      display: flex;
      background: rgba(255,255,255,0.85);
      border-radius: 30px;
      padding: 12px 20px;
      box-shadow: 0 2px 15px rgba(0,0,0,0.2);
    }
    #search {
      width: 100%;
      border: none;
      background: transparent;
      outline: none;
      font-size: 16px;
      color: #333;
    }
    #search::placeholder {
      color: #888;
    }
    #suggestions {
      position: absolute;
      top: 56px;
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 600px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.1);
      display: none;
      max-height: 200px;
      overflow-y: auto;
      z-index: 1002;
    }
    .suggestion {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
    }
    .suggestion:hover {
      background: #e0e0e0;
    }
    .info-box {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.9);
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.15);
      min-width: 250px;
      max-width: 90%;
      display: none;
      z-index: 1000;
    }
    .info-box h2 {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 600;
    }
    .info-box p {
      margin: 4px 0;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="search-bar">
    <input id="search" type="text" placeholder="Search city, state, place..." autocomplete="off" />
  </div>
  <div id="suggestions"></div>
  <div id="info" class="info-box">
    <h2>Location Info</h2>
    <p>Search for a location to see details.</p>
  </div>

  <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
  <script src="app.js"></script>
</body>
</html>

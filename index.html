<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>TheBoiIsMC Map</title>

<!-- MapLibre GL CSS -->
<link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet" />

<style>
  body, html {
    margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #121212; color: #e0e0e0;
  }
  #map {
    position: absolute; top: 0; bottom: 0; left: 0; right: 0;
  }

  #directions-icon {
    position: absolute;
    top: 20px; left: 20px;
    width: 36px; height: 36px;
    background: #6750a4;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    z-index: 10;
    transition: background-color 0.3s;
  }
  #directions-icon:hover {
    background: #836fff;
  }
  #directions-icon svg {
    fill: #fff;
    width: 22px;
    height: 22px;
  }

  #directions-form {
    position: absolute;
    top: 0; left: 0;
    width: 350px;
    height: 100%;
    background: #1e1e1e;
    box-shadow: 2px 0 8px rgba(0,0,0,0.7);
    transform: translateX(-100%);
    transition: transform 0.35s ease;
    display: flex;
    flex-direction: column;
    z-index: 15;
  }
  #directions-form.open {
    transform: translateX(0);
  }

  #close-directions {
    background: none;
    border: none;
    color: #ccc;
    font-size: 24px;
    padding: 15px 20px;
    cursor: pointer;
    align-self: flex-end;
  }
  #close-directions:hover {
    color: #fff;
  }

  #directions-inputs {
    display: flex;
    flex-direction: column;
    padding: 20px;
    gap: 12px;
    flex-grow: 1;
  }

  input[type="text"] {
    background: #2c2c2c;
    border: none;
    border-radius: 6px;
    padding: 10px 12px;
    color: #eee;
    font-size: 14px;
    outline-offset: 2px;
    outline-color: #6750a4;
  }
  input[type="text"]::placeholder {
    color: #aaa;
  }

  .suggestions {
    position: relative;
  }
  .suggestion {
    background: #3a3a3a;
    padding: 8px 12px;
    cursor: pointer;
    border-radius: 0 0 6px 6px;
  }
  .suggestion:hover, .suggestion:focus {
    background: #6750a4;
    outline: none;
  }

  #route-actions {
    display: none;
    padding: 0 20px 20px 20px;
    gap: 10px;
    flex-wrap: wrap;
  }
  #route-actions button {
    background: #6750a4;
    border: none;
    color: white;
    padding: 10px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
  }
  #route-actions button:hover {
    background: #836fff;
  }

  #route-info {
    padding: 10px 20px;
    font-weight: 600;
    font-size: 13px;
    color: #ccc;
  }

  #navigation-ui {
    display: none;
    flex-direction: column;
    padding: 15px 20px;
    border-top: 1px solid #444;
    background: #292929;
  }
  #navigation-steps {
    max-height: 180px;
    overflow-y: auto;
    margin-bottom: 15px;
  }
  .nav-step {
    padding: 8px 10px;
    border-radius: 4px;
    font-size: 14px;
    color: #bbb;
    margin-bottom: 6px;
  }
  .nav-step.current-step {
    background: #6750a4;
    color: #fff;
    font-weight: 700;
  }
  #navigation-ui button {
    background: #6750a4;
    border: none;
    color: white;
    padding: 10px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
  }
  #navigation-ui button:hover {
    background: #836fff;
  }
  #stop-navigation {
    display: none;
  }

  #style-toggle {
    position: absolute;
    bottom: 20px;
    left: 20px;
    background: #292929;
    border-radius: 10px;
    padding: 6px 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;
    z-index: 12;
    width: 110px;
    box-shadow: 0 0 10px rgba(103, 80, 164, 0.8);
    transition: left 0.35s ease;
  }
  #style-toggle:focus {
    outline: 2px solid #6750a4;
    outline-offset: 2px;
  }
  #style-toggle img {
    width: 24px;
    height: 24px;
    filter: drop-shadow(0 0 2px rgba(0,0,0,0.7));
  }
  #style-label {
    color: #ccc;
    font-weight: 600;
    font-size: 14px;
  }

  .search-bar {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 320px;
    display: flex;
    flex-direction: column;
    z-index: 11;
  }
  #search {
    background: #2c2c2c;
    border: none;
    border-radius: 6px;
    padding: 10px 14px;
    color: #eee;
    font-size: 14px;
    outline-offset: 2px;
    outline-color: #6750a4;
  }
  #search::placeholder {
    color: #aaa;
  }
</style>
</head>
<body>

<div id="map"></div>

<div class="search-bar">
  <input type="text" id="search" placeholder="Search location..." autocomplete="off" />
  <div id="suggestions" class="suggestions"></div>
</div>

<div id="directions-icon" title="Open Directions Panel" role="button" tabindex="0" aria-label="Open directions panel">
  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2L3 7v8c0 4 3 7 7 7h4c4 0 7-3 7-7V7l-9-5zM7 15l5-5 5 5H7z"></path></svg>
</div>

<div id="directions-form" aria-label="Directions Panel" role="region" aria-hidden="true">
  <button id="close-directions" aria-label="Close directions panel">&times;</button>

  <div id="directions-inputs">
    <div class="suggestions">
      <input type="text" id="origin" placeholder="Start point" autocomplete="off" aria-autocomplete="list" aria-haspopup="true" />
      <div id="origin-suggestions" class="suggestions"></div>
    </div>
    <div class="suggestions">
      <input type="text" id="destination" placeholder="Destination" autocomplete="off" aria-autocomplete="list" aria-haspopup="true" />
      <div id="destination-suggestions" class="suggestions"></div>
    </div>
  </div>

  <div id="route-actions">
    <button id="get-route">Get Directions</button>
    <button id="clear-route">Clear</button>
    <div id="route-info" role="region" aria-live="polite" aria-atomic="true"></div>
  </div>

  <div id="navigation-ui">
    <div id="navigation-steps"></div>
    <button id="start-navigation">Start Navigation</button>
    <button id="stop-navigation">Stop Navigation</button>
  </div>
</div>

<div id="style-toggle" aria-label="Toggle map style" role="button" tabindex="0" aria-pressed="false">
  <img id="style-icon" src="default_style.png" alt="Map style icon" />
  <span id="style-label">Regular</span>
</div>

<script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
<script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TheBoiisMC Map</title>
  <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    /* Banner styling */
    #top-banner {
      width: 100%;
      background: linear-gradient(90deg, #005bff, #0088ff);
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-weight: 700;
      font-size: 1.4rem;
      text-align: center;
      padding: 14px 0;
      letter-spacing: 2px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      user-select: none;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 9999;
    }
    body, html {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }
    /* Map below banner */
    #map {
      position: absolute;
      top: 56px; /* banner height */
      bottom: 0;
      width: 100%;
    }
    /* Search bar styling */
    .search-bar {
      position: fixed;
      top: 56px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10000;
      width: 90%;
      max-width: 500px;
      display: flex;
      gap: 6px;
      background: white;
      border-radius: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      padding: 8px 14px;
      align-items: center;
    }
    .search-bar input {
      border: none;
      outline: none;
      flex-grow: 1;
      font-size: 16px;
      padding: 8px 12px;
      border-radius: 14px;
    }
    .search-bar button {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      color: #005bff;
    }
    /* Dropdown suggestions and recent */
    #recent-searches, #suggestions {
      position: fixed;
      top: calc(56px + 50px);
      left: 50%;
      transform: translateX(-50%);
      width: 90%;
      max-width: 500px;
      background: white;
      border-radius: 14px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.15);
      max-height: 220px;
      overflow-y: auto;
      z-index: 10000;
      display: none;
    }
    .suggestion, .recent-item, .dir-suggestion-item {
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
      font-size: 15px;
      user-select: none;
    }
    .suggestion:hover, .recent-item:hover, .dir-suggestion-item:hover {
      background: #e6f0ff;
    }

    /* Side Panel */
    #side-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 40vh;
      background: #fff;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.2);
      border-radius: 20px 20px 0 0;
      padding: 20px;
      transition: transform 0.3s ease-out;
      z-index: 9998;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      transform: translateY(100%);
    }
    #side-panel.expanded {
      height: 75vh;
    }
    @media (min-width: 769px) {
      #side-panel {
        top: 56px;
        bottom: 0;
        width: 380px;
        height: 100%;
        border-radius: 0 0 0 20px;
        transform: translateX(-100%);
        flex-direction: column;
      }
      #side-panel.expanded {
        height: 100%;
      }
    }

    #close-side-panel {
      position: absolute;
      top: 14px;
      right: 14px;
      background: transparent;
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: #333;
      user-select: none;
    }
    /* Panel header: arrow, place name, search icon */
    #panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
      margin-bottom: 10px;
    }
    #panel-arrow, #panel-search-icon {
      font-size: 22px;
      color: #005bff;
      cursor: pointer;
      user-select: none;
      flex: 0 0 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #place-name {
      font-weight: 700;
      font-size: 1.5rem;
      color: #003bb5;
      text-align: center;
      flex-grow: 1;
      user-select: text;
      padding: 0 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* Images container */
    #place-images {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 8px;
    }
    #place-images img {
      width: 120px;
      height: 80px;
      object-fit: cover;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      flex-shrink: 0;
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    #place-images img:hover {
      transform: scale(1.05);
    }

    /* Directions button */
    #directions-btn {
      margin-top: 10px;
      background: #005bff;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 24px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 12px rgba(0, 91, 255, 0.6);
      user-select: none;
      width: fit-content;
      align-self: center;
      transition: background-color 0.3s ease;
    }
    #directions-btn:hover {
      background: #003bb5;
    }
    /* Directions icon inline SVG */
    #directions-btn svg {
      width: 18px;
      height: 18px;
      fill: white;
    }

    /* Quick Facts */
    #quick-facts {
      margin-top: 15px;
      font-size: 14px;
      color: #444;
    }
    #quick-facts h3 {
      font-weight: 700;
      color: #005bff;
      margin-bottom: 8px;
    }
    #place-description {
      margin-top: 10px;
      font-size: 15px;
      color: #222;
      line-height: 1.3;
    }
    #place-weather {
      margin-top: 8px;
      font-style: italic;
      color: #0073e6;
    }

    /* Directions panel styling */
    #directions-content {
      display: none;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
    }
    #directions-content.active {
      display: flex;
    }
    .dir-input-group {
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .dir-input-group input {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1.5px solid #ccc;
      font-size: 15px;
      outline: none;
      transition: border-color 0.3s ease;
    }
    .dir-input-group input:focus {
      border-color: #005bff;
      box-shadow: 0 0 8px rgba(0, 91, 255, 0.5);
    }
    .dir-suggestions {
      position: absolute;
      top: 42px;
      left: 0;
      right: 0;
      max-height: 150px;
      overflow-y: auto;
      background: white;
      border-radius: 10px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
      z-index: 100000;
      display: none;
    }
    .dir-suggestion-item {
      padding: 10px 12px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }
    .dir-suggestion-item:hover {
      background: #e6f0ff;
    }
    #directions-back-btn {
      background: none;
      border: none;
      color: #005bff;
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 6px;
      user-select: none;
      align-self: flex-start;
      padding-left: 0;
    }
    #your-location-btn {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: #005bff;
      border: none;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      box-shadow: 0 3px 8px rgba(0,91,255,0.7);
    }
    #your-location-btn:hover {
      background: #003bb5;
    }
    #your-location-btn svg {
      width: 16px;
      height: 16px;
      fill: white;
    }
  </style>
</head>
<body>

  <div id="top-banner" aria-label="TheBoiisMC Maps Banner">THEBOIISMC MAPS</div>

  <div id="map"></div>

  <div class="search-bar">
    <input id="search" placeholder="Search a place..." autocomplete="off" spellcheck="false" aria-label="Search places" />
    <button id="search-icon" aria-label="Search button">🔍</button>
  </div>

  <div id="recent-searches" role="listbox" aria-label="Recent searches"></div>
  <div id="suggestions" role="listbox" aria-label="Search suggestions"></div>

  <!-- Side panel -->
  <div id="side-panel" class="hidden" aria-live="polite" aria-atomic="true" aria-label="Place information panel">
    <button id="close-side-panel" aria-label="Close panel">×</button>
    <div id="panel-header">
      <div id="panel-arrow" title="Expand/collapse panel" role="button" tabindex="0">⬇️</div>
      <h2 id="place-name">Loading...</h2>
      <div id="panel-search-icon" title="Focus search" role="button" tabindex="0">🔍</div>
    </div>
    <button id="directions-btn" aria-label="Get directions">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2L3.5 20.29l1.42 1.42L12 5.84l7.08 15.87 1.42-1.42z"/></svg>
      Directions
    </button>
    <div id="place-images" aria-label="Place images"></div>
    <p id="place-description">Loading description...</p>
    <div id="quick-facts" aria-label="Quick facts about place">
      <h3>Quick Facts</h3>
      <p id="place-weather">Loading weather...</p>
    </div>

    <!-- Directions panel content -->
    <div id="directions-content" aria-label="Directions panel">
      <button id="directions-back-btn" aria-label="Back to place info">← Back</button>
      <div class="dir-input-group" style="position:relative;">
        <input id="dir-start" placeholder="Starting point" aria-label="Starting point" autocomplete="off" spellcheck="false" />
        <button id="your-location-btn" title="Use your location" aria-label="Use your current location">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 8a4 4 0 1 1 0 8 4 4 0 0 1 0-8zM3 12a9 9 0 1 0 18 0 9 9 0 0 0-18 0z"/></svg>
        </button>
        <div id="dir-start-suggestions" class="dir-suggestions" role="listbox"></div>
      </div>
      <div class="dir-input-group" style="position:relative;">
        <input id="dir-end" placeholder="Destination" aria-label="Destination" autocomplete="off" spellcheck="false" />
        <div id="dir-end-suggestions" class="dir-suggestions" role="listbox"></div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
  <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    
    <title>TheBoiisMC Maps</title>
    <meta name="description" content="Explore the world with private, modern mapping." />
    <meta name="theme-color" content="#00796b" />
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon512_rounded.png">
    
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' https://unpkg.com https://npmcdn.com https://cdn.jsdelivr.net https://static.cloudflareinsights.com 'unsafe-inline';
        style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com;
        img-src 'self' data: https:;
        font-src https://fonts.gstatic.com;
        connect-src 'self' https://accounts.theboiismc.com https://tiles.openfreemap.org https://server.arcgisonline.com https://nominatim.openstreetmap.org https://api.open-meteo.com https://en.wikipedia.org https://router.project-osrm.org https://cloudflareinsights.com;
        worker-src 'self' blob: https://unpkg.com;
    ">
    
    <meta property="og:title" content="TheBoiisMC Maps" />
    <meta property="og:description" content="Explore the world with private, modern mapping." />
    <meta property="og:image" content="https://maps.theboiismc.com/icon512_rounded.png" />
    <meta property="og:url" content="https://maps.theboiismc.com" />
    <meta name="twitter:card" content="summary_large_image" />
    
    <script src="https://cdn.jsdelivr.net/npm/oidc-client-ts@2.2.0/dist/browser/oidc-client-ts.min.js"></script>
    
    <link href="https://unpkg.com/maplibre-gl@4.1.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@4.1.0/dist/maplibre-gl.js"></script>
    <script src='https://npmcdn.com/@turf/turf/turf.min.js'></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="top-banner">
        <span id="site-title">TheBoiisMC Maps</span>
        <div id="profile-area">
            <button class="js-settings-btn" aria-label="Map Settings">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32c-2.81-2.58-6.55-5.91-6.55-9.18 0-2.8 2.2-5 5-5 1.54 0 3.05.7 4 1.83C12.95 7.68 14.46 7 16 7c2.8 0 5 2.2 5 5 0 3.27-3.74 6.6-6.55 9.18z"/></svg>
            </button>
            <button id="profile-button" aria-label="User Profile">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.93 0 3.5 1.57 3.5 3.5S13.93 12 12 12s-3.5-1.57-3.5-3.5S10.07 5 12 5zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>
            </button>
            <div id="profile-dropdown">
                <div id="logged-in-view" hidden>
                    <div class="profile-section profile-section-header">
                        <div class="username">TheBoiisMC</div>
                        <div class="email">user@example.com</div>
                    </div>
                    <hr/>
                    <div class="profile-actions">
                        <a id="saved-places-btn">Saved Places</a>
                    </div>
                    <hr/>
                    <div class="profile-actions">
                        <a id="logout-btn">Log Out</a>
                    </div>
                </div>
                <div id="logged-out-view" hidden>
                    <div class="profile-section" style="text-align:center; font-weight: 500; color: #5f6368;">
                        Sign in to save and view places
                    </div>
                    <hr/>
                    <div class="auth-buttons">
                        <a href="#" id="login-btn" class="btn btn-primary">Log In</a>
                        <a href="#" id="signup-btn" class="btn btn-secondary">Sign Up</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="navigation-status">
        <div id="instruction-container">
            <svg id="instruction-icon" class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
            <div id="navigation-instruction">Starting navigation...</div>
            <div id="instruction-progress-bar"></div>
        </div>
        <div id="trip-stats-container">
            <div class="stat-item">
                <span id="stat-speed">--</span>
                <span class="stat-label">mph</span>
            </div>
            <div class="stat-item">
                <span id="stat-eta">--:--</span>
                <span class="stat-label">ETA</span>
            </div>
            <div class="stat-item">
                <span id="stat-time-remaining">-- min</span>
                <span class="stat-label">Time</span>
            </div>
        </div>
        <button id="end-navigation-btn">End Trip</button>
    </div>
    
    <div id="top-search-wrapper">
        <div id="main-search-container">
            <svg id="search-icon-inside" class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <input type="text" id="main-search" placeholder="Search TheBoiisMC Maps" />
            <svg id="main-directions-icon" class="directions-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s-8-4-8-10v-5c0-1.1.9-2 2-2h12a2 2 0 0 1 2 2v5c0 6-8 10-8 10z"></path></svg>
            <div id="main-suggestions" class="suggestions-dropdown"></div>
        </div>
    </div>
    
    <div id="side-panel">
        <div id="panel-grabber"></div>
        <div id="panel-search-placeholder" hidden></div>
        <div class="panel-content">
            <div id="info-panel-redesign" hidden>
                <div class="header-image-container">
                    <img class="header-image" id="info-image" src="" alt="Image of the location"/>
                    <button id="close-info-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
                <div class="info-content-padding">
                    <h3 id="info-name"></h3>
                    <div class="address" id="info-address"></div>
                    <div class="weather" id="info-weather"></div>
                    <div class="action-buttons">
                        <div class="btn-wrapper" id="info-directions-btn"><div class="icon-circle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s-8-4-8-10v-5c0-1.1.9-2 2-2h12a2 2 0 0 1 2 2v5c0 6-8 10-8 10z"></path></svg></div><div class="btn-label">Directions</div></div>
                        <div class="btn-wrapper" id="info-save-btn"><div class="icon-circle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path></svg></div><div class="btn-label">Save</div></div>
                    </div>
                    <div id="quick-facts"><h4>Quick facts</h4><p id="quick-facts-content"></p></div>
                </div>
            </div>
            <div id="directions-panel-redesign" hidden>
                <div class="info-content-padding">
                    <div class="dir-input-group">
                        <div class="dir-input-wrapper"><svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M10 16.5l4-4-4-4"/></svg><input type="text" id="panel-from-input" placeholder="Choose starting point" autocomplete="off"/></div>
                        <div id="panel-from-suggestions" class="suggestions-dropdown"></div>
                        <div class="dir-input-wrapper"><svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg><input type="text" id="panel-to-input" placeholder="Choose destination" autocomplete="off"/></div>
                        <div id="panel-to-suggestions" class="suggestions-dropdown"></div>
                        <button id="swap-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg></button>
                    </div>
                    <div class="dir-quick-select" id="dir-use-my-location"><div class="icon-wrapper"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="3"></circle></svg></div>Your location</div>
                    <button id="get-route-btn">Get Route</button><button id="back-to-info-btn">Back</button>
                </div>
            </div>
            <div id="route-preview-panel" hidden>
                <div class="info-content-padding">
                    <div class="route-summary">
                        <h3 id="route-summary-time">--</h3>
                        <div id="route-summary-distance"></div>
                    </div>
                    <div class="action-buttons">
                        <div class="btn-wrapper" id="start-navigation-btn"><div class="icon-circle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s-8-4-8-10v-5c0-1.1.9-2 2-2h12a2 2 0 0 1 2 2v5c0 6-8 10-8 10z"></path></svg></div><div class="btn-label">Start Trip</div></div>
                        <div class="btn-wrapper" id="share-route-btn"><div class="icon-circle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg></div><div class="btn-label">Share</div></div>
                    </div>
                    <button id="back-to-directions-btn">Back</button>
                </div>
            </div>
            <div id="route-section" hidden>
                <div class="info-content-padding"><h3>Route Steps</h3><button id="exit-route-btn">Back</button><ol id="route-steps"></ol></div>
            </div>
        </div>
    </div>
    <button id="close-panel-btn" title="Close Panel"></button>
    <button id="mobile-settings-btn" class="js-settings-btn" aria-label="Map Settings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1.03 1.25c-.21.98-.16 2.2-1.5 2.2a1.65 1.65 0 0 0-1.25-.97 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0-.33-1.82 1.65 1.65 0 0 0-1.25-1.03c-.98-.21-2.2-.16-2.2-1.5a1.65 1.65 0 0 0 .97-1.25 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33 1.65 1.65 0 0 0 1.03-1.25c.21-.98.16-2.2 1.5-2.2a1.65 1.65 0 0 0 1.25.97 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82z"></path></svg>
    </button>
    
    <div id="menu-overlay"></div>
    <div id="settings-menu">
        <div class="settings-menu-header">
            <h4>Map Settings</h4>
            <button id="close-settings-btn" aria-label="Close Settings">×</button>
        </div>
        <div class="settings-menu-content">
            <div class="setting-group">
                <label class="setting-label">Map Style</label>
                <div class="radio-group">
                    <input type="radio" id="style-default" name="map-style" value="default" checked>
                    <label for="style-default">Default</label>
                    <input type="radio" id="style-satellite" name="map-style" value="satellite">
                    <label for="style-satellite">Satellite</label>
                </div>
            </div>
            <hr>
            <div class="setting-group">
                <label class="setting-label">Units</label>
                <div class="radio-group">
                    <input type="radio" id="units-imperial" name="map-units" value="imperial" checked>
                    <label for="units-imperial">Imperial</label>
                    <input type="radio" id="units-metric" name="map-units" value="metric">
                    <label for="units-metric">Metric</label>
                </div>
            </div>
        </div>
    </div>
    
    <div id="map">
        <div id="map-watermark">TheBoiisMC</div>
    </div>
    <script src="app.js"></script>
</body>
</html>

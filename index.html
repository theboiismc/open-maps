<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Modern Map with Info Panel</title>
  <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: 'Segoe UI', sans-serif;
    }

    #map {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 300px;
      right: 0;
    }

    .sidebar {
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 300px;
      background: #fff;
      box-shadow: 2px 0 6px rgba(0,0,0,0.1);
      padding: 16px;
      overflow-y: auto;
      z-index: 999;
    }

    .sidebar h2 {
      margin-top: 0;
      font-size: 18px;
    }

    .search-container {
      width: 100%;
      position: relative;
    }

    #search {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: none;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
      outline: none;
    }

    #suggestions {
      position: absolute;
      top: 42px;
      left: 0;
      right: 0;
      background: white;
      border-radius: 8px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
      display: none;
      max-height: 200px;
      overflow-y: auto;
      z-index: 1000;
    }

    .suggestion {
      padding: 10px;
      cursor: pointer;
    }

    .suggestion:hover {
      background: #f0f0f0;
    }

    @media (max-width: 600px) {
      .sidebar {
        width: 100%;
        height: auto;
        bottom: auto;
        left: 0;
        top: 0;
      }
      #map {
        top: 200px;
        left: 0;
      }
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="search-container">
      <input id="search" type="text" placeholder="Search city, state, place..." autocomplete="off" />
      <div id="suggestions"></div>
    </div>
    <div id="info" style="margin-top: 20px;">
      <h2>Location Info</h2>
      <p>Search for a location to see details here.</p>
    </div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
  <script src="app.js"></script>
</body>
</html>

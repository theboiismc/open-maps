<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TheBoiisMC Maps</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/maplibre-gl@2.1.1/dist/maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.4.6/dist/fuse.min.js"></script>
</head>
<body>
  <div id="map"></div>
  <div id="main-search-container">
    <input type="text" id="main-search" placeholder="Search places">
    <div id="main-suggestions"></div>
    <button id="main-search-icon">🔍</button>
  </div>

  <div id="side-panel" aria-hidden="true">
    <div id="place-info-section">
      <h2 id="place-name"></h2>
      <p id="place-description"></p>
      <p id="place-weather"></p>
      <div id="place-images"></div>
      <button id="directions-btn">Get Directions</button>
    </div>

    <div id="directions-section" hidden>
      <form id="directions-form">
        <input type="text" id="panel-from-input" placeholder="From" />
        <div id="panel-from-suggestions"></div>
        <input type="text" id="panel-to-input" placeholder="To" />
        <div id="panel-to-suggestions"></div>
        <button type="submit">Get Route</button>
      </form>
      <button id="back-to-info-btn">Back to Info</button>
    </div>

    <div id="route-section" hidden>
      <ul id="route-steps"></ul>
      <button id="exit-route-btn">Exit Route</button>
    </div>

    <button id="close-side-panel">Close Panel</button>
    <button id="panel-arrow">→</button>
  </div>

  <script src="app.js"></script>
</body>
</html>

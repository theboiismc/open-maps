<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Map Navigation with Photon Search & OSRM Routing</title>
<link href="https://unpkg.com/maplibre-gl@2.1.9/dist/maplibre-gl.css" rel="stylesheet" />
<style>
  body, html {
    margin: 0; padding: 0; height: 100%; font-family: Arial, sans-serif;
    display: flex; flex-direction: column;
  }
  #map {
    flex-grow: 1;
  }
  #search-container {
    position: absolute;
    top: 12px; left: 50%; transform: translateX(-50%);
    width: 300px;
    z-index: 10;
  }
  #search {
    width: 100%;
    padding: 10px;
    font-size: 16px;
    border-radius: 24px;
    border: 1px solid #ccc;
    box-shadow: 0 2px 4px rgb(0 0 0 / 0.1);
  }
  .suggestions {
    background: white;
    border-radius: 8px;
    max-height: 240px;
    overflow-y: auto;
    box-shadow: 0 2px 10px rgb(0 0 0 / 0.15);
    margin-top: 4px;
    display: none;
    font-size: 14px;
  }
  .suggestion {
    padding: 8px 12px;
    cursor: pointer;
  }
  .suggestion:hover, .suggestion:focus {
    background: #e0e0e0;
    outline: none;
  }
  .loading, .error {
    padding: 8px 12px;
    color: #888;
    font-style: italic;
  }

  /* Bottom-left controls container */
  #bottom-left-controls {
    position: absolute;
    bottom: 20px;
    left: 20px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  button.control-btn {
    background: white;
    border: none;
    padding: 10px 16px;
    border-radius: 28px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s ease;
    user-select: none;
  }
  button.control-btn:hover {
    background: #f0f0f0;
  }

  /* Satellite / Regular toggle buttons */
  #layer-toggle {
    display: flex;
    gap: 8px;
  }
  #layer-toggle button {
    min-width: 90px;
  }
  #layer-toggle button.active {
    background: #4287f5;
    color: white;
  }

  /* Directions panel */
  #directions-form {
    position: absolute;
    bottom: 80px;
    left: 20px;
    width: 320px;
    max-height: 400px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 14px rgba(0,0,0,0.2);
    padding: 16px;
    font-size: 14px;
    overflow-y: auto;
    z-index: 10;
    display: none;
    flex-direction: column;
    gap: 12px;
  }
  #directions-form label {
    font-weight: 700;
    margin-bottom: 4px;
    display: block;
  }
  #directions-form input[type="text"] {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid #ccc;
    border-radius: 20px;
    font-size: 14px;
  }
  .directions-suggestions {
    position: relative;
  }
  .directions-suggestions .suggestions {
    position: absolute;
    top: 38px;
    width: 100%;
    z-index: 20;
  }
  #directions-buttons {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
  }
  #directions-buttons button {
    flex: 1;
    padding: 10px;
    border-radius: 24px;
    font-weight: 700;
  }
  #get-route {
    background: #4287f5;
    color: white;
    border: none;
  }
  #clear-route {
    background: #e0e0e0;
    border: none;
  }

  /* Steps list */
  #steps {
    margin-top: 12px;
    max-height: 150px;
    overflow-y: auto;
  }
  .step {
    padding: 6px 8px;
    border-bottom: 1px solid #eee;
  }
  .step:last-child {
    border-bottom: none;
  }
</style>
</head>
<body>
  <div id="map"></div>

  <div id="search-container" role="search">
    <input id="search" type="search" autocomplete="off" placeholder="Search for places..." aria-label="Main search" />
    <div id="suggestions" class="suggestions" role="listbox" aria-label="Search suggestions"></div>
  </div>

  <div id="bottom-left-controls">
    <div id="layer-toggle" role="group" aria-label="Map layers toggle">
      <button id="regular-toggle" class="control-btn active" aria-pressed="true">Regular</button>
      <button id="satellite-toggle" class="control-btn" aria-pressed="false">Satellite</button>
    </div>
    <button id="directions-toggle" class="control-btn" aria-expanded="false" aria-controls="directions-form" aria-label="Toggle directions panel">
      Directions
    </button>
  </div>

  <form id="directions-form" class="hidden" aria-label="Directions panel">
    <div class="directions-suggestions">
      <label for="origin">Origin</label>
      <input type="text" id="origin" autocomplete="off" placeholder="Enter starting point" aria-autocomplete="list" aria-controls="origin-suggestions" aria-haspopup="listbox" aria-expanded="false" />
      <div id="origin-suggestions" class="suggestions" role="listbox" aria-label="Origin suggestions"></div>
    </div>
    <div class="directions-suggestions">
      <label for="destination">Destination</label>
      <input type="text" id="destination" autocomplete="off" placeholder="Enter destination" aria-autocomplete="list" aria-controls="destination-suggestions" aria-haspopup="listbox" aria-expanded="false" />
      <div id="destination-suggestions" class="suggestions" role="listbox" aria-label="Destination suggestions"></div>
    </div>
    <div id="directions-buttons">
      <button id="clear-route" type="button">Clear</button>
      <button id="get-route" type="submit">Go</button>
    </div>
    <div id="steps" aria-live="polite" aria-label="Navigation steps"></div>
  </form>

<script src="https://unpkg.com/maplibre-gl@2.1.9/dist/maplibre-gl.js"></script>
<script src="app.js"></script>
</body>
</html>

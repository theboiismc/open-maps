<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <title>TheBoiisMC Maps - Private Navigation & Directions</title>
    <meta name="description" content="Find driving directions, explore places, and get live traffic updates." />

    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self'; 
        script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: https://unpkg.com https://static.theboiismc.com; 
        worker-src 'self' blob:;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com https://static.theboiismc.com; 
        img-src 'self' data: blob: https://*.theboiismc.com https://*.openstreetmap.org https://api.maptiler.com https://unpkg.com https://www.gravatar.com https://upload.wikimedia.org; 
        connect-src 'self' https://*.theboiismc.com https://api.maptiler.com https://nominatim.openstreetmap.org https://router.project-osrm.org https://api.open-meteo.com https://en.wikipedia.org https://tiles.openfreemap.org;
        font-src 'self' https://fonts.gstatic.com;
    ">
    
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://maps.theboiismc.com/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <meta name="theme-color" content="#030712" />
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="/assets/icon512_rounded.png">

    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"></noscript>

    <script>
        (function() {
            try {
                var saved = localStorage.getItem('mapTheme');
                if (saved === 'dark' || saved === 'light') { document.documentElement.setAttribute('data-theme', saved); }
            } catch (e) {}
        })();
    </script>

    <link href="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.css" rel="stylesheet">
    <link rel="stylesheet" href="https://static.theboiismc.com/css/maps_v7.3.0.css">
</head>
<body>

    <div id="sidebar-drawer" class="sidebar-drawer" role="navigation" aria-label="Main Menu">
        <div class="drawer-header">
            <span class="brand-text" style="color:var(--text-primary); font-size:22px;">TheBoiis<span class="text-brand">MC</span></span>
            <button id="close-drawer-btn" aria-label="Close Menu"><span class="material-symbols-outlined">chevron_left</span></button>
        </div>
        <div id="drawer-links-container" class="drawer-content"></div>
        
        <div class="drawer-footer">
            <div class="drawer-divider"></div>
            <p>&copy; 2026 TheBoiisMC</p>
            <p style="font-size:10px; opacity:0.6;">Version 8.2.2</p>
        </div>
    </div>
    <div id="drawer-overlay" class="drawer-overlay" aria-hidden="true"></div>

    <div id="app-modal-overlay" class="modal-overlay" hidden aria-hidden="true">
        <div class="modal-box" role="dialog" aria-modal="true">
            <div class="modal-header">
                <h3 id="modal-title">Title</h3>
                <button id="modal-close-btn" class="icon-btn"><span class="material-symbols-outlined">close</span></button>
            </div>
            <div id="modal-body" class="modal-body">
                </div>
        </div>
    </div>

    <div id="floating-profile-controls">
        <button id="app-menu-button" class="float-btn" aria-label="Open App Menu"><span class="material-symbols-outlined">apps</span></button>
        <div id="profile-area">
            <button id="profile-button" class="float-btn profile-btn-circle" aria-label="User Profile"><span class="material-symbols-outlined">account_circle</span></button>
            <div id="services-dropdown" class="apps-dropdown-container">
                <div id="apps-grid" class="apps-grid"></div>
            </div>
            <div id="profile-dropdown" role="menu">
                </div>
        </div>
    </div>
    
    <div id="navigation-status" role="region" hidden>
        <div id="instruction-container">
            <div id="maneuver-icon-wrapper"><span id="maneuver-icon" class="material-symbols-outlined">straight</span></div>
            <div id="instruction-text-wrapper">
                <div id="instruction-dist">--</div>
                <div id="navigation-instruction">Starting navigation...</div>
            </div>
        </div>
        <div id="trip-stats-container">
            <div class="stat-item"><span id="stat-miles-remaining">--</span><span class="stat-label">mi</span></div>
            <div class="stat-item"><span id="stat-time-remaining">--</span><span class="stat-label">min</span></div>
            <div class="stat-item"><span id="stat-eta">--:--</span><span class="stat-label">ETA</span></div>
        </div>
        <button id="end-navigation-btn">End Trip</button>
    </div>
    
    <div id="top-search-wrapper" role="search">
        <div id="main-search-container">
            <button id="hamburger-btn" aria-label="Menu"><span class="material-symbols-outlined">menu</span></button>
            <input type="text" id="main-search" placeholder="Search TheBoiisMC Maps" autocomplete="off" />
            <div class="search-divider"></div>
            <button id="search-trigger-btn"><span class="material-symbols-outlined">search</span></button>
            <button id="main-directions-icon"><span class="material-symbols-outlined">directions</span></button>
            <div id="main-suggestions" class="suggestions-dropdown">
                <div id="initial-suggestions-view"><div id="recent-searches-container"></div></div>
                <div id="api-suggestions-view" hidden></div>
            </div>
        </div>
    </div>
    
    <div id="side-panel" role="complementary">
        <div id="panel-grabber"></div>
        <div id="panel-search-placeholder" hidden></div>
        <button id="close-panel-btn" class="panel-close-btn"></button>
        <div class="panel-content"><div id="dynamic-content"></div></div>
    </div>
    
    <div id="context-menu" role="menu">
        <div id="context-menu-coords"></div>
        <button class="context-menu-item" id="ctx-directions-from"><span class="material-symbols-outlined">near_me</span>Directions from here</button>
        <button class="context-menu-item" id="ctx-directions-to"><span class="material-symbols-outlined">place</span>Directions to here</button>
        <button class="context-menu-item" id="ctx-whats-here"><span class="material-symbols-outlined">help_outline</span>What's here?</button>
    </div>
    
    <div id="map"></div>
    <div id="toast-container"></div>
    <button id="recenter-btn"><span class="material-symbols-outlined">my_location</span></button>

    <template id="tmpl-place-details">
        <div class="panel-hero">
            <div class="hero-image-wrapper">
                 <img id="info-image" src="" style="opacity:0; width:100%; height:100%; object-fit:cover;"/>
                 <div class="hero-gradient"></div>
            </div>
            <button id="details-back-btn" class="dynamic-back-btn" style="position:absolute; top:15px; left:15px; z-index:10; background:rgba(0,0,0,0.5); color:white; border:none; border-radius:50%; width:40px; height:40px; cursor:pointer;"><span class="material-symbols-outlined">arrow_back</span></button>
            <div class="hero-text-content">
                <h3 id="info-name"></h3>
                <div id="info-weather" class="weather-badge" hidden>Loading...</div>
            </div>
        </div>
        <div class="info-content-padding">
            <div class="address-row"><span class="material-symbols-outlined">location_on</span><p id="info-subtitle"></p></div>
            <div class="action-buttons modern-actions">
                <button class="btn-wrapper" id="btn-details-dir">
                    <div class="icon-circle primary"><span class="material-symbols-outlined">directions</span></div>
                    <div class="btn-label">Directions</div>
                </button>
                <button class="btn-wrapper" id="btn-details-save">
                    <div class="icon-circle secondary"><span class="material-symbols-outlined">bookmark_border</span></div>
                    <div class="btn-label">Save</div>
                </button>
            </div>
            <hr class="panel-divider"/>
            <div class="panel-card">
                <div class="card-header"><span class="material-symbols-outlined">info</span><h4>About</h4></div>
                <p id="quick-facts-content">Loading info...</p>
                <button id="info-website-btn" style="display:none;" class="btn-link">Visit Website</button>
            </div>
        </div>
    </template>
    
    <template id="tmpl-directions">
        <div class="info-content-padding">
             <button id="directions-close-btn" style="background:none; border:none; color:var(--text-secondary); cursor:pointer; margin-bottom:10px; display:flex; align-items:center; gap:5px;"><span class="material-symbols-outlined">close</span> Close</button>
             <div class="travel-modes">
                <button class="travel-mode-btn active"><span class="material-symbols-outlined">directions_car</span></button>
                <button class="travel-mode-btn"><span class="material-symbols-outlined">directions_walk</span></button>
                <button class="travel-mode-btn"><span class="material-symbols-outlined">directions_bike</span></button>
             </div>
             <div class="dir-input-group">
                <div class="dir-input-wrapper"><span class="material-symbols-outlined">trip_origin</span><input type="text" id="panel-from-input" placeholder="My Location" /></div>
                <div id="panel-from-suggestions" class="suggestions-dropdown"></div>
                <div class="dir-input-wrapper"><span class="material-symbols-outlined">location_on</span><input type="text" id="panel-to-input" placeholder="Destination" /></div>
                <div id="panel-to-suggestions" class="suggestions-dropdown"></div>
                <button id="swap-btn"><span class="material-symbols-outlined">swap_vert</span></button>
             </div>
             <button class="dir-quick-select" id="dir-use-my-location"><div class="icon-wrapper"><span class="material-symbols-outlined">my_location</span></div>Your location</button>
             <button id="get-route-btn" class="modern-primary-btn" style="width:100%; margin-top:10px;">Get Route</button>
             <button id="cancel-route-btn" style="width:100%; margin-top:10px; background:transparent; border:none; color:var(--text-secondary);">Cancel</button>
        </div>
    </template>

    <template id="tmpl-route-preview">
        <div class="info-content-padding">
            <div class="route-summary">
                <h3 id="route-time-display" style="color:#10B981; font-size:42px; font-weight:800; margin:0; line-height:1;"></h3>
                <div id="route-dist-display" style="font-size:18px; color:var(--text-secondary); margin-top:8px;"></div>
            </div>
            <div class="start-nav-btn-wrapper">
                <button id="start-navigation-btn"><span class="material-symbols-outlined">navigation</span>Start Trip</button>
            </div>
            <button id="back-to-directions-btn" style="width:100%; margin-top:10px;">Back</button>
        </div>
    </template>

    <template id="tmpl-search-results">
        <div class="info-content-padding">
            <button id="results-back-btn" class="dynamic-back-btn" style="background:transparent; border:none; cursor:pointer; color:var(--brand-primary); display:flex; align-items:center; margin-bottom:10px;"><span class="material-symbols-outlined">arrow_back</span> Back</button>
            <h3 id="results-header-text"></h3>
            <div id="search-results-list" role="list"></div>
        </div>
    </template>
    
    <template id="tmpl-result-item">
        <button class="search-result-item" role="listitem" style="width:100%; text-align:left; background:none; border:none; border-bottom:1px solid var(--border-color);">
            <div class="result-item-icon"><span class="material-symbols-outlined">place</span></div>
            <div class="result-item-details"><h4 class="item-title"></h4><p class="item-subtitle"></p></div>
            <div class="result-item-distance"></div>
        </button>
    </template>

    <script src="https://static.theboiismc.com/js/identity/oidc-client-ts@2.2.0.js"></script>
    <script src="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.js" defer></script>
    <script src="https://static.theboiismc.com/js/maps/turf.js" defer></script>
    <script src="https://static.theboiismc.com/js/maps/maps_v8.2.3.js" defer></script>
</body>
</html>

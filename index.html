<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TheBoiisMC Maps</title>
    <meta name="description" content="Private, modern, and secure mapping." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://maps.theboiismc.com/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://tiles.theboiismc.com" crossorigin>
    <meta name="theme-color" content="#ffffff" />
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="/assets/icon512_rounded.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <link href="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.css" rel="stylesheet">
    <link rel="stylesheet" href="https://static.theboiismc.com/css/map3.css">
</head>
<body>

    <div id="floating-left-panel">
        <div id="search-card-container">
            <button id="app-menu-button" aria-label="Menu" class="google-icon-btn">
                <span class="material-symbols-outlined">menu</span>
            </button>
            <input type="text" id="main-search" placeholder="Search TheBoiisMC Maps" autocomplete="off" />
            <button id="search-icon-inside" class="google-icon-btn" aria-label="Search">
                <span class="material-symbols-outlined">search</span>
            </button>
            <div class="divider-vertical"></div>
            <button id="main-directions-icon" class="google-icon-btn blue-icon" aria-label="Directions">
                <span class="material-symbols-outlined">directions</span>
            </button>
        </div>

        <div id="desktop-category-container"></div>
        
        <div id="main-suggestions" class="suggestions-dropdown" role="listbox">
            <div id="initial-suggestions-view">
                <div id="recent-searches-container"></div>
            </div>
            <div id="api-suggestions-view" hidden></div>
        </div>

        <div id="side-panel" role="complementary">
            <div id="panel-grabber" aria-hidden="true"></div>
            <div id="panel-search-placeholder" hidden></div>
            <div class="panel-content">
                <div id="dynamic-content" aria-live="polite"></div>
            </div>
        </div>
    </div>

    <div id="floating-right-panel">
        <div class="right-btn-group">
            <button id="apps-grid-btn" class="google-icon-btn" aria-label="Apps">
                <span class="material-symbols-outlined">apps</span>
            </button>
             <button id="profile-button" class="profile-btn-circle" aria-label="Profile">
                <span class="material-symbols-outlined">account_circle</span>
            </button>
        </div>

        <div id="services-dropdown" class="google-dropdown">
            <a href="https://search.theboiismc.com" class="service-item"><span class="material-symbols-outlined">search</span><span>Search</span></a>
            <a href="https://maps.theboiismc.com" class="service-item"><span class="material-symbols-outlined">map</span><span>Maps</span></a>
            <a href="https://drive.theboiismc.com" class="service-item"><span class="material-symbols-outlined">cloud</span><span>Drive</span></a>
            <a href="https://myaccount.theboiismc.com" class="service-item"><span class="material-symbols-outlined">account_circle</span><span>Account</span></a>
            <hr>
            <button id="settings-icon-btn" class="service-item btn-reset"><span class="material-symbols-outlined">tune</span><span>Map Settings</span></button>
        </div>

        <div id="profile-dropdown" class="google-dropdown">
            <div id="logged-in-view" hidden>
                <div class="profile-header">
                    <div class="username">TheBoiisMC</div>
                    <div class="email">user@example.com</div>
                </div>
                <hr>
                <a id="saved-places-btn" href="#" class="service-item">Saved Places</a>
                <a id="logout-btn" href="#" class="service-item">Log Out</a>
            </div>
            <div id="logged-out-view" hidden>
                <div class="profile-header">Sign in</div>
                <hr>
                <a href="#" id="login-btn" class="service-item">Log In</a>
            </div>
        </div>
    </div>
    
    <div id="navigation-status" role="region" hidden>
        <div id="instruction-container">
            <span id="maneuver-icon" class="material-symbols-outlined">straight</span>
            <div id="instruction-text-wrapper">
                <div id="instruction-dist">--</div>
                <div id="navigation-instruction">Starting...</div>
            </div>
        </div>
        <div id="trip-stats-container">
            <div class="stat-item"><span id="stat-speed">--</span><span class="stat-label">mph</span></div>
            <div class="stat-item"><span id="stat-eta">--:--</span><span class="stat-label">ETA</span></div>
            <button id="end-navigation-btn">Exit</button>
        </div>
    </div>
    
    <div id="settings-modal" class="modal-container">
        <div id="modal-overlay" class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h4>Map Settings</h4>
                <button id="close-settings-btn" class="modal-close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="setting-group">
                    <label for="globe-toggle">Globe View</label>
                    <div class="toggle-switch"><input type="checkbox" id="globe-toggle"><label for="globe-toggle"></label></div>
                </div>
                <hr>
                <div class="setting-group">
                    <span class="setting-label">Theme</span>
                    <div class="radio-group">
                        <input type="radio" id="theme-auto" name="map-theme" value="auto"><label for="theme-auto">Auto</label>
                        <input type="radio" id="theme-light" name="map-theme" value="light" checked><label for="theme-light">Light</label>
                        <input type="radio" id="theme-dark" name="map-theme" value="dark"><label for="theme-dark">Dark</label>
                    </div>
                </div>
                <hr>
                <button id="advanced-settings-btn" class="btn-link">Advanced Settings...</button>
            </div>
        </div>
    </div>

    <div id="advanced-settings-modal" class="modal-container">
        <div id="modal-overlay-advanced" class="modal-overlay"></div>
        <div class="modal-content">
             <div class="modal-header"><h4>Advanced</h4><button id="close-advanced-settings-btn" class="modal-close-btn">&times;</button></div>
             <div class="modal-body">
                 <ul id="tile-priority-list" class="sortable-list"></ul>
                 <div class="setting-group"><label>Clear Recents</label><input type="checkbox" id="privacy-clear-recents-toggle"></div>
             </div>
        </div>
    </div>

    <div id="context-menu">
        <div id="context-menu-coords"></div>
        <button class="context-menu-item" id="ctx-directions-from">Directions from here</button>
        <button class="context-menu-item" id="ctx-directions-to">Directions to here</button>
        <button class="context-menu-item" id="ctx-whats-here">What's here?</button>
    </div>
    
    <div id="map"></div>
    <div id="toast-container"></div>
    
    <template id="tmpl-home"><div class="info-content-padding"><h3>Explore</h3><div id="home-recents-list"></div></div></template>
    <template id="tmpl-place-details">
        <div class="panel-hero">
            <div class="hero-image-wrapper"><img id="info-image" src="" style="opacity:0; width:100%; height:100%; object-fit:cover;"/><div class="hero-gradient"></div></div>
            <button id="details-back-btn" class="dynamic-back-btn" style="position:absolute; top:15px; left:15px; background:rgba(0,0,0,0.6); color:white; border-radius:50%; width:36px; height:36px; border:none;"><span class="material-symbols-outlined">arrow_back</span></button>
            <div class="hero-text-content"><h3 id="info-name"></h3><div id="info-weather" hidden></div></div>
        </div>
        <div class="info-content-padding">
            <div class="address-row"><span class="material-symbols-outlined">location_on</span><p id="info-subtitle"></p></div>
            <div class="action-buttons modern-actions">
                <button class="btn-wrapper" id="btn-details-dir"><div class="icon-circle primary"><span class="material-symbols-outlined">directions</span></div><div class="btn-label">Directions</div></button>
                <button class="btn-wrapper" id="btn-details-save"><div class="icon-circle secondary"><span class="material-symbols-outlined">bookmark</span></div><div class="btn-label">Save</div></button>
            </div>
            <div class="panel-card"><p id="quick-facts-content">Loading...</p><button id="info-website-btn" class="btn-link" style="display:none">Website</button></div>
        </div>
    </template>
    <template id="tmpl-directions">
        <div class="info-content-padding">
            <div class="travel-modes"><button class="travel-mode-btn active"><span class="material-symbols-outlined">directions_car</span></button><button class="travel-mode-btn"><span class="material-symbols-outlined">directions_walk</span></button></div>
            <div class="dir-input-group">
                <div class="dir-input-wrapper"><input type="text" id="panel-from-input" placeholder="Start location" /></div>
                <div id="panel-from-suggestions" class="suggestions-dropdown"></div>
                <div class="dir-input-wrapper"><input type="text" id="panel-to-input" placeholder="Destination" /></div>
                <div id="panel-to-suggestions" class="suggestions-dropdown"></div>
                <button id="swap-btn"><span class="material-symbols-outlined">swap_vert</span></button>
            </div>
            <button id="dir-use-my-location" class="dir-quick-select">Your location</button>
            <button id="get-route-btn" class="modern-primary-btn">Get Route</button>
            <button id="cancel-route-btn" style="width:100%; background:none; border:none; padding:10px; color:gray;">Cancel</button>
        </div>
    </template>
    <template id="tmpl-route-preview">
        <div class="info-content-padding">
            <div class="route-summary"><h3 id="route-time-display"></h3><div id="route-dist-display"></div></div>
            <button id="start-navigation-btn" class="modern-primary-btn">Start Navigation</button>
            <button id="back-to-directions-btn" style="width:100%; margin-top:10px; background:#f0f0f0; border:none; padding:10px; border-radius:8px;">Back</button>
        </div>
    </template>
    <template id="tmpl-search-results">
        <div class="info-content-padding">
            <button id="results-back-btn" style="background:none; border:none; cursor:pointer; display:flex; align-items:center; gap:5px; margin-bottom:10px;"><span class="material-symbols-outlined">arrow_back</span> Back</button>
            <h3 id="results-header-text"></h3>
            <div id="search-results-list"></div>
        </div>
    </template>
    <template id="tmpl-result-item">
        <button class="search-result-item">
            <div class="result-item-icon"><span class="material-symbols-outlined">place</span></div>
            <div class="result-item-details"><h4 class="item-title"></h4><p class="item-subtitle"></p></div>
            <div class="result-item-distance"></div>
        </button>
    </template>

    <script src="https://static.theboiismc.com/js/identity/oidc-client-ts@2.2.0.js"></script>
    <script src="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.js" defer></script>
    <script src="https://static.theboiismc.com/js/maps/turf.js" defer></script>
    <script src="https://static.theboiismc.com/js/maps/maps77.js" defer></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TheBoiisMC Map</title>
  <link
    href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css"
    rel="stylesheet"
  />
  <style>
    html, body {
      margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Segoe UI', sans-serif; background: #f2f2f2;
    }
    #map {
      position: absolute; top: 0; bottom: 0; width: 100%; z-index: 0;
    }
    .layer-toggle {
      position: absolute;
      bottom: 16px;
      left: 16px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
      display: flex;
      gap: 12px;
      padding: 8px 12px;
      z-index: 1001;
    }
    .layer-toggle button {
      border: none;
      background: #fff;
      padding: 8px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      color: #333;
      font-weight: 600;
      box-shadow: inset 0 -1px 0 #bbb;
      transition: background 0.25s, box-shadow 0.25s;
    }
    .layer-toggle button:hover {
      background: #f0f0f0;
      box-shadow: inset 0 -2px 0 #0078ff;
      color: #0078ff;
    }
    .layer-toggle button.active {
      background: #0078ff;
      color: white;
      box-shadow: none;
    }
    .map-controls {
      position: absolute;
      bottom: 16px;
      right: 16px;
      z-index: 1001;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <!-- Layer toggle buttons -->
  <div class="layer-toggle">
    <button id="regular-toggle" class="active">Regular</button>
    <button id="satellite-toggle">Satellite</button>
  </div>

  <!-- Controls container for bottom right -->
  <div class="map-controls" id="map-controls"></div>

  <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
  <script src="app.js"></script>
</body>
</html>

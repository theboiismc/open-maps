<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>TheBoiisMC Maps</title>
    <meta name="description" content="Explore the world with private, modern mapping." />
    <meta name="theme-color" content="#00796b" />
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon512_rounded.png">

    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' https://unpkg.com https://npmcdn.com https://cdn.jsdelivr.net https://static.cloudflareinsights.com 'unsafe-inline';
        style-src 'self' 'unsafe-inline' https://unpkg.com https://fonts.googleapis.com;
        img-src 'self' data: https:;
        font-src 'self' https://fonts.gstatic.com;
        connect-src 'self' https://accounts.theboiismc.com https://tiles.openfreemap.org https://server.arcgisonline.com https://nominatim.openstreetmap.org https://api.open-meteo.com https://en.wikipedia.org https://router.project-osrm.org https://cloudflareinsights.com https://api.maptiler.com;
        worker-src 'self' blob: https://unpkg.com;
    ">

    <meta property="og:title" content="TheBoiisMC Maps" />
    <meta property="og:description" content="Explore the world with private, modern mapping." />
    <meta property="og:image" content="https://maps.theboiismc.com/icon512_rounded.png" />
    <meta property="og:url" content="https://maps.theboiismc.com" />
    <meta name="twitter:card" content="summary_large_image" />

    <script src="https://cdn.jsdelivr.net/npm/oidc-client-ts@2.2.0/dist/browser/oidc-client-ts.min.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.1.0/dist/maplibre-gl.css" rel="stylesheet" />
    <script src="https://unpkg.com/maplibre-gl@4.1.0/dist/maplibre-gl.js"></script>
    <script src='https://npmcdn.com/@turf/turf/turf.min.js'></script>

    <!-- FONTS & ICONS -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="top-banner">
        <span id="site-title">TheBoiisMC Maps</span>
        <div id="profile-area">
            <button class="js-settings-btn" aria-label="Map Settings">
                <span class="material-symbols-outlined">settings</span>
            </button>
            <button id="profile-button" aria-label="User Profile">
                <span class="material-symbols-outlined">account_circle</span>
            </button>
            <div id="profile-dropdown">
                <div id="logged-in-view" hidden>
                    <div class="profile-section profile-section-header">
                        <div class="username">TheBoiisMC</div>
                        <div class="email">user@example.com</div>
                    </div>
                    <hr/>
                    <div class="profile-actions">
                        <a id="saved-places-btn">Saved Places</a>
                    </div>
                    <hr/>
                    <div class="profile-actions">
                        <a id="logout-btn">Log Out</a>
                    </div>
                </div>
                <div id="logged-out-view" hidden>
                    <div class="profile-section" style="text-align:center; font-weight: 500; color: #5f6368;">
                        Sign in to save and view places
                    </div>
                    <hr/>
                    <div class="auth-buttons">
                        <a href="#" id="login-btn" class="btn btn-primary">Log In</a>
                        <a href="#" id="signup-btn" class="btn btn-secondary">Sign Up</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="navigation-status">
        <div id="instruction-container">
            <div id="navigation-instruction">Starting navigation...</div>
            <div id="instruction-progress-bar"></div>
        </div>
        <div id="trip-stats-container">
            <div class="stat-item">
                <span id="stat-speed">--</span>
                <span class="stat-label">mph</span>
            </div>
            <div class="stat-item">
                <span id="stat-eta">--:--</span>
                <span class="stat-label">ETA</span>
            </div>
            <div class="stat-item">
                <span id="stat-time-remaining">-- min</span>
                <span class="stat-label">Time</span>
            </div>
        </div>
        <button id="end-navigation-btn">End Trip</button>
    </div>

    <div id="top-search-wrapper">
        <div id="main-search-container">
            <span id="search-icon-inside" class="material-symbols-outlined">search</span>
            <input type="text" id="main-search" placeholder="Search TheBoiisMC Maps" />
            <span id="main-directions-icon" class="material-symbols-outlined">directions</span>
            <div id="main-suggestions" class="suggestions-dropdown"></div>
        </div>
    </div>

    <div id="side-panel">
        <div id="panel-grabber"></div>

        <!-- Default Mobile Panel -->
        <div id="panel-search-placeholder" hidden>
            <div class="panel-content-padding">
                <div class="default-search-bar">
                    <input type="text" id="mobile-default-search" placeholder="Search TheBoiisMC Maps" autocomplete="off" />
                    <div id="mobile-default-suggestions" class="suggestions-dropdown"></div>
                </div>
                <div id="popular-places">
                    <h4>Popular Places</h4>
                    <ul id="popular-places-list"></ul>
                </div>
            </div>
        </div>

        <div class="panel-content">
            <div id="info-panel-redesign" hidden>
                <!-- existing info panel content -->
            </div>
            <div id="directions-panel-redesign" hidden>
                <!-- existing directions panel content -->
            </div>
            <div id="route-preview-panel" hidden>
                <!-- existing route preview content -->
            </div>
            <div id="route-section" hidden>
                <!-- existing route steps content -->
            </div>
        </div>
    </div>

    <button id="mobile-settings-btn" class="js-settings-btn" aria-label="Map Settings">
        <span class="material-symbols-outlined">layers</span>
    </button>

    <div id="menu-overlay"></div>

    <div id="settings-menu">
        <!-- existing settings menu content -->
    </div>

    <div id="map">
        <div id="map-watermark">TheBoiisMC</div>
    </div>

    <!-- SCRIPTS -->
    <script src="js/auth.js"></script>
    <script src="js/map.js"></script>
    <script src="app.js"></script>
    <script src="js/mobilePanel.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TheBoiisMC Map</title>
  <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: 'Roboto', sans-serif;
    }

    #map {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      right: 0;
    }

    .search-bar {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 300px;
      background: white;
      border-radius: 8px;
      padding: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      z-index: 10;
    }

    .search-bar input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    #suggestions {
      margin-top: 8px;
      max-height: 150px;
      overflow-y: auto;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
    }

    .suggestion {
      padding: 10px;
      cursor: pointer;
    }

    .suggestion:hover {
      background-color: #f0f0f0;
    }

    #sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 300px;
      height: 100%;
      background: white;
      box-shadow: 2px 0 10px rgba(0, 0, 0, 0.2);
      transform: translateX(-100%);
      transition: transform 0.3s ease-in-out;
      padding: 16px;
      z-index: 9999;
    }

    #sidebar.open {
      transform: translateX(0);
    }

    #sidebar-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      float: right;
    }

    #place-info {
      margin-top: 40px;
      font-size: 18px;
    }

    .map-controls {
      position: absolute;
      bottom: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 5;
    }

    .map-controls button {
      padding: 10px;
      border-radius: 6px;
      border: none;
      background: white;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }

    .map-controls button.active {
      background-color: #ddd;
    }

    #directions-form.hidden {
      display: none;
    }

    #directions-form input {
      width: 100%;
      margin-bottom: 10px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    #directions-form button {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: none;
      background: #6750a4;
      color: white;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    #clear-route {
      background-color: #b3261e;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <!-- Search bar -->
  <div class="search-bar">
    <input id="search" type="text" placeholder="Search city, state, place..." autocomplete="off" />
    <div id="suggestions"></div>
  </div>

  <!-- Sidebar -->
  <div id="sidebar" hidden>
    <button id="sidebar-close">&times;</button>
    <div id="place-info">Loading...</div>
    <button id="directions-toggle">Show Directions</button>
    <div id="directions-form" class="hidden">
      <input id="origin" type="text" placeholder="Start" />
      <input id="destination" type="text" placeholder="Destination" />
      <button id="get-route">Get Route</button>
      <button id="clear-route">Clear</button>
    </div>
  </div>

  <!-- Map view mode toggles -->
  <div class="map-controls">
    <button id="regular-toggle" class="active">Regular</button>
    <button id="satellite-toggle">Satellite</button>
    <button id="dark-toggle">Dark Mode</button>
  </div>

  <!-- MapLibre GL JS -->
  <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
  <script src="app.js"></script>
</body>
</html>

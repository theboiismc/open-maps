<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TheBoiisMC Map</title>
  <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.0/feather.min.css" rel="stylesheet" />
  <style>
    /* (Keep your existing CSS for #map, #side-panel, search bar, etc. 
       Add minor tweaks if needed for better fuzzy UI, same style you had) */
    /* Just example for suggestions styling */
    #suggestions, #recent-searches, .dir-suggestions {
      max-height: 220px;
      overflow-y: auto;
    }
    .suggestion, .recent-item, .dir-suggestion-item {
      padding: 8px 12px;
      cursor: pointer;
      border-bottom: 1px solid #eee;
    }
    .suggestion:hover, .recent-item:hover, .dir-suggestion-item:hover {
      background: #e0f2ff;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="search-bar">
    <input id="search" placeholder="Search a place..." autocomplete="off" spellcheck="false" />
    <button id="search-icon" aria-label="Search button">🔍</button>
  </div>

  <div id="recent-searches" role="listbox" aria-label="Recent searches"></div>
  <div id="suggestions" role="listbox" aria-label="Search suggestions"></div>

  <div id="side-panel" class="hidden" aria-live="polite">
    <div id="info-content" style="display:flex; flex-direction: column; align-items: center;">
      <div id="panel-header" style="display:flex; align-items:center; justify-content: space-between; width: 100%;">
        <button id="panel-arrow" aria-label="Toggle panel height" style="background:none; border:none; font-size: 20px;">▼</button>
        <h2 id="place-name" style="margin: 0; text-align:center; flex-grow:1;"></h2>
        <button id="panel-search-icon" aria-label="Focus search" style="background:none; border:none; font-size: 20px;">🔍</button>
      </div>

      <button id="directions-btn" style="background:#005bff; color:#fff; border:none; border-radius: 12px; padding: 8px 14px; margin: 12px 0; font-weight: 600; cursor:pointer; display:flex; align-items:center; gap:6px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="white" viewBox="0 0 24 24">
          <path d="M12 2L19 21H5L12 2Z" />
        </svg>
        Directions
      </button>

      <div id="place-image-container" aria-label="Place images" style="width: 100%; max-height: 240px; overflow: hidden; border-radius: 14px; margin-bottom: 12px;">
        <img id="place-image" src="" alt="Image of place" style="width:100%; height:100%; object-fit: cover;" />
      </div>

      <p id="place-description" style="text-align:center; font-size: 14px; line-height: 1.4; margin: 0 10px 12px 10px;">Loading description...</p>

      <div id="quick-facts" aria-label="Quick facts about place" style="width: 100%;">
        <h3 style="margin-bottom:6px; font-weight: 600;">Quick Facts</h3>
        <p id="place-weather" style="font-size: 13px;">Loading weather...</p>
      </div>
    </div>

    <div id="directions-content" aria-label="Directions panel" style="display:none; flex-direction: column; gap: 10px; width: 100%;">
      <div class="dir-input-container" style="display:flex; align-items:center; gap: 6px;">
        <input
          type="text"
          id="dir-start"
          placeholder="Starting point"
          autocomplete="off"
          spellcheck="false"
          aria-label="Starting point"
          style="flex-grow:1; padding:8px 12px; border-radius: 12px; border: 1.5px solid #ccc;"
        />
        <button
          id="your-location-btn"
          aria-label="Use your current location"
          title="Use your current location"
          style="background:#005bff; border:none; border-radius: 12px; padding: 8px 10px; cursor:pointer; display:flex; align-items:center; justify-content:center;"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            stroke="white"
            stroke-width="2.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="feather feather-crosshair"
            viewBox="0 0 24 24"
            width="18"
            height="18"
          >
            <circle cx="12" cy="12" r="10" />
            <line x1="22" y1="12" x2="18" y2="12" />
            <line x1="6" y1="12" x2="2" y2="12" />
            <line x1="12" y1="6" x2="12" y2="2" />
            <line x1="12" y1="22" x2="12" y2="18" />
          </svg>
        </button>
      </div>
      <div id="dir-start-suggestions" class="dir-suggestions" style="max-height: 160px; overflow-y: auto; border: 1.5px solid #ccc; border-radius: 10px; display:none;"></div>

      <div class="dir-input-container" style="margin-top: 8px;">
        <input
          type="text"
          id="dir-end"
          placeholder="Destination"
          autocomplete="off"
          spellcheck="false"
          aria-label="Destination"
          style="width: 100%; padding:8px 12px; border-radius: 12px; border: 1.5px solid #ccc;"
        />
        <div id="dir-end-suggestions" class="dir-suggestions" style="max-height: 160px; overflow-y: auto; border: 1.5px solid #ccc; border-radius: 10px; display:none;"></div>
      </div>

      <button id="directions-back-btn" style="margin-top: 14px; background:#005bff; color:#fff; border:none; border-radius: 14px; padding: 10px; font-weight: 600; cursor: pointer;">Back</button>
    </div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
  <script src="app.js"></script>
</body>
</html>

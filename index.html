<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    
    <title>TheBoiisMC Maps</title>
    <meta name="description" content="Explore the world with private, modern mapping." />
    <meta name="theme-color" content="#00796b" />
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon512_rounded.png">
    
    <link href="libs/css/maplibre-gl-4.1.0.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <style>
        .icon-svg { display: inline-block; width: 24px; height: 24px; fill: currentColor; vertical-align: middle; }
    </style>
</head>
<body>
    <div id="map"></div>

    <div id="top-banner">
        <span id="site-title">TheBoiisMC Maps</span>
        <div id="profile-area">
            <button class="js-settings-btn" aria-label="Map Settings"><span class="material-symbols-outlined"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg></span></button>
            <button id="profile-button" aria-label="User Profile"><span class="material-symbols-outlined"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.93 0 3.5 1.57 3.5 3.5S13.93 12 12 12s-3.5-1.57-3.5-3.5S10.07 5 12 5zm0 14.2c-2.73 0-5.1-.98-6.9-2.58.01-2.48 4.67-3.82 6.9-3.82 2.23 0 6.89 1.34 6.9 3.82-1.8 1.6-4.17 2.58-6.9 2.58z"/></svg></span></button>
            <div id="profile-dropdown"><div id="logged-in-view" hidden><div class="profile-section profile-section-header"><div class="username">User</div><div class="email">user@example.com</div></div><hr/><div class="profile-actions"><a id="saved-places-btn">Saved Places</a></div><hr/><div class="profile-actions"><a id="logout-btn">Log Out</a></div></div><div id="logged-out-view" hidden><div class="profile-section" style="text-align:center;font-weight:500;color:#5f6368;">Sign in to save places</div><hr/><div class="auth-buttons"><a href="#" id="login-btn" class="btn btn-primary">Log In</a><a href="#" id="signup-btn" class="btn btn-secondary">Sign Up</a></div></div></div>
        </div>
    </div>
    
    <div id="navigation-status"><!-- Navigation UI --></div>
    <div id="top-search-wrapper"><div id="main-search-container"><!-- Search Bar --></div></div>

    <!-- The SIMPLIFIED Panel Container -->
    <div id="side-panel">
        <div id="panel-grabber"></div>
        <!-- This single div is now the rendering target for all panel content -->
        <div class="panel-content"></div>
    </div>
    
    <button id="mobile-settings-btn" class="js-settings-btn" aria-label="Map Settings"><!-- ... --></button>
    <div id="menu-overlay"></div>
    <div id="settings-menu"><!-- ... --></div>
    
    <script src="https://cdn.jsdelivr.net/npm/oidc-client-ts@2.2.0/dist/browser/oidc-client-ts.min.js" defer></script>
    <script src="libs/js/maplibre-gl-4.1.0.js" defer></script>
    <script src='libs/js/turf-6.5.0.min.js' defer></script>
    <script src="app.js" defer></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TheBoiisMC Maps</title>
  <link
    href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css"
    rel="stylesheet"
  />
  <style>
    /* Reset */
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4ff;
      color: #111;
    }

    /* TheBoiisMC top banner */
    #top-banner {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 50px;
      background: #1a73e8;
      color: white;
      font-weight: 700;
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      letter-spacing: 1.2px;
      user-select: none;
      box-shadow: 0 2px 5px rgba(26, 115, 232, 0.6);
    }

    /* Map container */
    #map {
      position: absolute;
      top: 50px;
      bottom: 0;
      width: 100%;
      z-index: 1;
    }

    /* Search bar container */
    .search-bar {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      border-radius: 30px;
      display: flex;
      align-items: center;
      box-shadow: 0 4px 15px rgba(26, 115, 232, 0.3);
      width: 80%;
      max-width: 500px;
      padding: 8px 15px;
      z-index: 1000;
    }
    .search-bar input {
      border: none;
      outline: none;
      flex-grow: 1;
      font-size: 16px;
      padding: 10px 12px;
      border-radius: 30px;
      font-weight: 600;
      color: #1a73e8;
      letter-spacing: 0.03em;
    }
    .search-bar input::placeholder {
      color: #a5b1d8;
    }

    /* Suggestions container */
    #suggestions,
    #recent-searches {
      position: fixed;
      top: 110px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      max-width: 500px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(26, 115, 232, 0.25);
      max-height: 240px;
      overflow-y: auto;
      z-index: 1000;
      display: none;
      user-select: none;
    }
    .suggestion {
      padding: 12px 18px;
      cursor: pointer;
      font-weight: 600;
      color: #1a73e8;
      border-bottom: 1px solid #e1eaff;
      transition: background-color 0.2s ease;
    }
    .suggestion:last-child {
      border-bottom: none;
    }
    .suggestion:hover,
    .suggestion:focus {
      background: #d0e2ff;
      outline: none;
    }

    /* Side panel */
    #side-panel {
      position: fixed;
      bottom: -100%;
      left: 0;
      right: 0;
      height: 40vh;
      background: white;
      box-shadow: 0 -3px 15px rgba(26, 115, 232, 0.4);
      border-radius: 20px 20px 0 0;
      padding: 15px 25px;
      transition: bottom 0.3s ease, height 0.3s ease;
      overflow-y: auto;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #side-panel.open {
      bottom: 0;
    }

    @media (min-width: 769px) {
      #side-panel {
        top: 50px;
        bottom: 0;
        left: -350px;
        right: auto;
        width: 350px;
        height: 100%;
        border-radius: 0 20px 20px 0;
        box-shadow: 3px 0 15px rgba(26, 115, 232, 0.3);
        transition: left 0.3s ease;
        padding: 30px 25px;
        align-items: flex-start;
      }
      #side-panel.open {
        left: 0;
        bottom: 0;
      }
    }

    /* Close button */
    #close-side-panel {
      position: absolute;
      top: 15px;
      right: 20px;
      background: transparent;
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: #1a73e8;
      font-weight: 700;
      line-height: 1;
      user-select: none;
    }
    #close-side-panel:hover {
      color: #174ea6;
    }

    /* Place name header row */
    #panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 12px;
      user-select: none;
    }
    #panel-arrow {
      font-size: 22px;
      color: #1a73e8;
      cursor: pointer;
      user-select: none;
    }
    #place-name {
      font-size: 20px;
      font-weight: 700;
      color: #1a73e8;
      flex-grow: 1;
      text-align: center;
      user-select: text;
      padding: 0 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #panel-search-icon {
      font-size: 20px;
      color: #1a73e8;
      cursor: pointer;
      user-select: none;
    }

    /* Place images container */
    #place-images {
      width: 100%;
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 10px;
      margin-bottom: 10px;
    }
    #place-images img {
      height: 100px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
      box-shadow: 0 3px 7px rgba(26, 115, 232, 0.25);
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    #place-images img:hover {
      transform: scale(1.07);
    }

    /* Directions button */
    #directions-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a73e8;
      color: white;
      font-weight: 700;
      padding: 8px 16px;
      border-radius: 14px;
      font-size: 16px;
      cursor: pointer;
      user-select: none;
      margin-bottom: 10px;
      box-shadow: 0 4px 15px rgba(26, 115, 232, 0.5);
      border: none;
      transition: background-color 0.3s ease;
    }
    #directions-btn:hover {
      background: #1558b0;
    }
    #directions-btn svg {
      margin-right: 8px;
      fill: white;
      width: 18px;
      height: 18px;
    }

    /* Quick facts */
    #quick-facts {
      width: 100%;
    }
    #quick-facts h3 {
      font-weight: 700;
      font-size: 18px;
      color: #1a73e8;
      margin-bottom: 6px;
    }
    #place-description {
      font-size: 15px;
      line-height: 1.4;
      margin-bottom: 10px;
      color: #222;
    }
    #place-weather {
      font-size: 14px;
      font-weight: 600;
      color: #3a6ede;
    }

    /* Scrollbar for images */
    #place-images::-webkit-scrollbar {
      height: 8px;
    }
    #place-images::-webkit-scrollbar-thumb {
      background-color: #1a73e8;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="top-banner">TheBoiisMC Maps</div>

  <div id="map"></div>

  <div class="search-bar" role="search">
    <input
      id="search"
      type="search"
      placeholder="Search a place..."
      autocomplete="off"
      aria-label="Search places"
      spellcheck="false"
    />
  </div>

  <div id="recent-searches" role="listbox" aria-label="Recent searches"></div>
  <div id="suggestions" role="listbox" aria-label="Search suggestions"></div>

  <div id="side-panel" aria-live="polite" aria-atomic="true" aria-label="Place info panel">
    <button id="close-side-panel" aria-label="Close panel">&times;</button>

    <div id="panel-header">
      <div id="panel-arrow" title="Collapse/Expand panel">⬇️</div>
      <div id="place-name">Select a place</div>
      <div id="panel-search-icon" title="Search icon">🔍</div>
    </div>

    <button id="directions-btn" title="Get directions">
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M20.71 11.29l-9-9a1 1 0 00-1.42 1.42L17.59 11H4a1 1 0 000 2h13.59l-7.3 7.29a1 1 0 001.42 1.42l9-9a1 1 0 000-1.42z"></path>
      </svg>
      Directions
    </button>

    <div id="place-images" aria-label="Images of the place"></div>

    <div id="quick-facts">
      <h3>Quick Facts</h3>
      <p id="place-description">No place selected.</p>
      <p id="place-weather"></p>
    </div>
  </div>

  <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
  <script src="app.js"></script>
</body>
</html>

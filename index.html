<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    
    <title>TheBoiisMC Maps</title>
    <meta name="description" content="Explore the world with private, modern mapping." />
    <meta name="theme-color" content="#00796b" />
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon512_rounded.png">
    
    <meta property="og:title" content="TheBoiisMC Maps" />
    <meta property="og:description" content="Explore the world with private, modern mapping." />
    <meta property="og:image" content="https://maps.theboiismc.com/icon512_rounded.png" />
    <meta property="og:url" content="https://maps.theboiismc.com" />
    <meta name="twitter:card" content="summary_large_image" />
    
    <link href="libs/css/maplibre-gl-4.1.0.css" rel="stylesheet">
    
    <!-- Link to your unified styles.css file -->
    <link rel="stylesheet" href="styles.css">

    <style>
        /* A fast, non-proprietary, and widely available font stack. */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
        }
        .icon-svg {
            display: inline-block;
            width: 24px;
            height: 24px;
            fill: currentColor;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <div id="top-banner">
        <span id="site-title">TheBoiisMC Maps</span>
        <div id="profile-area">
            <button class="js-settings-btn" aria-label="Map Settings">
                <span class="material-symbols-outlined"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg></span>
            </button>
            <button id="profile-button" aria-label="User Profile">
                <span class="material-symbols-outlined"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.93 0 3.5 1.57 3.5 3.5S13.93 12 12 12s-3.5-1.57-3.5-3.5S10.07 5 12 5zm0 14.2c-2.73 0-5.1-.98-6.9-2.58.01-2.48 4.67-3.82 6.9-3.82 2.23 0 6.89 1.34 6.9 3.82-1.8 1.6-4.17 2.58-6.9 2.58z"/></svg></span>
            </button>
            <div id="profile-dropdown"><!-- Profile Dropdown Content --></div>
        </div>
    </div>
    
    <div id="navigation-status"><!-- Navigation Content --></div>
    
    <div id="top-search-wrapper">
        <div id="main-search-container">
            <span id="search-icon-inside" class="material-symbols-outlined"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></span>
            <input type="text" id="main-search" placeholder="Search TheBoiisMC Maps" />
            <span id="main-directions-icon" class="material-symbols-outlined" style="cursor: pointer;"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M21.5 15.6l-7.1-7.1C13.9 8.35 13.5 8 13 8h-2c-.5 0-1 .4-1 .85l-7 7.1c-.4.4-1.2.1-1.2.6v.9c0 .5.7.8 1.1.4l6.5-6.5c.5-.5.8-.8 1.4-.8h.8c.6 0 .9 .3 1.4 .8l6.5 6.5c.4.4 1.1.1 1.1-.4v-.9c0-.5-.7-.8-1.1-.4z"/></svg></span>
            <div id="main-suggestions" class="suggestions-dropdown"></div>
        </div>
    </div>
    
    <!-- THE UNIFIED PANEL CONTAINER -->
    <div id="side-panel">
        <div id="panel-grabber"></div>
        <div id="panel-search-placeholder" hidden></div>
        
        <div class="panel-content">
            <!-- Default Panel Content -->
            <div id="default-panel-content">
                <div class="panel-section">
                    <h2>Directions</h2>
                    <div class="icon-grid">
                         <div class="icon-item" id="default-drive-btn"><div class="icon-circle" style="background-color: #4285F4;"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg></div><span>Drive</span></div>
                    </div>
                </div>
                <!-- Other default panel sections... -->
            </div>

            <!-- Info Panel Content -->
            <div id="info-panel-redesign">
                <div class="header-image-container">
                    <img class="header-image" id="info-image" src="https://via.placeholder.com/400x200" alt="Image of the location"/>
                    <button id="close-info-btn"><span class="material-symbols-outlined"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></span></button>
                </div>
                <div class="info-content-padding">
                    <h3 id="info-name">Example Location</h3>
                    <div class="address" id="info-address">123 Main St, Anytown, USA</div>
                    <div class="weather" id="info-weather">72°F Sunny</div>
                    <div class="action-buttons">
                        <div class="btn-wrapper" id="info-directions-btn"><div class="icon-circle"><span class="material-symbols-outlined"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M21.5 15.6l-7.1-7.1C13.9 8.35 13.5 8 13 8h-2c-.5 0-1 .4-1 .85l-7 7.1c-.4.4-1.2.1-1.2.6v.9c0 .5.7.8 1.1.4l6.5-6.5c.5-.5.8-.8 1.4-.8h.8c.6 0 .9 .3 1.4 .8l6.5 6.5c.4.4 1.1.1 1.1-.4v-.9c0-.5-.7-.8-1.1-.4z"/></svg></span></div><div class="btn-label">Directions</div></div>
                        <div class="btn-wrapper" id="info-save-btn"><div class="icon-circle"><span class="material-symbols-outlined"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg></span></div><div class="btn-label">Save</div></div>
                    </div>
                    <div id="quick-facts"><h4>Quick facts</h4><p id="quick-facts-content">This is a sample description for the location.</p></div>
                </div>
            </div>

            <!-- Directions Panel Content -->
            <div id="directions-panel-redesign">
                <div class="info-content-padding">
                    <div class="dir-input-group"><!-- Input fields --></div>
                    <button id="get-route-btn">Get Route</button>
                    <button id="back-to-info-btn">Back</button>
                </div>
            </div>
            
            <!-- Route Preview and Steps Panels -->
            <div id="route-preview-panel">
                 <div class="info-content-padding">
                    <div class="route-summary"><h3 id="route-summary-time">25 min</h3></div>
                     <button id="back-to-directions-btn">Back</button>
                </div>
            </div>
            <div id="route-section"><!-- Route steps content --></div>
        </div>
    </div>
    
    <button id="mobile-settings-btn" class="js-settings-btn" aria-label="Map Settings"><!-- ... --></button>
    <div id="menu-overlay"></div>
    <div id="settings-menu"><!-- ... --></div>
    
    <div id="map"></div>

    <script src="https://cdn.jsdelivr.net/npm/oidc-client-ts@2.2.0/dist/browser/oidc-client-ts.min.js" defer></script>
    <script src="libs/js/maplibre-gl-4.1.0.js" defer></script>
    <script src='libs/js/turf-6.5.0.min.js' defer></script>
    <!-- Your main app.js -->
    <!-- <script src="app.js" defer></script> -->

    <!-- =================================================================== -->
    <!-- SCRIPT FOR PANEL STATE MANAGEMENT                                   -->
    <!-- For best practice, move this logic into your app.js file.           -->
    <!-- =================================================================== -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const sidePanel = document.getElementById('side-panel');

            // --- Get all buttons that change the panel state ---
            const closeInfoBtn = document.getElementById('close-info-btn');
            const mainDirectionsIcon = document.getElementById('main-directions-icon');
            const infoDirectionsBtn = document.getElementById('info-directions-btn');
            const defaultDriveBtn = document.getElementById('default-drive-btn');
            const backToInfoBtn = document.getElementById('back-to-info-btn');
            const getRouteBtn = document.getElementById('get-route-btn');
            const backToDirectionsBtn = document.getElementById('back-to-directions-btn');

            // --- DEMO ONLY: Trigger info panel by typing in search ---
            const mainSearch = document.getElementById('main-search');
            mainSearch.addEventListener('input', () => {
                // In a real app, this would be triggered by selecting a search result
                // or clicking a map marker.
                if (mainSearch.value.length > 2) {
                    setPanelState('info');
                }
            });

            /**
             * Central function to manage the panel's state.
             * @param {string} newState - The target state ('default', 'info', 'directions', etc.)
             */
            function setPanelState(newState) {
                // The base class is always 'state-' + the new state name.
                let newClassName = `state-${newState}`;

                // On mobile (coarse pointer and max-width), we add 'peek' or 'open'.
                if (window.matchMedia("(max-width: 768px) and (pointer: coarse)").matches) {
                    if (newState === 'default') {
                        newClassName += ' peek';
                    } else if (newState !== 'hidden') {
                        newClassName += ' open';
                    }
                } else {
                    // On desktop, any visible state is 'open'.
                    if (newState !== 'hidden' && newState !== 'default') {
                         newClassName += ' open';
                    }
                }
                
                sidePanel.className = newClassName;
            }

            // --- Set up event listeners for all the buttons ---

            // Buttons that lead to the 'directions' state
            mainDirectionsIcon.addEventListener('click', () => setPanelState('directions'));
            infoDirectionsBtn.addEventListener('click', () => setPanelState('directions'));
            defaultDriveBtn.addEventListener('click', () => setPanelState('directions'));
            
            // Buttons that lead to the 'route-preview' state
            getRouteBtn.addEventListener('click', () => setPanelState('route-preview'));

            // "Back" buttons
            closeInfoBtn.addEventListener('click', () => setPanelState('default'));
            backToInfoBtn.addEventListener('click', () => setPanelState('info'));
            backToDirectionsBtn.addEventListener('click', () => setPanelState('directions'));

            // --- Set the initial state of the panel on page load ---
            setPanelState('default');
        });
    </script>
</body>
</html>

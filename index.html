<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map with Directions</title>
  <link href="https://unpkg.com/maplibre-gl@2.8.1/dist/maplibre-gl.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
    }
    #map {
      width: 100%;
      height: 100%;
    }
    .suggestion {
      cursor: pointer;
      padding: 5px;
      background: white;
      border: 1px solid #ddd;
    }
    .suggestion:hover {
      background: #e3e3e3;
    }
    #directions-ui {
      position: absolute;
      bottom: 20px;
      left: 20px;
      background: white;
      padding: 10px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      max-height: 300px;
      overflow-y: auto;
      display: none;
    }
    #directions-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 1000;
      padding: 10px;
      background-color: #0078ff;
      color: white;
      border: none;
      border-radius: 5px;
    }
  </style>
</head>
<body>

  <div id="map"></div>

  <!-- Directions UI (Hidden by default) -->
  <div id="directions-ui" style="display: none;">
    <div>
      <input
        id="origin"
        type="text"
        placeholder="Search for starting point..."
        autocomplete="off"
        spellcheck="false"
      />
      <div id="origin-suggestions"></div>
    </div>
    <button id="get-directions">Get Directions</button>
    <button id="cancel-directions">Cancel</button>
    <div id="directions-steps"></div>
  </div>

  <!-- Directions Toggle Button -->
  <button id="directions-btn" aria-label="Get Directions">
    Get Directions
  </button>

  <script src="https://unpkg.com/maplibre-gl@2.8.1/dist/maplibre-gl.js"></script>
  <script src="app.js"></script>
</body>
</html>

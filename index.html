<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>theboiismc.com | Maps</title>
    <!-- Maplibre GL CSS and Custom Fonts -->
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.1.0/dist/maplibre-gl.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
       
</head>
<body>
    <div id="map"></div>

    <!-- Top search bar (desktop & initial view) -->
    <div id="top-search-wrapper">
        <div id="main-search-container">
            <input type="text" id="main-search" placeholder="Search for a place...">
            <button id="main-directions-icon" title="Get Directions">
                <i class="fa-solid fa-route"></i>
            </button>
            <button id="main-search-icon" title="Search">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
        </div>
        <div id="main-suggestions"></div>
    </div>
    
    <!-- Profile and Authentication Area -->
    <div id="profile-area">
        <button id="profile-button">
            <!-- This will be populated by the JS -->
            <img id="profile-img" src="" alt="Profile picture" hidden>
            <i id="profile-icon" class="fa-solid fa-user"></i>
        </button>
        <div id="profile-dropdown">
            <div id="logged-out-view" class="logged-out-view" hidden>
                <h4>Welcome!</h4>
                <p>Log in or sign up to save places and more.</p>
                <button id="login-btn" class="login-btn">Log In</button>
                <button id="signup-btn" class="signup-btn">Sign Up</button>
            </div>
            <div id="logged-in-view" class="logged-in-view" hidden>
                <p>Logged in as:</p>
                <div class="info">
                    <p class="username font-semibold"></p>
                    <p class="email text-sm"></p>
                </div>
                <div class="divider"></div>
                <button id="saved-places-btn">
                    <i class="fa-solid fa-bookmark"></i>
                    Saved Places
                </button>
                <button id="logout-btn">Log Out</button>
            </div>
        </div>
    </div>

    <!-- Map controls and settings buttons -->
    <div class="map-buttons-container">
        <button class="js-settings-btn" title="Settings"><i class="fa-solid fa-gear"></i></button>
    </div>
    
    <!-- Settings menu (off-screen by default) -->
    <div id="menu-overlay" class="menu-overlay"></div>
    <div id="settings-menu" class="settings-menu">
        <div class="settings-header">
            <h2>Settings</h2>
            <button id="close-settings-btn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="settings-section">
            <h3>Map Style</h3>
            <div class="radio-group">
                <label><input type="radio" name="map-style" value="default" checked>Default</label>
                <label><input type="radio" name="map-style" value="satellite">Satellite</label>
            </div>
        </div>
        <div class="settings-section">
            <h3>Units</h3>
            <div class="radio-group">
                <label><input type="radio" name="map-units" value="imperial" checked>Imperial (mi)</label>
                <label><input type="radio" name="map-units" value="metric">Metric (km)</label>
            </div>
        </div>
    </div>
    
    <!-- Main side panel for search results and directions -->
    <div id="side-panel">
        <div id="panel-grabber"></div>
        <div id="panel-header">
            <div id="panel-search-placeholder" class="w-full" hidden></div>
            <button id="close-panel-btn"><i class="fa-solid fa-xmark"></i></button>
        </div>
        
        <!-- Info Panel (search results) -->
        <div id="info-panel-redesign" class="panel-content-scroll panel-content" hidden>
            <img id="info-image" alt="Place image">
            <h2 id="info-name"></h2>
            <p id="info-address"></p>
            <div class="info-actions">
                <button id="info-directions-btn"><i class="fa-solid fa-route"></i>Directions</button>
                <button id="info-save-btn"><i class="fa-solid fa-bookmark"></i>Save</button>
            </div>
            <div class="info-details">
                <h3>Quick Facts</h3>
                <p id="quick-facts-content"></p>
            </div>
            <div class="info-details">
                <h3>Weather</h3>
                <span class="pill" id="info-weather"></span>
            </div>
        </div>
        
        <!-- Directions Panel -->
        <div id="directions-panel-redesign" class="panel-content-scroll panel-content" hidden>
            <div class="directions-form">
                <div class="input-group">
                    <input type="text" id="panel-from-input" placeholder="Your location or address">
                    <div id="panel-from-suggestions"></div>
                    <button id="dir-use-my-location" class="use-location-btn" title="Use my location">
                        <i class="fa-solid fa-location-crosshairs"></i>
                    </button>
                </div>
                <div class="input-group">
                    <input type="text" id="panel-to-input" placeholder="Destination">
                    <div id="panel-to-suggestions"></div>
                    <button id="swap-btn" class="swap-btn" title="Swap start and end">
                        <i class="fa-solid fa-arrow-up-arrow-down"></i>
                    </button>
                </div>
                <button id="get-route-btn" class="submit-btn">Get Directions</button>
            </div>
            <div id="back-to-info-btn" style="text-align: center; margin-top: 1rem; cursor: pointer; color: var(--primary-color);">
                <i class="fa-solid fa-arrow-left"></i> Back to place info
            </div>
        </div>
        
        <!-- Route Steps Panel -->
        <div id="route-section" class="panel-content" hidden>
            <div class="route-header">
                <button id="exit-route-btn"><i class="fa-solid fa-arrow-left"></i></button>
                <p>Route Details</p>
                <span></span>
            </div>
            <div id="route-steps-container">
                <ul id="route-steps"></ul>
            </div>
        </div>
    </div>
    
    <!-- Navigation Status Panel (Visible during active navigation) -->
    <div id="navigation-status">
        <div id="navigation-instruction" class="nav-instruction"></div>
        <div class="progress-bar-container">
            <div id="instruction-progress-bar" class="progress-bar-fill"></div>
        </div>
        <div id="navigation-stats">
            <div class="stat-item">
                <div id="stat-eta">--:--</div>
                <div class="text-sm">ETA</div>
            </div>
            <div class="stat-item">
                <div id="stat-speed">0</div>
                <div class="text-sm">MPH</div>
            </div>
            <div class="stat-item">
                <div id="stat-time-remaining">0 min</div>
                <div class="text-sm">TIME</div>
            </div>
        </div>
        <button id="end-navigation-btn"><i class="fa-solid fa-xmark"></i></button>
    </div>

    <!-- Maplibre GL JS, OIDC, Turf.js, and your app script -->
    <script src="https://unpkg.com/maplibre-gl@4.1.0/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/@turf/turf@6.5.0/turf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/oidc-client-ts@2.2.0/dist/browser/oidc-client-ts.min.js"></script>
    <script src="/app.js"></script>
</body>
</html>

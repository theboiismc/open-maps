<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    
    <title>TheBoiisMC Maps</title>
    <meta name="description" content="Explore the world with private, modern mapping." />
    <meta name="theme-color" content="#00796b" />
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon512_rounded.png">
    
    <link href="libs/css/maplibre-gl-4.1.0.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">

    <style>
        .icon-svg { display: inline-block; width: 24px; height: 24px; fill: currentColor; vertical-align: middle; }
    </style>
</head>
<body>
    <div id="map"></div>

    <div id="top-banner">
        <span id="site-title">TheBoiisMC Maps</span>
        <div id="profile-area">
            <button class="js-settings-btn" aria-label="Map Settings"><span class="material-symbols-outlined"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg></span></button>
            <button id="profile-button" aria-label="User Profile"><span class="material-symbols-outlined"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.93 0 3.5 1.57 3.5 3.5S13.93 12 12 12s-3.5-1.57-3.5-3.5S10.07 5 12 5zm0 14.2c-2.73 0-5.1-.98-6.9-2.58.01-2.48 4.67-3.82 6.9-3.82 2.23 0 6.89 1.34 6.9 3.82-1.8 1.6-4.17 2.58-6.9 2.58z"/></svg></span></button>
            <div id="profile-dropdown"><div id="logged-in-view" hidden><div class="profile-section profile-section-header"><div class="username">User</div><div class="email">user@example.com</div></div><hr/><div class="profile-actions"><a id="saved-places-btn">Saved Places</a></div><hr/><div class="profile-actions"><a id="logout-btn">Log Out</a></div></div><div id="logged-out-view" hidden><div class="profile-section" style="text-align:center;font-weight:500;color:#5f6368;">Sign in to save places</div><hr/><div class="auth-buttons"><a href="#" id="login-btn" class="btn btn-primary">Log In</a><a href="#" id="signup-btn" class="btn btn-secondary">Sign Up</a></div></div></div>
        </div>
    </div>
    
    <div id="navigation-status"><!-- Navigation UI --></div>
    <div id="top-search-wrapper"><div id="main-search-container"><span id="search-icon-inside" class="material-symbols-outlined"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></span><input type="text" id="main-search" placeholder="Search TheBoiisMC Maps" autocomplete="off" /><span id="main-directions-icon" class="material-symbols-outlined" style="cursor: pointer;"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M21.5 15.6l-7.1-7.1C13.9 8.35 13.5 8 13 8h-2c-.5 0-1 .4-1 .85l-7 7.1c-.4.4-1.2.1-1.2.6v.9c0 .5.7.8 1.1.4l6.5-6.5c.5-.5.8-.8 1.4-.8h.8c.6 0 .9 .3 1.4 .8l6.5 6.5c.4.4 1.1.1 1.1-.4v-.9c0-.5-.7-.8-1.1-.4z"/></svg></span><div id="main-suggestions" class="suggestions-dropdown"></div></div></div>

    <div id="side-panel">
        <div id="panel-grabber"></div>
        <div id="panel-search-placeholder" hidden></div>
        <div class="panel-content">
            
            <!-- NEW: Default Panel Content (Initially Hidden) -->
            <div id="default-panel-content" hidden>
                <div class="panel-section">
                    <h2>Directions</h2>
                    <div class="icon-grid">
                        <div class="icon-item" id="default-drive-btn">
                            <div class="icon-circle" style="background-color: #4285F4;"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg></div>
                            <span>Drive</span>
                        </div>
                    </div>
                </div>
                 <div class="panel-section">
                    <h2>Nearby Places</h2>
                    <div class="icon-grid">
                        <div class="icon-item" data-search-query="restaurants">
                            <div class="icon-circle" style="background-color: #EA4335;"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z"/></svg></div>
                            <span>Restaurants</span>
                        </div>
                        <div class="icon-item" data-search-query="gas stations">
                            <div class="icon-circle" style="background-color: #4285F4;"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 3c-1.1 0-2 .9-2 2v4c0 1.1.9 2 2 2s2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14.2c-2.49 0-4.5-2.01-4.5-4.5s2.01-4.5 4.5-4.5 4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zM8.5 20v-2.5C7.02 16.99 6 15.64 6 14H4c0 2.21 1.79 4 4 4v2.5h-1V22h6v-1.5h-1V20h-3.5z"/></svg></div>
                            <span>Gas stations</span>
                        </div>
                    </div>
                </div>
            </div>

            <div id="info-panel-redesign" hidden><!-- Your existing info panel --></div>
            <div id="directions-panel-redesign" hidden><!-- Your existing directions panel --></div>
            <div id="route-preview-panel" hidden><!-- Your existing route preview panel --></div>
            <div id="route-section" hidden><!-- Your existing route steps panel --></div>
        </div>
    </div>
    
    <button id="mobile-settings-btn" class="js-settings-btn" aria-label="Map Settings"><!-- ... --></button>
    <div id="menu-overlay"></div>
    <div id="settings-menu"><!-- ... --></div>

        <div id="map">

        </div>
    <script src="https://cdn.jsdelivr.net/npm/oidc-client-ts@2.2.0/dist/browser/oidc-client-ts.min.js" defer></script>
    <script src="libs/js/maplibre-gl-4.1.0.js" defer></script>
    <script src='libs/js/turf-6.5.0.min.js' defer></script>
    <script src="app.js" defer></script>
</body>
</html>

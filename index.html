<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TheBoiisMC Maps</title>
    <link rel="icon" href="/53e87aea-e737-4098-a968-363c73a31175.png" />
    <meta property="og:title" content="TheBoiisMC Maps" />
    <meta property="og:description" content="Explore the world with private, modern mapping." />
    <meta property="og:image" content="https://maps.theboiismc.com/53e87aea-e737-4098-a968-363c73a31175.png" />
    <meta property="og:url" content="https://maps.theboiismc.com" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TheBoiisMC Maps" />
    <meta name="twitter:description" content="Explore the world with private, modern mapping." />
    <meta name="twitter:image" content="https://maps.theboiismc.com/53e87aea-e737-4098-a968-363c73a31175.png" />
    <meta name="theme-color" content="#1a73e8" />

    <!-- Styles -->
    <style>
      :root {
        --panel-width: 320px;
        --panel-mobile-height: 420px;
        --panel-mobile-peek: 160px;
      }

      html, body, #map {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      }

      #map {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
      }

      /* Main search bar */
      #main-search-container {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 60;
        width: 250px;
        background: #fafafa;
        border-radius: 20px;
        box-shadow: 0 2px 8px rgb(0 0 0 / 0.1);
        padding: 8px 12px;
        display: flex;
        align-items: center;
      }

      /* Suggestions dropdown */
      .suggestions-dropdown {
        position: absolute;
        background: white;
        border: 1px solid #ccc;
        width: 100%;
        max-height: 160px;
        overflow-y: auto;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgb(0 0 0 / 0.1);
        z-index: 70;
        display: none;
      }

      /* Side panel styles */
      #side-panel {
        position: fixed;
        top: 0;
        left: 0;
        background: #fff;
        width: var(--panel-width);
        height: 100%;
        box-shadow: 2px 0 15px rgba(0, 0, 0, 0.1);
        padding: 20px;
        z-index: 50;
        display: none;
      }

      #side-panel.open {
        display: block;
      }

      /* Panel content sections */
      #place-info-section, #directions-section, #route-section {
        margin-top: 40px;
      }

      /* Directions form */
      #directions-form {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      /* Buttons */
      button {
        background: #1a73e8;
        border: none;
        padding: 10px;
        border-radius: 6px;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled {
        background: #aaa;
        cursor: not-allowed;
      }

      /* Responsive tweaks */
      @media (max-width: 768px) {
        #main-search-container {
          width: 90vw;
          left: 5vw;
          transform: none;
        }
        #side-panel {
          top: auto;
          bottom: calc(-1 * (var(--panel-mobile-height) - var(--panel-mobile-peek)));
          left: 0;
          width: 100%;
          height: var(--panel-mobile-height);
          border-radius: 20px 20px 0 0;
          box-shadow: 0 -3px 18px rgba(0, 0, 0, 0.1);
        }
      }
    </style>
  </head>
  <body>
    <div id="map"></div>

    <!-- Main search bar -->
    <div id="main-search-container">
      <input type="text" id="main-search" placeholder="Search places..." autocomplete="off" aria-autocomplete="list" />
      <button id="main-search-icon">🔍</button>
      <div id="main-suggestions" class="suggestions-dropdown"></div>
    </div>

    <!-- Side panel -->
    <aside id="side-panel">
      <button id="close-side-panel">×</button>
      <section id="place-info-section">
        <h2 id="place-name"></h2>
        <p id="place-description"></p>
        <button id="directions-btn">Get Directions</button>
      </section>
      <section id="directions-section" hidden>
        <form id="directions-form">
          <label for="panel-from-input">From</label>
          <input type="text" id="panel-from-input" />
          <label for="panel-to-input">To</label>
          <input type="text" id="panel-to-input" />
          <button type="submit">Route</button>
        </form>
        <button id="back-to-info-btn">Back</button>
        <p id="directions-result"></p>
      </section>
      <section id="route-section" hidden>
        <ol id="route-steps"></ol>
        <button id="exit-route-btn">Stop Navigation</button>
      </section>
    </aside>

    <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <script src="app.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TheBoiisMC Maps</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/maplibre-gl"></script>
  <script src="https://unpkg.com/fuse.js"></script>
</head>
<body>
  <div id="map"></div>
  
  <!-- Main Search Bar -->
  <div id="main-search-container" class="search-container">
    <input type="text" id="main-search" placeholder="Search for a place...">
    <div id="main-suggestions"></div>
    <button id="main-search-icon" class="search-icon">&#x1F50D;</button>
  </div>
  
  <!-- Sidebar Panel -->
  <div id="side-panel" class="panel">
    <button id="close-side-panel" class="close-btn">&#10006;</button>
    <div id="place-info-section" class="panel-section">
      <h3 id="place-name"></h3>
      <p id="place-description"></p>
      <p id="place-weather"></p>
      <div id="place-images"></div>
      <button id="directions-btn">Get Directions</button>
    </div>
    <div id="directions-section" class="panel-section">
      <form id="directions-form">
        <input id="panel-from-input" placeholder="From...">
        <input id="panel-to-input" placeholder="To...">
        <div id="panel-from-suggestions"></div>
        <div id="panel-to-suggestions"></div>
      </form>
      <button id="back-to-info-btn">Back</button>
    </div>
    <div id="route-section" class="panel-section">
      <ul id="route-steps"></ul>
      <button id="exit-route-btn">Exit Navigation</button>
    </div>
  </div>
  
  <script src="app.js"></script>
</body>
</html>

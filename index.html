<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

    <title>TheBoiisMC Maps | Private, Modern & Fast Online Maps</title>

    <meta name="description" content="Discover places, get real-time traffic updates, and plan routes with TheBoiisMC Maps. A fast, private, and modern alternative for all your mapping needs." />
    
    <meta name="keywords" content="maps, online maps, private mapping, navigation, directions, route planner, theboiismc" />

    <link rel="canonical" href="https://maps.theboiismc.com/" />

    <meta name="robots" content="index, follow" />

    <meta name="theme-color" content="#00796b" />
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon512_rounded.png">

    <meta property="og:title" content="TheBoiisMC Maps | Private, Modern & Fast Online Maps" />
    <meta property="og:description" content="Discover, navigate, and explore your world with a fast, private, and modern mapping experience." />
    <meta property="og:image" content="https://maps.theboiismc.com/icon512_rounded.png" />
    <meta property="og:url" content="https://maps.theboiismc.com/" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TheBoiisMC Maps | Private, Modern & Fast Online Maps" />
    <meta name="twitter:description" content="Discover, navigate, and explore your world with a fast, private, and modern mapping experience." />
    <meta name="twitter:image" content="https://maps.theboiismc.com/icon512_rounded.png" />

    <link href="libs/css/maplibre-gl-4.1.0.css" rel="stylesheet">
    <link rel="stylesheet" href="libs/css/styles.css">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "TheBoiisMC Maps",
      "url": "https://maps.theboiismc.com/",
      "applicationCategory": "TravelApplication",
      "operatingSystem": "All",
      "browserRequirements": "Requires HTML5 support",
      "description": "A private, modern, and fast online mapping service for finding locations, getting directions, and exploring the world.",
      "featureList": [
        "Real-time traffic",
        "Route planning",
        "Place search",
        "Private mapping"
      ],
      "screenshot": "https://maps.theboiismc.com/screenshot.jpg",
      "creator": {
        "@type": "Organization",
        "name": "TheBoiisMC",
        "url": "https://www.theboiismc.com"
      },
      "offers": {
        "@type": "Offer",
        "price": "0"
      }
    }
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol"; }
        .material-symbols-outlined { display: inline-block; width: 24px; height: 24px; fill: currentColor; vertical-align: middle; }
        .icon-svg { width: 100%; height: 100%; }
        /* SEO Change: Visually hide the H1 tag but keep it for screen readers and crawlers */
        .visually-hidden { position: absolute; width: 1px; height: 1px; margin: -1px; padding: 0; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0; }
    </style>
</head>
<body>
    <header id="top-banner">
        <span id="site-title">TheBoiisMC Maps</span>
        <div id="profile-area">
            <button class="js-settings-btn" aria-label="Map Settings">
                <span class="material-symbols-outlined" aria-hidden="true">
                    <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </span>
            </button>
            </div>
    </header>

    <main>
        <div id="top-search-wrapper">
            <div id="main-search-container">
                <h1 class="visually-hidden">TheBoiisMC Maps: Search and Navigation</h1>
                <label for="main-search" class="visually-hidden">Search for a place or address</label>
                <span id="search-icon-inside" class="material-symbols-outlined" aria-hidden="true">
                    <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </span>
                <input type="text" id="main-search" placeholder="Search TheBoiisMC Maps" autocomplete="off" />
                <span id="main-directions-icon" class="material-symbols-outlined" aria-hidden="true">
                    <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a4 4 0 0 0 4-4h-8a4 4 0 0 0 4 4Z"/><path d="M12 2a4 4 0 0 0-4 4v1h8V6a4 4 0 0 0-4-4Z"/><path d="m15 11-3-3-3 3"/><path d="m9 13 3 3 3-3"/></svg>
                </span>
                <div id="main-suggestions" class="suggestions-dropdown"></div>
            </div>
        </div>

        <aside id="side-panel">
            <div id="panel-grabber"></div>
            <div id="panel-search-placeholder" hidden></div>
            <div class="panel-content">
                <div id="info-panel-redesign" hidden>
                     <div class="header-image-container">
                        <img class="header-image" id="info-image" src="" alt="Image of the selected location"/>
                        </div>
                </div>
            </div>
        </aside>

        <div id="map"></div>
    </main>
    
    <div id="toast-container"></div>
    <script src="libs/js/oidc-client-ts@2.2.0.js" defer></script>
    <script src="libs/js/maplibre-gl-4.1.0.js" defer></script>
    <script src='libs/js/turf-6.5.0.min.js' defer></script>
    <script src="app.js" defer></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Modern Map</title>
  <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: 'Segoe UI', sans-serif;
    }

    #map {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 100%;
    }

    .search-container {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 400px;
      z-index: 999;
    }

    #search {
      width: 100%;
      padding: 12px 14px;
      font-size: 15px;
      border: none;
      border-radius: 10px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
      outline: none;
    }

    #suggestions {
      position: absolute;
      top: 50px;
      width: 100%;
      background: white;
      border-radius: 10px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.15);
      overflow: hidden;
      display: none;
      max-height: 200px;
      overflow-y: auto;
    }

    .suggestion {
      padding: 10px 14px;
      cursor: pointer;
    }

    .suggestion:hover {
      background: #f0f0f0;
    }

    @media (max-width: 600px) {
      .search-container {
        max-width: 90%;
      }
    }
  </style>
</head>
<body>
  <div class="search-container">
    <input id="search" type="text" placeholder="Search city, state, place..." autocomplete="off"/>
    <div id="suggestions"></div>
  </div>
  <div id="map"></div>

  <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
  <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TheBoiisMC Maps</title>
    <!-- Favicon & Social metas -->
    <link rel="icon" href="/53e87aea-e737-4098-a968-363c73a31175.png" />
    <meta property="og:title" content="TheBoiisMC Maps" />
    <meta property="og:description" content="Explore the world with private, modern mapping." />
    <meta property="og:image" content="https://maps.theboiismc.com/53e87aea-e737-4098-a968-363c73a31175.png" />
    <meta property="og:url" content="https://maps.theboiismc.com" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TheBoiisMC Maps" />
    <meta name="twitter:description" content="Explore the world with private, modern mapping." />
    <meta name="twitter:image" content="https://maps.theboiismc.com/53e87aea-e737-4098-a968-363c73a31175.png" />
    <meta name="theme-color" content="#1a73e8" />

    <!-- Styles -->
    <style>
      :root {
        --panel-width: 320px;
        --panel-mobile-height: 420px;
        --panel-mobile-peek: 160px;
      }
      html,
      body,
      #map {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      }
      #map {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
      }

      /* Main search bar - fixed top-left */
      #main-search-container {
        position: fixed;
        top: 20px;
        left: 20px;          /* move to top-left with some margin */
        transform: none;     /* remove the translateX */
        width: 280px;        /* thinner width */
        background: #fff;    /* bright white, Google style */
        border-radius: 24px; /* big rounded corners */
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        padding: 6px 12px;   /* a bit tighter padding */
        display: flex;
        align-items: center;
        z-index: 60;
        transition: opacity 0.3s ease, visibility 0.3s ease;
      }
      #main-search-container.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      #main-search-container input[type="text"] {
        font-size: 1rem;
        border: none;
        outline: none;
        flex-grow: 1;
        background: transparent;
        border-radius: 24px;
        padding: 6px 10px;
      }

      #main-search-icon {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 1.2rem;
        color: #555;
        padding-left: 8px;
      }

      /* Panel styles */
      #side-panel {
        position: fixed;
        background: #fff;
        box-shadow: 2px 0 15px rgba(0, 0, 0, 0.1);
        overflow-y: auto;
        padding: 20px;
        z-index: 55;
        transition: left 0.3s ease, bottom 0.3s ease;
        will-change: left, bottom;
        /* Desktop defaults */
        top: 0;
        left: calc(-1 * var(--panel-width));
        width: var(--panel-width);
        height: 100%;
        border-radius: 0;
      }
      /* Desktop open state */
      #side-panel.open {
        left: 0;
      }
      /* Mobile panel adjustments */
      @media (max-width: 768px) {
        #side-panel {
          top: auto;
          bottom: calc(-1 * (var(--panel-mobile-height) - var(--panel-mobile-peek)));
          left: 0;
          width: 100%;
          height: var(--panel-mobile-height);
          border-radius: 20px 20px 0 0;
          box-shadow: 0 -3px 18px rgba(0, 0, 0, 0.1);
        }
        #side-panel.open {
          bottom: 0;
        }
      }

      /* Buttons */
      button {
        background: #1a73e8;
        border: none;
        padding: 10px;
        border-radius: 6px;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        background: #0c59a1;
      }
    </style>

    <!-- Importing libraries -->
    <script src="https://unpkg.com/maplibre-gl@2.3.0/dist/maplibre-gl.js"></script>
    <link
      href="https://unpkg.com/maplibre-gl@2.3.0/dist/maplibre-gl.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="map"></div>

    <div id="main-search-container" class="hidden">
      <input
        type="text"
        id="main-search"
        placeholder="Search places..."
      />
      <button id="main-search-icon">🔍</button>
    </div>

    <div id="side-panel" aria-hidden="true">
      <!-- Panel content here -->
    </div>

    <script src="app.js"></script>
  </body>
</html>

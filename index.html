<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>TheBoiisMC Maps — Private, modern mapping</title>
<meta name="description" content="TheBoiisMC Maps — private, privacy-first map interface with routing, live traffic, and a modern mobile experience." />
<meta name="theme-color" content="#00796b" />

<!-- Fonts + icons -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

<!-- MapLibre GL CSS -->
<link href="https://unpkg.com/maplibre-gl@4.1.0/dist/maplibre-gl.css" rel="stylesheet" />

<!-- Main styles -->
<link rel="stylesheet" href="styles.css" />

<style>
  html, body { margin:0; padding:0; height:100%; width:100%; }
  #map { position: relative; width: 100%; height: 100vh; }
  .sr-only { position: absolute !important; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
</style>
</head>
<body>
  <!-- Map container -->
  <main id="map" role="application" aria-label="Map view">
    <div id="map-watermark">TheBoiisMC</div>
  </main>

  <!-- Load main.js as module -->
  <script type="module" src="js/main.js"></script>
</body>
</html>

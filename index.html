<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TheBoiisMC Maps</title>
    <meta name="description" content="Private, modern, and secure mapping." />
    <meta name="theme-color" content="#ffffff" />
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="/assets/icon512_rounded.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    
    <link href="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://static.theboiismc.com/css/map3.css">
</head>
<body>

    <div id="map" aria-label="Interactive Map"></div>

    <div id="floating-search-card">
        <button id="app-menu-button" aria-label="Main Menu">
            <span class="material-symbols-outlined">menu</span>
        </button>
        
        <input type="text" id="main-search" placeholder="Search TheBoiisMC Maps" autocomplete="off" />
        
        <div class="search-actions">
            <button id="search-icon-inside" aria-label="Search">
                <span class="material-symbols-outlined">search</span>
            </button>
            <div class="divider-vertical"></div>
            <button id="main-directions-icon" aria-label="Directions">
                <span class="material-symbols-outlined">directions</span>
            </button>
        </div>
        
        <div id="main-suggestions" class="suggestions-dropdown" hidden>
            <div id="initial-suggestions-view">
                <div id="recent-searches-container"></div>
            </div>
            <div id="api-suggestions-view" hidden></div>
        </div>
    </div>

    <div id="desktop-category-container">
        </div>

    <div id="floating-top-right">
        <div class="floating-btn-wrapper">
            <button id="apps-button" class="floating-circle-btn" aria-label="Apps">
                <span class="material-symbols-outlined">apps</span>
            </button>
            <div id="services-dropdown" role="menu">
                <a href="https://search.theboiismc.com" class="service-item"><span class="material-symbols-outlined">search</span><span class="service-name">Search</span></a>
                <a href="https://maps.theboiismc.com" class="service-item"><span class="material-symbols-outlined">map</span><span class="service-name">Maps</span></a>
                <a href="https://drive.theboiismc.com" class="service-item"><span class="material-symbols-outlined">cloud</span><span class="service-name">Drive</span></a>
                <a href="https://myaccount.theboiismc.com" class="service-item"><span class="material-symbols-outlined">account_circle</span><span class="service-name">Account</span></a>
                <hr>
                <button id="settings-icon-btn" class="service-item btn-reset"><span class="material-symbols-outlined">settings</span>Map Settings</button>
            </div>
        </div>

        <div class="floating-btn-wrapper" id="profile-area">
            <button id="profile-button" class="floating-circle-btn" aria-label="Profile">
                <span class="material-symbols-outlined">account_circle</span>
            </button>
            <div id="profile-dropdown" role="menu">
                <div id="logged-in-view" hidden>
                    <div class="profile-header">
                        <img id="dropdown-avatar" class="avatar-small" src="" alt="" hidden />
                        <div>
                            <div class="username">User</div>
                            <div class="email">user@example.com</div>
                        </div>
                    </div>
                    <hr>
                    <a id="saved-places-btn" href="#" class="service-item">Saved Places</a>
                    <a id="logout-btn" href="#" class="service-item">Log Out</a>
                </div>
                <div id="logged-out-view">
                    <p style="padding:15px; margin:0; text-align:center; color:#5f6368;">Sign in to save places</p>
                    <div style="padding:10px;">
                        <a href="#" id="login-btn" class="btn-primary-block">Log In</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="side-panel" role="complementary">
        <div class="panel-scroll-container">
            <div id="dynamic-content"></div>
        </div>
    </div>
    
    <div id="navigation-status" hidden>
        <div id="instruction-container">
            <span id="maneuver-icon" class="material-symbols-outlined">straight</span>
            <div id="instruction-text-wrapper">
                <div id="instruction-dist"></div>
                <div id="navigation-instruction">Starting...</div>
            </div>
        </div>
        <div id="instruction-progress-bar"></div>
        <button id="end-navigation-btn">Exit</button>
         <div id="trip-stats-container">
            <div class="stat-item"><span id="stat-speed">--</span><span class="stat-label">mph</span></div>
            <div class="stat-item"><span id="stat-miles-remaining">--</span><span class="stat-label">mi</span></div>
            <div class="stat-item"><span id="stat-time-remaining">--</span><span class="stat-label">min</span></div>
            <div class="stat-item"><span id="stat-eta">--:--</span><span class="stat-label">ETA</span></div>
        </div>
    </div>

    <div id="toast-container"></div>
    <div id="settings-modal" class="modal-container">
         <div id="modal-overlay" class="modal-overlay"></div>
         <div class="modal-content">
            <div class="modal-header">
                <h4>Map Settings</h4>
                <button id="close-settings-btn" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <div class="setting-row">
                    <span>Globe View</span>
                    <label class="switch"><input type="checkbox" id="globe-toggle"><span class="slider round"></span></label>
                </div>
                <hr>
                <div class="setting-row">
                    <span>Theme</span>
                    <div class="radio-group">
                         <label><input type="radio" name="map-theme" value="light" checked> Light</label>
                         <label><input type="radio" name="map-theme" value="dark"> Dark</label>
                    </div>
                </div>
                 <hr>
                 <button id="advanced-settings-btn" class="text-btn">Advanced Settings</button>
            </div>
         </div>
    </div>
    
    <div id="advanced-settings-modal" class="modal-container"><div id="modal-overlay-advanced" class="modal-overlay"></div><div class="modal-content"><div class="modal-header"><h4>Advanced</h4><button id="close-advanced-settings-btn" class="close-btn">&times;</button></div><div class="modal-body"><ul id="tile-priority-list"></ul><hr><button id="privacy-clear-recents-toggle" hidden></button><button id="privacy-disable-suggestions-toggle" hidden></button></div></div></div>

    <div id="context-menu" class="context-menu">
        <div id="context-menu-coords"></div>
        <button id="ctx-directions-from">Directions from here</button>
        <button id="ctx-directions-to">Directions to here</button>
        <button id="ctx-whats-here">What's here?</button>
    </div>

    <template id="tmpl-home">
        <div class="panel-padding">
            <h3>Latest in your area</h3>
            <div id="home-recents-list"></div>
            <div class="footer-legal">&copy; 2026 TheBoiisMC</div>
        </div>
    </template>

    <template id="tmpl-place-details">
        <div class="hero-image-container">
            <img id="info-image" src="" alt="Place Image">
            <button id="details-back-btn" class="back-fab"><span class="material-symbols-outlined">arrow_back</span></button>
            <div class="hero-text">
                <h2 id="info-name"></h2>
                <span id="info-weather" class="badge"></span>
            </div>
        </div>
        <div class="panel-padding">
            <div class="address-line"><span class="material-symbols-outlined">location_on</span><span id="info-subtitle"></span></div>
            <div class="action-row">
                <button id="btn-details-dir" class="action-btn blue"><span class="material-symbols-outlined">directions</span>Directions</button>
                <button id="btn-details-save" class="action-btn outline"><span class="material-symbols-outlined">bookmark_border</span>Save</button>
            </div>
            <hr>
            <p id="quick-facts-content"></p>
            <button id="info-website-btn" class="text-btn" style="display:none;">Visit Website</button>
        </div>
    </template>

    <template id="tmpl-directions">
        <div class="panel-padding">
            <div class="travel-modes">
                <button class="mode-btn active"><span class="material-symbols-outlined">directions_car</span></button>
                <button class="mode-btn"><span class="material-symbols-outlined">directions_walk</span></button>
                <button class="mode-btn"><span class="material-symbols-outlined">directions_bike</span></button>
            </div>
            <div class="inputs-stack">
                <div class="input-row">
                    <span class="material-symbols-outlined dot-start">trip_origin</span>
                    <input type="text" id="panel-from-input" placeholder="Start location">
                    <div id="panel-from-suggestions" class="suggestions-dropdown" hidden></div>
                </div>
                <div class="input-row">
                    <span class="material-symbols-outlined dot-end">location_on</span>
                    <input type="text" id="panel-to-input" placeholder="Destination">
                     <div id="panel-to-suggestions" class="suggestions-dropdown" hidden></div>
                </div>
                <button id="swap-btn" class="swap-fab"><span class="material-symbols-outlined">swap_vert</span></button>
            </div>
            <button id="dir-use-my-location" class="location-btn"><span class="material-symbols-outlined">my_location</span> Your Location</button>
            <button id="get-route-btn" class="btn-primary-block">Preview Route</button>
            <button id="cancel-route-btn" class="text-btn" style="width:100%; text-align:center;">Cancel</button>
        </div>
    </template>

    <template id="tmpl-route-preview">
        <div class="panel-padding" style="text-align:center;">
            <h1 id="route-time-display" style="color:#1a73e8; margin-bottom:5px;"></h1>
            <div id="route-dist-display" style="color:#5f6368;"></div>
            <br>
            <button id="start-navigation-btn" class="btn-primary-block"><span class="material-symbols-outlined">navigation</span> Start Navigation</button>
            <br>
            <button id="back-to-directions-btn" class="text-btn">Back</button>
        </div>
    </template>

    <template id="tmpl-search-results">
        <div class="panel-padding">
            <button id="results-back-btn" class="text-btn"><span class="material-symbols-outlined">arrow_back</span> Back</button>
            <h3 id="results-header-text"></h3>
            <div id="search-results-list"></div>
        </div>
    </template>
    
    <template id="tmpl-result-item">
        <button class="search-result-item">
            <div class="result-item-icon"><span class="material-symbols-outlined">location_on</span></div>
            <div class="result-item-details"><h4 class="item-title"></h4><p class="item-subtitle"></p></div>
            <div class="result-item-distance"></div>
        </button>
    </template>

    <script src="https://static.theboiismc.com/js/identity/oidc-client-ts@2.2.0.js"></script>
    <script src="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.js"></script>
    <script src="https://static.theboiismc.com/js/maps/turf.js"></script>
    <script src="https://static.theboiismc.com/js/maps/maps78.js"></script>
</body>
</html>

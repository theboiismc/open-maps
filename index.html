<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TheBoiisMC Maps - Private Navigation</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    
    <link href="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.css" rel="stylesheet" />
    
    <link rel="stylesheet" href="maps_v6.3.1.css">
</head>
<body>

    <header class="app-header">
        <div class="header-left">
            <button id="menu-btn" class="icon-btn" aria-label="Menu">
                <span class="material-icons">menu</span>
            </button>
            
            <div class="search-bar-container">
                <input type="text" id="search-input" placeholder="Search TheBoiisMC Maps">
                <button id="search-submit-btn" class="icon-btn-small">
                    <span class="material-icons">search</span>
                </button>
                <div class="divider-vertical"></div>
                <button id="directions-btn-header" class="icon-btn-small" aria-label="Directions">
                    <span class="material-icons">directions</span>
                </button>
            </div>
        </div>

        <div class="header-right">
            <button id="apps-btn" class="icon-btn" aria-label="Apps">
                <span class="material-icons">apps</span>
            </button>
            
            <button id="profile-btn" class="icon-btn" aria-label="Account">
                <span class="material-icons">account_circle</span>
            </button>
        </div>
    </header>

    <div id="apps-menu-container" class="apps-menu hidden">
        </div>

    <div id="sidebar" class="sidebar sidebar-closed">
        <div id="sidebar-content">
            </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/maplibre-gl@3.6.2/dist/maplibre-gl.js"></script>
    <script src="maps_v6.2.5.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TheBoiisMC Maps</title>
    <link rel="icon" href="/53e87aea-e737-4098-a968-363c73a31175.png" />
    <meta property="og:title" content="TheBoiisMC Maps" />
    <meta property="og:description" content="Explore the world with private, modern mapping." />
    <meta property="og:image" content="https://maps.theboiismc.com/53e87aea-e737-4098-a968-363c73a31175.png" />
    <meta property="og:url" content="https://maps.theboiismc.com" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TheBoiisMC Maps" />
    <meta name="twitter:description" content="Explore the world with private, modern mapping." />
    <meta name="twitter:image" content="https://maps.theboiismc.com/53e87aea-e737-4098-a968-363c73a31175.png" />
    <meta name="theme-color" content="#1a73e8" />

    <style>
      :root {
        --panel-width: 320px;
        --panel-mobile-height: 420px;
        --panel-mobile-peek: 160px;
      }
      html, body, #map {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      }
      #map {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
      }

      /* Main search bar - fixed top center */
      #main-search-container {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 60;
        width: 250px;
        background: #fafafa;
        border-radius: 8px;
        padding: 10px;
        display: flex;
        justify-content: space-between;
      }

      #main-search {
        width: 80%;
        padding: 8px;
        border: none;
        border-radius: 5px;
        font-size: 14px;
        box-shadow: 0 0 6px rgba(0, 0, 0, 0.1);
      }

      #main-suggestions {
        position: absolute;
        top: 40px;
        left: 0;
        right: 0;
        background: white;
        box-shadow: 0 0 6px rgba(0, 0, 0, 0.2);
        display: none;
        z-index: 50;
        border-radius: 5px;
        max-height: 200px;
        overflow-y: auto;
      }

      .suggestion {
        padding: 8px;
        cursor: pointer;
      }

      .suggestion:hover {
        background-color: #f5f5f5;
      }

      /* Panel Styles */
      #side-panel {
        display: none;
        width: var(--panel-width);
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        background: white;
        box-shadow: 4px 0 10px rgba(0, 0, 0, 0.1);
        padding: 20px;
        z-index: 100;
        flex-direction: column;
        align-items: stretch;
        overflow-y: auto;
        transition: all 0.3s ease-in-out;
      }

      /* Directions Section */
      #directions-section {
        display: block;
      }
    </style>
  </head>

  <body>
    <!-- Map Container -->
    <div id="map"></div>

    <!-- Main Search Bar -->
    <div id="main-search-container">
      <input type="text" id="main-search" placeholder="Search for places" />
    </div>

    <!-- Suggestions for Main Search -->
    <div id="main-suggestions"></div>

    <!-- Directions Panel -->
    <div id="side-panel">
      <h3>Get Directions</h3>
      <form id="directions-form">
        <input type="text" id="panel-from-input" placeholder="From" autocomplete="off" />
        <div id="panel-from-suggestions"></div>
        <input type="text" id="panel-to-input" placeholder="To" autocomplete="off" />
        <div id="panel-to-suggestions"></div>
        <button type="submit">Get Directions</button>
      </form>

      <!-- Route Steps -->
      <div id="route-section" hidden>
        <h4>Route Steps</h4>
        <ul id="route-steps"></ul>
      </div>
    </div>

    <script src="https://unpkg.com/maplibre-gl@2.6.1/dist/maplibre-gl.js"></script>
    <script src="app.js"></script>
  </body>
</html>

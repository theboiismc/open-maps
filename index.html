<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TheBoiisMC Maps</title>
    <!-- Favicon & Social metas -->
    <link rel="icon" href="/53e87aea-e737-4098-a968-363c73a31175.png" />
    <meta property="og:title" content="TheBoiisMC Maps" />
    <meta property="og:description" content="Explore the world with private, modern mapping." />
    <meta property="og:image" content="https://maps.theboiismc.com/53e87aea-e737-4098-a968-363c73a31175.png" />
    <meta property="og:url" content="https://maps.theboiismc.com" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TheBoiisMC Maps" />
    <meta name="twitter:description" content="Explore the world with private, modern mapping." />
    <meta name="twitter:image" content="https://maps.theboiismc.com/53e87aea-e737-4098-a968-363c73a31175.png" />
    <meta name="theme-color" content="#1a73e8" />

    <!-- Styles -->
    <style>
      :root {
        --panel-width: 320px;
        --panel-mobile-height: 420px;
        --panel-mobile-peek: 160px;
      }

      html,
      body,
      #map {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
      }

      #map {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
      }

      /* Panel styles */
      #side-panel {
        position: fixed;
        background: #fff;
        box-shadow: 2px 0 15px rgba(0, 0, 0, 0.1);
        overflow-y: auto;
        padding: 20px;
        z-index: 55;
        transition: left 0.3s ease, bottom 0.3s ease;
        will-change: left, bottom;
        /* Desktop defaults */
        top: 0;
        left: calc(-1 * var(--panel-width));
        width: var(--panel-width);
        height: 100%;
        border-radius: 0;
      }

      /* Desktop open state */
      #side-panel.open {
        left: 0;
      }

      /* Mobile panel adjustments */
      @media (max-width: 768px) {
        #side-panel {
          top: auto;
          bottom: calc(-1 * (var(--panel-mobile-height) - var(--panel-mobile-peek)));
          left: 0;
          width: 100%;
          height: var(--panel-mobile-height);
          border-radius: 20px 20px 0 0;
          box-shadow: 0 -3px 18px rgba(0, 0, 0, 0.1);
        }
        #side-panel.open {
          bottom: 0;
        }
      }

      /* Search bar styles */
      .search-bar {
        display: flex;
        align-items: center;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 8px 12px;
        margin-bottom: 10px;
        background: #fafafa;
      }

      .search-bar input[type="text"] {
        border: none;
        outline: none;
        flex-grow: 1;
        font-size: 1rem;
        background: transparent;
      }

      .search-bar button {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 1.2rem;
        color: #555;
      }

      #suggestions,
      #recent-searches {
        position: absolute;
        background: white;
        border: 1px solid #ccc;
        width: calc(var(--panel-width) - 40px);
        max-height: 160px;
        overflow-y: auto;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgb(0 0 0 / 0.1);
        z-index: 60;
        display: none;
      }

      #suggestions .suggestion,
      #recent-searches .suggestion {
        padding: 8px 12px;
        cursor: pointer;
      }

      #suggestions .suggestion:hover,
      #recent-searches .suggestion:hover {
        background: #eee;
      }

      #recent-searches {
        top: 56px;
      }

      #suggestions {
        top: 56px;
      }

      /* Close button */
      #close-side-panel {
        position: absolute;
        top: 12px;
        right: 12px;
        background: none;
        border: none;
        font-size: 1.8rem;
        cursor: pointer;
        color: #999;
      }

      /* Panel arrow toggler */
      #panel-arrow {
        position: absolute;
        top: 50%;
        right: -28px;
        transform: translateY(-50%);
        width: 24px;
        height: 48px;
        background: #1a73e8;
        border-radius: 8px 0 0 8px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
        user-select: none;
        z-index: 60;
      }

      @media (max-width: 768px) {
        #panel-arrow {
          right: 50%;
          bottom: calc(var(--panel-mobile-height) - var(--panel-mobile-peek) - 20px);
          top: auto;
          width: 48px;
          height: 24px;
          border-radius: 20px 20px 0 0;
          transform: translateX(50%) rotate(180deg);
        }
      }

      /* Panel search icon */
      #panel-search-icon {
        cursor: pointer;
        margin-left: 10px;
        font-size: 1.4rem;
        color: #1a73e8;
      }

      /* Sections */
      #place-info-section,
      #directions-section,
      #route-section {
        margin-top: 40px;
      }

      /* Directions form */
      #directions-form {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      #directions-form input[type="text"] {
        padding: 8px;
        font-size: 1rem;
        border-radius: 6px;
        border: 1px solid #ccc;
        width: 100%;
      }

      /* Suggestion dropdowns in directions */
      #from-suggestions,
      #to-suggestions {
        position: absolute;
        background: white;
        border: 1px solid #ccc;
        border-radius: 8px;
        max-height: 140px;
        overflow-y: auto;
        width: 100%;
        z-index: 70;
        display: none;
      }

      #from-suggestions .suggestion,
      #to-suggestions .suggestion {
        padding: 8px 12px;
        cursor: pointer;
      }

      #from-suggestions .suggestion:hover,
      #to-suggestions .suggestion:hover {
        background: #eee;
      }

      /* Buttons */
      button {
        background: #1a73e8;
        border: none;
        padding: 10px;
        border-radius: 6px;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }

      button:disabled {
        background: #aaa;
        cursor: not-allowed;
      }

      /* Route steps list */
      #route-steps {
        list-style-type: decimal;
        padding-left: 20px;
      }

      /* Responsive tweaks */
      @media (max-width: 768px) {
        #suggestions,
        #recent-searches {
          width: calc(100% - 40px);
        }
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <aside id="side-panel" aria-hidden="true" aria-label="Sidebar panel">
      <button id="close-side-panel" aria-label="Close panel">&times;</button>
      <div class="search-bar">
        <input
          type="text"
          id="search"
          placeholder="Search places"
          autocomplete="off"
          aria-autocomplete="list"
          aria-controls="suggestions"
          aria-haspopup="listbox"
        />
        <button id="panel-search-icon" aria-label="Focus search">&#128269;</button>
      </div>
      <div id="suggestions" role="listbox" tabindex="-1"></div>
      <div id="recent-searches" role="listbox" tabindex="-1"></div>

      <!-- Place info -->
      <section id="place-info-section" hidden>
        <h2 id="place-name"></h2>
        <p id="place-description"></p>
        <p id="place-weather"></p>
        <div id="place-images"></div>
        <button id="directions-btn">Get Directions</button>
      </section>

      <!-- Directions -->
      <section id="directions-section" hidden>
        <form id="directions-form">
          <label for="from-input">From</label>
          <input type="text" id="from-input" autocomplete="off" />
          <div id="from-suggestions" role="listbox"></div>
          <button type="button" class="my-loc-btn" aria-label="Use my location as start">
            Use My Location (From)
          </button>

          <label for="to-input">To</label>
          <input type="text" id="to-input" autocomplete="off" />
          <div id="to-suggestions" role="listbox"></div>
          <button type="button" class="my-loc-btn" aria-label="Use my location as destination">
            Use My Location (To)
          </button>

          <button type="submit" id="route-btn">Route</button>
        </form>
        <button id="back-to-info-btn" type="button">Back</button>
        <p id="directions-result"></p>
      </section>

      <!-- Route steps -->
      <section id="route-section" hidden>
        <h3>Route Steps</h3>
        <ol id="route-steps"></ol>
        <button id="exit-route-btn" type="button">Stop Navigation</button>
      </section>

      <div id="panel-arrow" aria-label="Toggle side panel" role="button" tabindex="0">
        &lt;
      </div>
    </aside>

    <!-- MapLibre GL JS -->
    <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
    <!-- Fuse.js -->
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>

    <!-- App script -->
    <script src="app.js"></script>
  </body>
</html>

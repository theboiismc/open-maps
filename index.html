<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>TheBoiisMC Maps</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

    <link href="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.css" rel="stylesheet" />

    <link rel="stylesheet" href="maps_v6.3.1.css">
</head>
<body>

    <div id="map"></div>

    <div id="floating-search-container">
        <div class="search-bar-wrapper">
            <button id="app-menu-btn" class="icon-btn" aria-label="Apps">
                <span class="material-symbols-outlined">apps</span>
            </button>
            
            <input type="text" id="search-input" placeholder="Search TheBoiisMC Maps" autocomplete="off" />
            
            <div class="search-actions">
                <button id="voice-search-btn" class="icon-btn" aria-label="Voice Search">
                    <span class="material-symbols-outlined">mic</span>
                </button>
                <button id="search-submit-btn" class="icon-btn" aria-label="Search">
                    <span class="material-symbols-outlined">search</span>
                </button>
                <div id="profile-container"></div>
            </div>
        </div>

        <div id="app-menu-dropdown" class="app-menu hidden">
            </div>

        <div id="search-suggestions" class="search-suggestions hidden"></div>
    </div>

    <div id="sidebar-panel" class="hidden">
        
        <div id="directions-panel" class="panel-content hidden">
            <div class="panel-header">
                <h2>Directions</h2>
                <button class="close-panel-btn"><span class="material-symbols-outlined">close</span></button>
            </div>
            <div class="directions-inputs">
                <div class="input-row">
                    <span class="dot start-dot"></span>
                    <input type="text" id="dir-start-input" placeholder="Choose starting point">
                </div>
                <div class="input-row">
                    <span class="dot end-dot"></span>
                    <input type="text" id="dir-dest-input" placeholder="Choose destination">
                </div>
            </div>
            <div class="transport-modes">
                <button class="mode-btn active" data-mode="driving"><span class="material-symbols-outlined">directions_car</span></button>
                <button class="mode-btn" data-mode="walking"><span class="material-symbols-outlined">directions_walk</span></button>
                <button class="mode-btn" data-mode="cycling"><span class="material-symbols-outlined">directions_bike</span></button>
            </div>
            <div id="directions-results-list" class="scroll-content"></div>
            <div class="panel-footer">
                <button id="start-navigation-btn" class="action-btn primary">Start Navigation</button>
            </div>
        </div>

        <div id="location-info-panel" class="panel-content hidden">
            <div class="panel-header">
                <h2 id="location-title">Location</h2>
                <button class="close-panel-btn"><span class="material-symbols-outlined">close</span></button>
            </div>
            <div id="location-details-content" class="scroll-content">
                <p id="location-address" class="subtitle"></p>
                <div id="location-meta"></div>
            </div>
            <div class="panel-footer">
                <button id="btn-get-directions" class="action-btn primary">
                    <span class="material-symbols-outlined">directions</span> Directions
                </button>
            </div>
        </div>
        
    </div>

    <div id="navigation-overlay" class="hidden">
        <div id="nav-top-bar">
            <div id="nav-maneuver-icon" class="material-symbols-outlined">turn_right</div>
            <div>
                <div id="nav-step-instruction">Head Northwest</div>
                <div id="nav-step-distance">200 ft</div>
            </div>
        </div>
        <button id="end-navigation-btn">Exit</button>
    </div>

    <script src="https://static.theboiismc.com/js/identity/oidc-client-ts@2.2.0.js"></script>
    <script src="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.js"></script>
    <script src="https://static.theboiismc.com/js/maps/turf.js"></script>
    <script src="maps_v6.2.5.js"></script>
</body>
</html>

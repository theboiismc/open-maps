<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    
    <title>TheBoiisMC Maps</title>
    <meta name="description" content="Explore the world with private, modern mapping." />
    <meta name="theme-color" content="#00796b" />
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon512_rounded.png">
    
    <meta property="og:title" content="TheBoiisMC Maps" />
    <meta property="og:description" content="Explore the world with private, modern mapping." />
    <meta property="og:image" content="https://maps.theboiismc.com/icon512_rounded.png" />
    <meta property="og:url" content="https://maps.theboiismc.com" />
    <meta name="twitter:card" content="summary_large_image" />
    
    <!-- Critical: MapLibre CSS must be loaded for the map to render correctly -->
    <link href="libs/css/maplibre-gl-4.1.0.css" rel="stylesheet">
    
    <!-- Your application's stylesheet -->
    <link rel="stylesheet" href="styles.css">

    <style>
        .icon-svg {
            display: inline-block;
            width: 24px;
            height: 24px;
            fill: currentColor;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <!-- Map container is now the first element for proper layering -->
    <div id="map"></div>

    <div id="top-banner">
        <span id="site-title">TheBoiisMC Maps</span>
        <div id="profile-area">
            <button class="js-settings-btn" aria-label="Map Settings">
                <span class="material-symbols-outlined"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg></span>
            </button>
            <button id="profile-button" aria-label="User Profile">
                <span class="material-symbols-outlined"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.93 0 3.5 1.57 3.5 3.5S13.93 12 12 12s-3.5-1.57-3.5-3.5S10.07 5 12 5zm0 14.2c-2.73 0-5.1-.98-6.9-2.58.01-2.48 4.67-3.82 6.9-3.82 2.23 0 6.89 1.34 6.9 3.82-1.8 1.6-4.17 2.58-6.9 2.58z"/></svg></span>
            </button>
            <div id="profile-dropdown">
                <div id="logged-in-view" hidden>
                    <div class="profile-section profile-section-header"><div class="username">User</div><div class="email">user@example.com</div></div><hr/>
                    <div class="profile-actions"><a id="saved-places-btn">Saved Places</a></div><hr/>
                    <div class="profile-actions"><a id="logout-btn">Log Out</a></div>
                </div>
                <div id="logged-out-view" hidden>
                    <div class="profile-section" style="text-align:center; font-weight: 500; color: #5f6368;">Sign in to save and view places</div><hr/>
                    <div class="auth-buttons"><a href="#" id="login-btn" class="btn btn-primary">Log In</a><a href="#" id="signup-btn" class="btn btn-secondary">Sign Up</a></div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="navigation-status">
        <div id="instruction-container"><span class="material-symbols-outlined"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg></span><div id="navigation-instruction">Starting...</div><div id="instruction-progress-bar"></div></div>
        <div id="trip-stats-container"><div class="stat-item"><span id="stat-speed">--</span><span class="stat-label">mph</span></div><div class="stat-item"><span id="stat-eta">--:--</span><span class="stat-label">ETA</span></div><div class="stat-item"><span id="stat-time-remaining">-- min</span><span class="stat-label">Time</span></div></div>
        <button id="end-navigation-btn">End Trip</button>
    </div>
    
    <div id="top-search-wrapper">
        <div id="main-search-container">
            <span id="search-icon-inside" class="material-symbols-outlined"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></span>
            <input type="text" id="main-search" placeholder="Search TheBoiisMC Maps" autocomplete="off" />
            <span id="main-directions-icon" class="material-symbols-outlined" style="cursor: pointer;"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M21.5 15.6l-7.1-7.1C13.9 8.35 13.5 8 13 8h-2c-.5 0-1 .4-1 .85l-7 7.1c-.4.4-1.2.1-1.2.6v.9c0 .5.7.8 1.1.4l6.5-6.5c.5-.5.8-.8 1.4-.8h.8c.6 0 .9 .3 1.4 .8l6.5 6.5c.4.4 1.1.1 1.1-.4v-.9c0-.5-.7-.8-1.1-.4z"/></svg></span>
            <div id="main-suggestions" class="suggestions-dropdown"></div>
        </div>
    </div>
    
    <div id="side-panel">
        <div id="panel-grabber"></div>
        <div class="panel-content">
            <div id="default-panel-content">
                <div class="panel-section"><div class="icon-grid"><div class="icon-item" id="default-drive-btn" style="cursor: pointer;"><div class="icon-circle" style="background-color: #4285F4;"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/></svg></div><span>Drive</span></div></div></div>
            </div>
            <div id="info-panel-redesign">
                <div class="header-image-container"><img class="header-image" id="info-image" src="" alt="Image of the location"/><button id="close-info-btn" aria-label="Back"><span class="material-symbols-outlined"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg></span></button></div>
                <div class="info-content-padding"><h3 id="info-name"></h3><div class="address" id="info-address"></div><div class="weather" id="info-weather"></div><div class="action-buttons"><div class="btn-wrapper" id="info-directions-btn"><div class="icon-circle"><span class="material-symbols-outlined"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M21.5 15.6l-7.1-7.1C13.9 8.35 13.5 8 13 8h-2c-.5 0-1 .4-1 .85l-7 7.1c-.4.4-1.2.1-1.2.6v.9c0 .5.7.8 1.1.4l6.5-6.5c.5-.5.8-.8 1.4-.8h.8c.6 0 .9 .3 1.4 .8l6.5 6.5c.4.4 1.1.1 1.1-.4v-.9c0-.5-.7-.8-1.1-.4z"/></svg></span></div><div class="btn-label">Directions</div></div><div class="btn-wrapper" id="info-save-btn"><div class="icon-circle"><span class="material-symbols-outlined"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg></span></div><div class="btn-label">Save</div></div></div><div id="quick-facts"><h4>Quick facts</h4><p id="quick-facts-content"></p></div></div>
            </div>
            <div id="directions-panel-redesign">
                <div class="info-content-padding"><div class="dir-input-group"><div class="dir-input-wrapper"><span class="material-symbols-outlined"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm0-6c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg></span><input type="text" id="panel-from-input" placeholder="Choose starting point" autocomplete="off"/></div><div id="panel-from-suggestions" class="suggestions-dropdown"></div><div class="dir-input-wrapper"><span class="material-symbols-outlined"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg></span><input type="text" id="panel-to-input" placeholder="Choose destination" autocomplete="off"/></div><div id="panel-to-suggestions" class="suggestions-dropdown"></div><button id="swap-btn" aria-label="Swap starting point and destination"><span class="material-symbols-outlined"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M16 11.5V11c0-1.1-.9-2-2-2H9c-1.1 0-2 .9-2 2v.5l-3.5-3.5L7 4l4 4V7c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v.5l3.5 3.5-3.5 3.5V17c0 1.1.9 2 2 2h3c1.1 0 2-.9 2-2v-.5l3.5-3.5L7 17l4 4V20c0-1.1.9-2 2-2h3c1.1 0 2 .9 2 2v-.5l3.5-3.5-3.5-3.5V17c0-1.1-.9-2-2-2h-3c-1.1 0-2 .9-2 2v.5z"/></svg></span></button></div><div class="dir-quick-select" id="dir-use-my-location"><div class="icon-wrapper"><span class="material-symbols-outlined"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.74-4.24l-1.41-1.41L12 5.58 4.67 1.35 1.76 4.24 6 8.57 2.27 12.3l1.41 1.41L12 18.42l8.32-8.32 1.41-1.41-3.73-3.73z"/></svg></span></div>Your location</div><button id="get-route-btn">Get Route</button><button id="back-to-info-btn">Back</button></div>
            </div>
            <div id="route-preview-panel"><div class="info-content-padding"><div class="route-summary"><h3 id="route-summary-time">--</h3><div id="route-summary-distance"></div></div><div class="action-buttons"><div class="btn-wrapper" id="start-navigation-btn"><div class="icon-circle"><span class="material-symbols-outlined"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg></span></div><div class="btn-label">Start Trip</div></div><div class="btn-wrapper" id="share-route-btn"><div class="icon-circle"><span class="material-symbols-outlined"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M18 16.5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5 1.5-.67 1.5-1.5-.67-1.5-1.5-1.5zM6 10c-.83 0-1.5.67-1.5 1.5S5.17 13 6 13s1.5-.67 1.5-1.5S6.83 10 6 10zm12-4.5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5 1.5-.67 1.5-1.5-.67-1.5-1.5-1.5zM12 6.5v8c0 .55.45 1 1 1s1-.45 1-1v-8c0-.55-.45-1-1-1s-1 .45-1 1zm0 4.5v-8c0-.55-.45-1-1-1s-1 .45-1 1v8c0 .55.45 1 1 1s1-.45 1-1zM5.5 11.5v-3c0-1.1.9-2 2-2h4c1.1 0 2 .9 2 2v3c0 1.1-.9 2-2 2h-4c-1.1 0-2-.9-2-2zM12 17.5v-3c0-1.1-.9-2-2-2H6c-1.1 0-2 .9-2 2v3c0 1.1.9 2 2 2h4c1.1 0 2-.9 2-2z"/></svg></span></div><div class="btn-label">Share</div></div></div><button id="back-to-directions-btn">Back</button></div></div>
            <div id="route-section"><div class="info-content-padding"><h3>Route Steps</h3><button id="exit-route-btn">Back</button><ol id="route-steps"></ol></div></div>
        </div>
    </div>
    
    <button id="mobile-settings-btn" class="js-settings-btn" aria-label="Map Settings"><span class="material-symbols-outlined"><svg class="icon-svg" viewBox="0 0 24 24"><path d="M12 19L2.5 12 12 5 21.5 12 12 19zm0-4.5l5.5-3.5L12 7.5l-5.5 3.5 5.5 3.5z"/></svg></span></button>
    <div id="menu-overlay"></div>
    <div id="settings-menu"><div class="settings-menu-header"><h4>Map Settings</h4><button id="close-settings-btn" aria-label="Close Settings">&times;</button></div><div class="settings-menu-content"><div class="setting-group"><label class="setting-label">Map Style</label><div class="radio-group"><input type="radio" id="style-default" name="map-style" value="default" checked><label for="style-default">Default</label><input type="radio" id="style-satellite" name="map-style" value="satellite"><label for="style-satellite">Satellite</label></div></div><hr><div class="setting-group"><label class="setting-label">Live Traffic</label><div class="toggle-switch"><input type="checkbox" id="traffic-toggle" name="map-traffic"><label for="traffic-toggle"></label></div></div><hr><div class="setting-group"><label class="setting-label">Units</label><div class="radio-group"><input type="radio" id="units-imperial" name="map-units" value="imperial" checked><label for="units-imperial">Imperial</label><input type="radio" id="units-metric" name="map-units" value="metric"><label for="units-metric">Metric</label></div></div></div></div>
    
    <!-- External libraries are loaded first -->
    <script src="https://cdn.jsdelivr.net/npm/oidc-client-ts@2.2.0/dist/browser/oidc-client-ts.min.js" defer></script>
    <script src="libs/js/maplibre-gl-4.1.0.js" defer></script>
    <script src='libs/js/turf-6.5.0.min.js' defer></script>
    
    <!-- Your main application script is loaded last to ensure the DOM is ready -->
    <script src="app.js" defer></script>
</body>
</html>

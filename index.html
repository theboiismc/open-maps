<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TheBoiisMC Map</title>
  <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    /* --- your existing styles remain --- */
    /* Add this extra CSS to ensure the search bar disappears fully */
    .search-bar[style*="display: none"] {
      opacity: 0;
      pointer-events: none;
      height: 0 !important;
      padding: 0 !important;
      margin: 0 !important;
      box-shadow: none !important;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="search-bar" role="search">
    <input id="search" type="text" placeholder="Search city, state, place..." autocomplete="off" spellcheck="false" aria-label="Search for destination" />
    <div id="suggestions" role="listbox" tabindex="-1"></div>
  </div>

  <div id="sidebar" role="region" aria-label="Place details and directions panel" hidden>
    <button id="sidebar-close" aria-label="Close sidebar">&times;</button>
    <div id="place-info">Loading...</div>
    <button id="directions-toggle">Show Directions</button>
    <div id="directions-form" aria-label="Directions form">
      <input id="origin" type="text" placeholder="Start" aria-label="Origin" autocomplete="off" spellcheck="false" />
      <div id="origin-suggestions" role="listbox" tabindex="-1"></div>
      <input id="destination" type="text" placeholder="Destination" aria-label="Destination" autocomplete="off" spellcheck="false" />
      <div id="destination-suggestions" role="listbox" tabindex="-1"></div>
      <button id="get-route">Get Directions</button>
      <button id="clear-route" style="margin-top: 8px; background:#b3261e; color:#fff; border:none; border-radius:20px; padding: 10px 0; font-weight:600; cursor:pointer;">Clear</button>
    </div>
  </div>

  <div class="layer-toggle" role="region" aria-label="Map layer toggles">
    <button id="regular-toggle" class="active" aria-pressed="true">Regular</button>
    <button id="satellite-toggle" aria-pressed="false">Satellite</button>
    <button id="dark-toggle" aria-pressed="false">Dark Mode</button>
  </div>

  <div id="route-info" role="region" aria-live="polite" aria-atomic="true" aria-label="Route information">
    <p id="route-summary"></p>
  </div>

  <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
  <script src="app.js"></script>
</body>
</html>

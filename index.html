<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Clean Map</title>
  <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet"/>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: 'Segoe UI', sans-serif;
      background: #f0f0f0;
    }

    #map {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 100%;
    }

    #search-container {
      position: absolute;
      top: 12px;
      left: 12px;
      width: 280px;
      z-index: 999;
    }

    #search {
      width: 100%;
      padding: 10px 12px;
      border: none;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
      font-size: 14px;
      outline: none;
    }

    @media (max-width: 600px) {
      #search-container {
        width: 90%;
        left: 5%;
      }
    }
  </style>
</head>
<body>
  <div id="search-container">
    <input id="search" type="text" placeholder="Search city, state, country..." />
  </div>
  <div id="map"></div>

  <script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
  <script src="app.js"></script>
</body>
</html>

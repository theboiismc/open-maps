<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Map Navigation</title>
  <link href="https://unpkg.com/maplibre-gl@2.8.1/dist/maplibre-gl.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/font-awesome/css/font-awesome.min.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    #map {
      width: 100%;
      height: 100vh;
    }

    /* Location button */
    #locate-btn {
      position: fixed;
      bottom: 80px;
      left: 10px;
      background-color: #007bff;
      color: white;
      padding: 12px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      z-index: 10;
    }

    #locate-btn:hover {
      background-color: #0056b3;
    }

    /* Directions sidebar */
    #sidebar {
      position: fixed;
      right: 0;
      top: 0;
      width: 350px;
      height: 100%;
      background-color: white;
      box-shadow: -2px 0px 8px rgba(0, 0, 0, 0.2);
      overflow-y: auto;
      display: none; /* Hide by default */
      z-index: 15;
      padding: 20px;
    }

    #sidebar.open {
      display: block;
    }

    .directions-header {
      font-size: 24px;
      margin-bottom: 20px;
    }

    .form-input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border-radius: 5px;
      border: 1px solid #ddd;
    }

    .suggestions {
      margin-top: 10px;
    }

    .suggestion-item {
      padding: 8px;
      background-color: #f9f9f9;
      margin: 2px 0;
      cursor: pointer;
    }

    .suggestion-item:hover {
      background-color: #e0e0e0;
    }

    #get-route {
      background-color: #28a745;
      color: white;
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #get-route:hover {
      background-color: #218838;
    }

    #route-summary {
      margin-top: 20px;
      font-size: 16px;
      font-weight: bold;
    }

    /* Directions button at bottom left */
    .directions-btn {
      position: fixed;
      bottom: 10px;
      left: 10px;
      background-color: #007bff;
      color: white;
      padding: 12px 24px;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
      z-index: 10;
    }

    .directions-btn:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <button id="locate-btn"><i class="fa fa-location-arrow"></i></button>
  
  <div id="sidebar">
    <div class="directions-header">Get Directions</div>

    <input type="text" id="origin" class="form-input" placeholder="Enter Origin">
    <div id="origin-suggestions" class="suggestions"></div>

    <input type="text" id="destination" class="form-input" placeholder="Enter Destination">
    <div id="destination-suggestions" class="suggestions"></div>

    <button id="get-route">Get Route</button>

    <div id="route-summary"></div>
  </div>

  <button class="directions-btn" id="directions-toggle">Directions</button>

  <script src="https://unpkg.com/maplibre-gl@2.8.1/dist/maplibre-gl.js"></script>
  <script src="https://unpkg.com/font-awesome/css/font-awesome.min.js"></script>
  <script src="app.js"></script>
</body>
</html>

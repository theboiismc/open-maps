<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TheBoiisMC Maps</title>
  <link rel="icon" href="/53e87aea-e737-4098-a968-363c73a31175.png" />
  <meta property="og:title" content="TheBoiisMC Maps" />
  <meta property="og:description" content="Explore the world with private, modern mapping." />
  <meta property="og:image" content="https://maps.theboiismc.com/53e87aea-e737-4098-a968-363c73a31175.png" />
  <meta property="og:url" content="https://maps.theboiismc.com" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="TheBoiisMC Maps" />
  <meta name="twitter:description" content="Explore the world with private, modern mapping." />
  <meta name="twitter:image" content="https://maps.theboiismc.com/53e87aea-e737-4098-a968-363c73a31175.png" />
  <meta name="theme-color" content="#1a73e8" />

  <!-- Styles -->
  <style>
    :root {
      --panel-width: 320px;
      --panel-mobile-height: 420px;
      --panel-mobile-peek: 160px;
    }

    html,
    body,
    #map {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
    }

    #map {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }

    /* Main search bar - fixed top left */
    #main-search-container {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 60;
      width: 280px;
      background: #fafafa;
      border-radius: 20px;
      box-shadow: 0 2px 8px rgb(0 0 0 / 0.1);
      padding: 8px 12px;
      display: flex;
      align-items: center;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    /* Suggestions dropdown */
    .suggestions-dropdown {
      position: absolute;
      background: white;
      border: 1px solid #ccc;
      width: 100%;
      max-height: 160px;
      overflow-y: auto;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgb(0 0 0 / 0.1);
      z-index: 70;
      display: none;
    }

    /* Panel styles */
    #side-panel {
      position: fixed;
      background: #fff;
      box-shadow: 2px 0 15px rgba(0, 0, 0, 0.1);
      overflow-y: auto;
      padding: 20px;
      z-index: 55;
      transition: left 0.3s ease, bottom 0.3s ease;
      will-change: left, bottom;
      /* Desktop defaults */
      top: 0;
      left: calc(-1 * var(--panel-width));
      width: var(--panel-width);
      height: 100%;
      border-radius: 0;
    }

    /* Desktop open state */
    #side-panel.open {
      left: 0;
    }

    /* Mobile panel adjustments */
    @media (max-width: 768px) {
      #side-panel {
        top: auto;
        bottom: calc(-1 * (var(--panel-mobile-height) - var(--panel-mobile-peek)));
        left: 0;
        width: 100%;
        height: var(--panel-mobile-height);
        border-radius: 20px 20px 0 0;
        box-shadow: 0 -3px 18px rgba(0, 0, 0, 0.1);
      }
      #side-panel.open {
        bottom: 0;
      }
    }

    /* Panel content sections */
    #place-info-section,
    #directions-section,
    #route-section {
      margin-top: 40px;
    }

    /* Buttons */
    button {
      background: #1a73e8;
      border: none;
      padding: 10px;
      border-radius: 6px;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    /* Responsive tweaks */
    @media (max-width: 768px) {
      #main-search-container {
        width: 90vw;
        left: 5vw;
        transform: none;
      }
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <!-- Main search bar (fixed top left, always visible on mobile, hides on desktop when panel is open) -->
  <div id="main-search-container" class="search-bar">
    <input type="text" id="main-search" placeholder="Search places" autocomplete="off" aria-autocomplete="list"
      aria-controls="main-suggestions" aria-haspopup="listbox" />
    <button id="main-search-icon" aria-label="Focus main search">&#128269;</button>
    <div id="main-suggestions" role="listbox" tabindex="-1" class="suggestions-dropdown"></div>
  </div>

  <!-- Sidebar Panel -->
  <div id="side-panel" class="panel">
    <button id="close-side-panel" class="close-btn">&#10006;</button>

    <!-- Info panel -->
    <section id="place-info-section" hidden>
      <div class="search-bar" role="search">
        <input type="text" id="panel-info-search" placeholder="Search info panel places" autocomplete="off"
          aria-autocomplete="list" aria-controls="panel-info-suggestions" aria-haspopup="listbox" />
        <button id="panel-info-search-icon" aria-label="Focus info search">&#128269;</button>
        <div id="panel-info-suggestions" role="listbox" tabindex="-1" class="suggestions-dropdown"></div>
      </div>
      <h2 id="place-name"></h2>
      <p id="place-description"></p>
      <p id="place-weather"></p>
      <div id="place-images"></div>
      <button id="directions-btn">Get Directions</button>
    </section>

    <!-- Directions panel -->
    <section id="directions-section" hidden>
      <form id="directions-form">
        <label for="panel-from-input">From</label>
        <input type="text" id="panel-from-input" autocomplete="off" aria-autocomplete="list"
          aria-controls="panel-from-suggestions" aria-haspopup="listbox" />
        <div id="panel-from-suggestions" role="listbox" tabindex="-1" class="suggestions-dropdown"></div>
        <button type="button" class="my-loc-btn" aria-label="Use my location as start">Use My Location (From)</button>

        <label for="panel-to-input">To</label>
        <input type="text" id="panel-to-input" autocomplete="off" aria-autocomplete="list"
          aria-controls="panel-to-suggestions" aria-haspopup="listbox" />
        <div id="panel-to-suggestions" role="listbox" tabindex="-1" class="suggestions-dropdown"></div>
        <button type="button" class="my-loc-btn" aria-label="Use my location as destination">Use My Location (To)</button>

        <button type="submit" id="route-btn">Route</button>
      </form>
      <button id="back-to-info-btn">Back</button>
      <p id="directions-result"></p>
    </section>

    <!-- Route steps -->
    <section id="route-section" hidden>
      <h3>Route Steps</h3>
      <ol id="route-steps"></ol>
      <button id="exit-route-btn">Exit Navigation</button>
    </section>
  </div>

  <script src="app.js"></script>
</body>

</html>

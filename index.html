<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>TheBoiisMC Maps - Private Navigation & Directions</title>

    <meta name="description" content="Find driving directions, explore places, and get live traffic updates with TheBoiisMC Maps. Your private, modern, and secure mapping solution." />
    
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://maps.theboiismc.com/" />

    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://tiles.theboiismc.com" crossorigin>

    <meta name="theme-color" content="#030712" />
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="/assets/icon512_rounded.png">

    <meta property="og:title" content="TheBoiisMC Maps - Private Navigation & Directions" />
    <meta property="og:description" content="Find driving directions, explore places, and get live traffic updates with TheBoiisMC Maps." />
    <meta property="og:image" content="https://maps.theboiismc.com/icon512_rounded.png" />
    <meta property="og:url" content="https://maps.theboiismc.com" />
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0">
    </noscript>

    <script>
        (function() {
            try {
                var saved = localStorage.getItem('mapTheme');
                if (saved === 'dark' || saved === 'light') {
                    document.documentElement.setAttribute('data-theme', saved);
                }
            } catch (e) {}
        })();
    </script>

    <link href="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.css" rel="stylesheet">
    <link rel="stylesheet" href="https://static.theboiismc.com/css/maps_v6.3.4.css">
</head>
<body>

    <div id="sidebar-drawer" class="sidebar-drawer" role="navigation" aria-label="Main Menu">
        <div class="drawer-header">
            <span class="brand-text" style="color:var(--text-primary); font-size:22px;">TheBoiis<span class="text-brand">MC</span></span>
            <button id="close-drawer-btn" aria-label="Close Menu"><span class="material-symbols-outlined">chevron_left</span></button>
        </div>
        <div class="drawer-content">
            <a href="/" class="drawer-item active"><span class="material-symbols-outlined">map</span> Maps</a>
            <a href="https://search.theboiismc.com" class="drawer-item"><span class="material-symbols-outlined">search</span> Search</a>
            <a href="https://drive.theboiismc.com" class="drawer-item"><span class="material-symbols-outlined">cloud</span> Drive</a>
            <div class="drawer-divider"></div>
            <div class="drawer-footer">
                <p>&copy; 2026 TheBoiisMC</p>
            </div>
        </div>
    </div>
    <div id="drawer-overlay" class="drawer-overlay" aria-hidden="true"></div>

    <div id="floating-profile-controls">
        <button id="app-menu-button" class="float-btn" aria-label="Open App Menu" aria-haspopup="true" aria-expanded="false">
            <span class="material-symbols-outlined" aria-hidden="true">apps</span>
        </button>
        
        <div id="profile-area">
            <button id="profile-button" class="float-btn profile-btn-circle" aria-label="User Profile Menu" aria-haspopup="true" aria-expanded="false">
                <span class="material-symbols-outlined" aria-hidden="true">account_circle</span>
            </button>
            
            <div id="services-dropdown" class="apps-dropdown-container" role="menu" aria-label="App Services">
                <div id="apps-grid" class="apps-grid">
                    </div>
            </div>

            <div id="profile-dropdown" role="menu" aria-label="User Options">
                <div id="logged-in-view" hidden>
                    <div class="profile-section profile-section-header">
                        <img id="dropdown-avatar" class="profile-dropdown-avatar" src="" alt="Your Profile Picture" hidden />
                        <div class="username">TheBoiisMC</div>
                        <div class="email">user@example.com</div>
                    </div>
                    <hr aria-hidden="true"/>
                    <div class="profile-actions">
                        <a id="saved-places-btn" href="#" role="menuitem">Saved Places</a>
                    </div>
                    <hr aria-hidden="true"/>
                    <div class="profile-actions">
                        <a id="logout-btn" href="#" role="menuitem">Log Out</a>
                    </div>
                </div>
                <div id="logged-out-view" hidden>
                    <div class="profile-section" style="text-align:center; font-weight: 500; color: var(--text-secondary);">Sign in to save and view places</div>
                    <hr aria-hidden="true"/>
                    <div class="auth-buttons">
                        <a href="#" id="login-btn" class="btn btn-primary" role="menuitem">Log In</a>
                        <a href="#" id="signup-btn" class="btn btn-secondary" role="menuitem">Sign Up</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div id="navigation-status" role="region" aria-label="Turn-by-turn Navigation">
        <div id="lane-guidance-container"></div>
        <div id="instruction-container" aria-live="assertive" aria-atomic="true">
            <div id="maneuver-icon-wrapper" aria-hidden="true">
                <span id="maneuver-icon" class="material-symbols-outlined">straight</span>
            </div>
            <div id="instruction-text-wrapper">
                <div id="instruction-dist">--</div>
                <div id="navigation-instruction">Starting navigation...</div>
            </div>
            <div id="instruction-progress-bar" style="transform: scaleX(0);" role="progressbar" aria-label="Distance to next turn"></div>
        </div>
        <div id="trip-stats-container" role="group" aria-label="Trip Statistics">
            <div class="stat-item"><span id="stat-speed">--</span><span class="stat-label">mph</span></div>
            <div class="stat-item"><span id="stat-miles-remaining">--.-</span><span class="stat-label">mi</span></div>
            <div class="stat-item"><span id="stat-time-remaining">-- min</span><span class="stat-label">Time</span></div>
            <div class="stat-item"><span id="stat-eta">--:--</span><span class="stat-label">ETA</span></div>
        </div>
        <button id="end-navigation-btn" aria-label="End Navigation">End Trip</button>
    </div>
    
    <div id="top-search-wrapper" role="search">
        <div id="main-search-container">
            <button id="hamburger-btn" aria-label="Menu">
                <span class="material-symbols-outlined">menu</span>
            </button>
            
            <label for="main-search" class="sr-only">Search for places, addresses, or coordinates</label>
            <input type="text" id="main-search" placeholder="Search TheBoiisMC Maps" autocomplete="off" aria-autocomplete="list" aria-controls="main-suggestions" />
            
            <div class="search-divider"></div>
            
            <button id="search-trigger-btn" aria-label="Search" style="background:none; border:none; cursor:pointer;">
                 <span id="search-icon-inside" class="material-symbols-outlined" aria-hidden="true">search</span>
            </button>
            
            <button id="main-directions-icon" aria-label="Get Directions" style="background:none; border:none; cursor:pointer;">
                <span class="material-symbols-outlined" aria-hidden="true">directions</span>
            </button>
           
            <div id="main-suggestions" class="suggestions-dropdown" role="listbox">
                <div id="initial-suggestions-view">
                    <div id="recent-searches-container"></div>
                </div>
                <div id="api-suggestions-view" hidden></div>
            </div>
        </div>
    </div>
    
    <div id="side-panel" role="complementary" aria-label="Place Details and Directions">
        <div id="panel-grabber" aria-hidden="true"></div>
        <button id="close-panel-btn" class="panel-close-btn" aria-label="Close Panel" style="display:none;"> </button>
        <div id="panel-search-placeholder" hidden></div>
        <div class="panel-content">
            <div id="dynamic-content" aria-live="polite"></div>
        </div>
    </div>
    
    <div id="context-menu" role="menu">
        <div id="context-menu-coords" aria-label="Coordinates"></div>
        <button class="context-menu-item" id="ctx-directions-from" role="menuitem"><span class="material-symbols-outlined" aria-hidden="true">near_me</span><span>Directions from here</span></button>
        <button class="context-menu-item" id="ctx-directions-to" role="menuitem"><span class="material-symbols-outlined" aria-hidden="true">place</span><span>Directions to here</span></button>
        <button class="context-menu-item" id="ctx-whats-here" role="menuitem"><span class="material-symbols-outlined" aria-hidden="true">help_outline</span><span>What's here?</span></button>
    </div>
    
    <div id="map" aria-label="Interactive Map"></div>
    <div id="rerouting-overlay" role="alert">Rerouting...</div>
    <button id="search-this-area-btn" class="search-area-btn" hidden>Search this area</button>
    <div id="toast-container" role="alert" aria-live="polite"></div>
    
    <template id="tmpl-home">
        <div class="info-content-padding mobile-only-home">
            <div class="welcome-header-section">
                <h3 tabindex="-1">Explore</h3>
                <p>Latest in your area</p>
            </div>
            <div id="home-recents-list" role="list"></div>
            <div class="legal-footer"><p>Copyright &copy; 2026 TheBoiisMC</p></div>
        </div>
    </template>

    <template id="tmpl-place-details">
        <div class="panel-hero">
            <div class="hero-image-wrapper">
                <img id="info-image" src="" alt="Place image" style="opacity:0; transition:opacity 0.5s; width:100%; height:100%; object-fit:cover;"/>
                <div class="hero-gradient"></div>
            </div>
            <button id="details-back-btn" aria-label="Go Back" class="dynamic-back-btn" style="position:absolute; top:15px; left:15px; z-index:10; background:rgba(0,0,0,0.5); color:white; border:none; border-radius:50%; width:40px; height:40px; cursor:pointer;">
                <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
            </button>
            <div class="hero-text-content">
                <h3 id="info-name" tabindex="-1"></h3>
                <div id="info-weather" class="weather-badge" hidden aria-label="Current Weather">Loading...</div>
            </div>
        </div>
        <div class="info-content-padding">
            <div class="address-row"><span class="material-symbols-outlined" aria-hidden="true">location_on</span><p id="info-subtitle"></p></div>
            <div class="action-buttons modern-actions">
                <button class="btn-wrapper" id="btn-details-dir" style="background:none; border:none;">
                    <div class="icon-circle primary"><span class="material-symbols-outlined" aria-hidden="true">directions</span></div>
                    <div class="btn-label">Directions</div>
                </button>
                <button class="btn-wrapper" id="btn-details-save" style="background:none; border:none;">
                    <div class="icon-circle secondary"><span class="material-symbols-outlined" aria-hidden="true">bookmark_border</span></div>
                    <div class="btn-label">Save</div>
                </button>
            </div>
            <hr class="panel-divider" aria-hidden="true" />
            
            <div class="panel-card">
                <div class="card-header"><span class="material-symbols-outlined" aria-hidden="true">info</span><h4>About</h4></div>
                <p id="quick-facts-content">Loading info...</p>
                <button id="info-website-btn" style="display:none; margin-top:10px;" class="btn-link">Visit Website</button>
            </div>
        </div>
    </template>

    <template id="tmpl-directions">
        <div class="info-content-padding">
            <button id="directions-close-btn" style="background:none; border:none; color:var(--text-secondary); cursor:pointer; margin-bottom:10px; display:flex; align-items:center; gap:5px;">
                <span class="material-symbols-outlined">close</span> Close Directions
            </button>

            <div class="travel-modes" role="radiogroup" aria-label="Travel Mode">
                <button class="travel-mode-btn active" aria-pressed="true" aria-label="Drive"><span class="material-symbols-outlined" aria-hidden="true">directions_car</span></button>
                <button class="travel-mode-btn" aria-pressed="false" aria-label="Walk"><span class="material-symbols-outlined" aria-hidden="true">directions_walk</span></button>
                <button class="travel-mode-btn" aria-pressed="false" aria-label="Bike"><span class="material-symbols-outlined" aria-hidden="true">directions_bike</span></button>
            </div>
            <div class="dir-input-group">
                <div class="dir-input-wrapper">
                    <span class="material-symbols-outlined" aria-hidden="true">trip_origin</span>
                    <label for="panel-from-input" class="sr-only">Start Location</label>
                    <input type="text" id="panel-from-input" placeholder="My Location" autocomplete="off" />
                </div>
                <div id="panel-from-suggestions" class="suggestions-dropdown" role="listbox"></div>
                
                <div class="dir-input-wrapper">
                    <span class="material-symbols-outlined" aria-hidden="true">location_on</span>
                    <label for="panel-to-input" class="sr-only">Destination</label>
                    <input type="text" id="panel-to-input" placeholder="Choose destination" autocomplete="off" />
                </div>
                <div id="panel-to-suggestions" class="suggestions-dropdown" role="listbox"></div>
                
                <button id="swap-btn" aria-label="Swap Start and Destination"><span class="material-symbols-outlined" aria-hidden="true">swap_vert</span></button>
            </div>
            <button class="dir-quick-select" id="dir-use-my-location" style="background:none; border:none; width:100%; text-align:left;">
                <div class="icon-wrapper"><span class="material-symbols-outlined" aria-hidden="true">my_location</span></div>Your location
            </button>
            <button id="get-route-btn" class="modern-primary-btn" style="width:100%; margin-top:10px;">Get Route</button>
            <button id="cancel-route-btn" style="width:100%; margin-top:10px; background:transparent; border:none; padding:10px; color:var(--text-secondary);">Cancel</button>
        </div>
    </template>

    <template id="tmpl-route-preview">
        <div class="info-content-padding">
            <div class="route-summary">
                <h3 id="route-time-display" style="color:#10B981; font-size:42px; font-weight:800; margin:0; line-height:1;" tabindex="-1"></h3>
                <div id="route-dist-display" style="font-size:18px; color:var(--text-secondary); margin-top:8px;"></div>
            </div>
            <div class="action-buttons">
                <button class="btn-wrapper" id="start-navigation-btn" style="background:none; border:none;">
                    <div class="icon-circle" style="background-color:#10B981; color:white;"><span class="material-symbols-outlined" aria-hidden="true">navigation</span></div>
                    <div class="btn-label" style="color:#10B981;">Start Trip</div>
                </button>
                <button class="btn-wrapper" style="background:none; border:none;">
                    <div class="icon-circle"><span class="material-symbols-outlined" aria-hidden="true">share</span></div>
                    <div class="btn-label">Share</div>
                </button>
            </div>
            <button id="back-to-directions-btn" style="width:100%; padding:12px; border:none; background:var(--surface-secondary); color:var(--text-secondary); border-radius:12px; font-weight:600; cursor:pointer;">Back</button>
        </div>
    </template>

    <template id="tmpl-search-results">
        <div class="info-content-padding">
            <button id="results-back-btn" aria-label="Back to Search Results" class="dynamic-back-btn" style="background:transparent; border:none; cursor:pointer; font-weight:600; color:var(--accent-color); display:flex; align-items:center; margin-bottom:10px;">
                <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span> Back
            </button>
            <h3 id="results-header-text" tabindex="-1"></h3>
            <div id="search-results-list" role="list"></div>
        </div>
    </template>

    <template id="tmpl-result-item">
        <button class="search-result-item" role="listitem" style="width:100%; text-align:left; background:none; border:none; border-bottom:1px solid var(--border-color);">
            <div class="result-item-icon"><span class="material-symbols-outlined" aria-hidden="true">place</span></div>
            <div class="result-item-details">
                <h4 class="item-title"></h4>
                <p class="item-subtitle"></p>
            </div>
            <div class="result-item-distance"></div>
        </button>
    </template>
    
    <script src="https://static.theboiismc.com/js/identity/oidc-client-ts@2.2.0.js"></script>
    <script src="https://unpkg.com/maplibre-gl@5.1.0/dist/maplibre-gl.js" defer></script>
    <script src="https://static.theboiismc.com/js/maps/turf.js" defer></script>
    <script src="https://static.theboiismc.com/js/maps/maps_v6.4.0.js" defer></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. DYNAMIC APPS CONFIGURATION
            const SERVICES = [
                { name: 'Home', icon: 'home', url: 'https://homeassistant.theboiismc.com' },
                { name: 'Search', icon: 'search', url: 'https://search.theboiismc.com' },
                { name: 'Maps', icon: 'map', url: 'https://maps.theboiismc.com' },
                { name: 'Account', icon: 'account_circle', url: 'https://accounts.theboiismc.com' },
                { name: 'Drive', icon: 'cloud', url: 'https://drive.theboiismc.com' },
                { name: 'Photos', icon: 'photo_library', url: 'https://photos.theboiismc.com' }
            ];

            const appsGrid = document.getElementById('apps-grid');
            if(appsGrid) {
                appsGrid.innerHTML = '';
                SERVICES.forEach(service => {
                    const item = document.createElement('a');
                    item.href = service.url;
                    item.className = 'app-item';
                    item.innerHTML = `
                        <div class="app-icon-circle"><span class="material-symbols-outlined">${service.icon}</span></div>
                        <span class="app-name">${service.name}</span>
                    `;
                    appsGrid.appendChild(item);
                });
            }

            // 2. PANEL CLOSING LOGIC OVERRIDE
            // This ensures clicking "Close" or "Back" (when top level) closes the panel entirely
            const panel = document.getElementById('side-panel');
            
            // Helper to close panel
            window.closePanelCompletely = function() {
                panel.classList.remove('open');
                panel.classList.remove('open-half');
                panel.classList.remove('open-full');
            };

            // Attach to template buttons when they are rendered
            // Since templates are cloned, we use a delegation or observer, 
            // but for simplicity, we assume your main JS calls closePanelCompletely()
            // OR we listen for clicks on specific IDs if they exist in DOM
            document.body.addEventListener('click', (e) => {
                // If clicking a "Close Directions" button
                if(e.target.closest('#directions-close-btn') || e.target.closest('#cancel-route-btn')) {
                    // Check if we should close or just clear. 
                    // User requested "close intirely"
                    window.closePanelCompletely();
                }
            });
        });
    </script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful with scope: ', registration.scope);
                    })
                    .catch(err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }
    </script>
    
</body>
</html>

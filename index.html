<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta property="og:title" content="TheBoiisMC Maps" />
    <meta property="og:description" content="Explore the world with private, modern mapping." />
    <meta property="og:image" content="https://maps.theboiismc.com/53e87aea-e737-4098-a968-363c73a31175.png" />
    <meta property="og:url" content="https://maps.theboiismc.com" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TheBoiisMC Maps" />
    <meta name="twitter:description" content="Explore the world with private, modern mapping." />
    <meta name="twitter:image" content="https://maps.theboiismc.com/53e87aea-e737-4098-a968-363c73a31175.png" />
    <meta name="theme-color" content="#1a73e8" />
    <title>TheBoiisMC Maps</title>
    <link rel="icon" href="/53e87aea-e737-4098-a968-363c73a31175.png" />
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@2.1.8/dist/maplibre-gl.css" />
    <style>
        :root {
            --panel-width: 320px;
            --panel-mobile-height: 420px;
            --panel-mobile-peek: 160px;
        }

        html, body, #map {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        #map {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Main search bar */
        #main-search-container {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 60;
            width: 250px;
            background: #fafafa;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            padding: 8px 12px;
            display: flex;
            align-items: center;
            transition: opacity 0.3s, visibility 0.3s;
        }

        #main-search-container.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .suggestions-dropdown {
            position: absolute;
            background: white;
            border: 1px solid #ccc;
            width: 100%;
            max-height: 160px;
            overflow-y: auto;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            z-index: 70;
            display: none;
            top: 100%;
            left: 0;
        }

        /* --- Side Panel --- */
        #side-panel {
            position: fixed;
            z-index: 55;
            background: white;
            box-sizing: border-box;
            /* Desktop styles */
            top: 0;
            left: -100%;
            width: var(--panel-width);
            height: 100%;
            box-shadow: 2px 0 15px rgba(0,0,0,0.1);
            transition: left 0.3s ease;
            padding: 20px;
        }

        #side-panel.open {
            left: 0;
        }
        
        #panel-grabber { display: none; }
        
        /* --- Mobile Panel Adjustments --- */
        @media (max-width: 768px) {
            #side-panel {
                top: auto;
                left: 0;
                width: 100%;
                height: var(--panel-mobile-height);
                border-radius: 20px 20px 0 0;
                box-shadow: 0 -3px 18px rgba(0,0,0,0.1);
                /* Default state: hidden below screen */
                bottom: calc(-1 * var(--panel-mobile-height));
                transition: bottom 0.35s cubic-bezier(0.25, 0.1, 0.25, 1);
            }

            /* The "peeking" state is the base visible state on mobile */
            #side-panel.visible {
                bottom: calc(-1 * (var(--panel-mobile-height) - var(--panel-mobile-peek)));
            }
            
            /* The "open" state brings it fully into view */
            #side-panel.open {
                bottom: 0;
                left: 0;
            }

            /* Visual grabber for mobile */
            #panel-grabber {
                display: block;
                width: 40px;
                height: 5px;
                background-color: #ccc;
                border-radius: 2.5px;
                position: absolute;
                top: 8px;
                left: 50%;
                transform: translateX(-50%);
                cursor: grab;
            }
        }
        
        #place-info-section, #directions-section, #route-section { margin-top: 30px; }
        button { background: #1a73e8; border: none; padding: 10px; border-radius: 6px; color: white; font-weight: 600; cursor: pointer; }
        @media (max-width: 768px) {
            #main-search-container { width: 90vw; left: 5vw; transform: none; }
        }
    </style>
</head>
<body>

    <div id="main-search-container">
        <input type="text" id="main-search" placeholder="Search for a place..." style="width: 100%; border: none; outline: none; background: transparent;"/>
        <div id="main-suggestions" class="suggestions-dropdown"></div>
    </div>

    <div id="side-panel" aria-hidden="true">
        <div id="panel-grabber"></div>
        <div id="close-side-panel" class="close-btn" style="position: absolute; top: 10px; right: 10px; cursor: pointer;">X</div>
        
        <div id="place-info-section" hidden>
            <h3 id="place-name">Place Name</h3>
            <p id="place-description">Description or Type</p>
            <p id="place-weather">Weather: TBD</p>
            <div id="place-images"></div>
            <button id="directions-btn">Get Directions</button>
        </div>

        <div id="directions-section" hidden>
            <form id="directions-form">
                <label for="panel-from-input">From</label>
                <input type="text" id="panel-from-input" autocomplete="off"/>
                <div id="panel-from-suggestions" class="suggestions-dropdown"></div>
                <button type="button" class="my-loc-btn">Use My Location</button>
                <br><br>
                <label for="panel-to-input">To</label>
                <input type="text" id="panel-to-input" autocomplete="off"/>
                <div id="panel-to-suggestions" class="suggestions-dropdown"></div>
                <button type="button" class="my-loc-btn">Use My Location</button>
                <br><br>
                <button type="submit" id="route-btn">Get Route</button>
            </form>
            <div id="directions-result"></div>
            <button id="back-to-info-btn">Back</button>
        </div>

        <div id="route-section" hidden>
            <h3>Route Steps</h3>
            <ol id="route-steps"></ol>
            <button id="exit-route-btn">Stop Navigation</button>
        </div>
    </div>

    <div id="map"></div>
    <script src="https://unpkg.com/maplibre-gl@2.1.8/dist/maplibre-gl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
    <script src="app.js"></script>

</body>
</html>

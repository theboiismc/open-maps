<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found - TheBoiisMC Maps</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand-color: #00796b; /* TheBoiisMC Maps Brand Color */
            --text-color: #333;
            --light-text-color: #5f6368;
            --background-color: #f8f9fa;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .container {
            max-width: 600px;
            margin: 0 20px;
            padding: 40px;
            background-color: #fff;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--brand-color);
            text-decoration: none;
            margin-bottom: 30px;
            display: inline-block;
        }
        
        .error-code {
            font-size: 6rem;
            font-weight: 700;
            color: #e0e0e0;
            margin: 0;
            line-height: 1;
        }

        .error-title {
            font-size: 2rem;
            font-weight: 600;
            margin: 20px 0 10px;
        }

        .error-message {
            font-size: 1rem;
            color: var(--light-text-color);
            line-height: 1.6;
            margin: 0 auto 30px;
            max-width: 400px;
        }

        .cta-button {
            display: inline-block;
            padding: 12px 24px;
            background-color: var(--brand-color);
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 8px;
            transition: background-color 0.2s ease, transform 0.2s ease;
        }

        .cta-button:hover {
            background-color: #005a4f; /* Darker shade of brand color */
            transform: translateY(-2px);
        }
        
        .copyright {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #aaa;
        }

    </style>
</head>
<body>

    <main class="container">
        <a href="https://maps.theboiismc.com" class="logo">TheBoiisMC Maps</a>
        
        <h1 class="error-code">404</h1>
        <h2 class="error-title">Page Not Found</h2>
        <p class="error-message">
            Looks like this page got lost in the digital ether. The map to this location seems to be missing. Let's get you back on track.
        </p>
        
        <a href="https://maps.theboiismc.com" class="cta-button">Return to Maps</a>

        <p class="copyright">© 2025 TheBoiisMC. All Rights Reserved.</p>
    </main>

</body>
</html>

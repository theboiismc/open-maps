<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found - TheBoiisMC Maps</title>
    
    <meta name="robots" content="noindex, follow">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">

    <style>
        /* --- BRAND THEME (Self-contained) --- */
        :root {
            --bg-dark: #0F172A;
            --surface-glass: rgba(30, 41, 59, 0.70);
            --border-color: #334155;
            
            --brand-primary: #6366F1;
            --brand-hover: #818CF8;
            
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
        }

        body {
            margin: 0;
            padding: 20px;
            height: 100vh;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, var(--bg-dark) 70%);
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-sizing: border-box;
        }

        .glow-effect {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(99,102,241,0.1) 0%, transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
            pointer-events: none;
        }

        .error-card {
            position: relative;
            z-index: 10;
            background: var(--surface-glass);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 48px;
            border-radius: 24px;
            text-align: center;
            max-width: 460px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-wrapper {
            display: inline-flex;
            align-items: center; justify-content: center;
            width: 64px; height: 64px;
            background: rgba(99, 102, 241, 0.1);
            color: var(--brand-primary);
            border-radius: 20px;
            margin-bottom: 24px;
            border: 1px solid rgba(99, 102, 241, 0.2);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 12px 0;
            color: var(--text-primary);
        }

        p {
            color: var(--text-secondary);
            font-size: 16px;
            line-height: 1.5;
            margin: 0 0 32px 0;
        }

        /* Search Bar */
        .search-form {
            position: relative;
            margin-bottom: 24px;
            width: 100%;
        }
        .search-input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s, background 0.2s;
        }
        .search-input:focus {
            border-color: var(--brand-primary);
            background: rgba(15, 23, 42, 0.8);
        }
        .search-icon {
            position: absolute;
            left: 14px; top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            pointer-events: none;
            font-size: 20px;
        }

        /* Buttons */
        .action-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            text-decoration: none;
            padding: 14px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 15px;
            transition: all 0.2s;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .btn-primary {
            background: var(--brand-primary);
            color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
        }
        .btn-primary:hover {
            background: var(--brand-hover);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: transparent;
            border-color: var(--border-color);
            color: var(--text-secondary);
        }
        .btn-secondary:hover {
            border-color: var(--brand-primary);
            color: var(--text-primary);
            background: rgba(255,255,255,0.03);
        }

        /* Dynamic Back Link */
        #dynamic-back-link {
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-secondary);
            text-decoration: none;
            display: inline-block;
            transition: color 0.2s;
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
        }
        #dynamic-back-link:hover { color: var(--text-primary); text-decoration: underline; }

    </style>
</head>
<body>

    <div class="glow-effect"></div>

    <div class="error-card">
        <div class="icon-wrapper">
            <span class="material-symbols-outlined" style="font-size: 32px;">map_search</span>
        </div>
        
        <h1>Destination Not Found</h1>
        <p>The location you are looking for does not exist or has been moved. Use the search bar below or return to the map.</p>

        <form action="https://search.theboiismc.com" method="get" class="search-form">
            <span class="material-symbols-outlined search-icon">search</span>
            <input type="text" name="q" class="search-input" placeholder="Search TheBoiisMC..." autocomplete="off" autofocus>
        </form>

        <div class="action-container" id="action-container">
            <a href="/" class="btn btn-primary">
                <span class="material-symbols-outlined">map</span>
                Open Maps
            </a>
            
            <a href="https://drive.theboiismc.com" class="btn btn-secondary">
                <span class="material-symbols-outlined">cloud</span>
                Go to Drive
            </a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // RETENTION: Check if the user has history to go back to.
            // If they came from an external site, we keep them here.
            // If they came from within our site, we offer a "Go Back" option.
            
            if (document.referrer && window.history.length > 1) {
                const container = document.getElementById('action-container');
                
                // Create the button securely using DOM methods (NO innerHTML)
                const backBtn = document.createElement('button');
                backBtn.id = 'dynamic-back-link';
                backBtn.textContent = '← Go back to previous page';
                
                // Check if referrer is from a different domain (e.g. they came from Google)
                try {
                    const refUrl = new URL(document.referrer);
                    if (refUrl.hostname !== window.location.hostname) {
                         // More specific text improves trust
                        backBtn.textContent = '← Go back to ' + refUrl.hostname;
                    }
                } catch(e) {
                    // Fallback text is already set
                }

                backBtn.onclick = (e) => { 
                    e.preventDefault(); 
                    window.history.back(); 
                };
                
                // Append it safely after the main buttons
                container.parentNode.appendChild(backBtn);
            }
        });
    </script>

</body>
</html>

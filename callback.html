<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Callback</title>
    <!-- Include the oidc-client-ts library -->
    <script src="https://cdn.jsdelivr.net/npm/oidc-client-ts@2.2.0/dist/browser/oidc-client-ts.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f3f4f6;
            color: #374151;
            transition: background-color 0.3s, color 0.3s;
        }
        .container {
            text-align: center;
            padding: 2rem;
            background-color: #ffffff;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: background-color 0.3s, box-shadow 0.3s;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }
        p {
            margin-top: 0.5rem;
            color: #6b7280;
        }
        
        /* Dark mode styles */
        @media (prefers-color-scheme: dark) {
            body {
                background-color: #1a1a1a;
                color: #e5e7eb;
            }
            .container {
                background-color: #2d2d2d;
                box-shadow: 0 4px 6px -1px rgba(255, 255, 255, 0.1), 0 2px 4px -1px rgba(255, 255, 255, 0.06);
            }
            p {
                color: #a0a0a0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Authenticating...</h1>
        <p>Please wait while we log you in. You will be redirected shortly.</p>
    </div>
    <!-- This script handles the redirect and token exchange -->
    <script src="./callback.js"></script>
</body>
</html>
